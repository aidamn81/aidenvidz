<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
            --grid-color: rgba(197, 160, 89, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        #gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gothic-black);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .ritual-btn {
            background: none; border: 1px solid var(--gothic-gold);
            color: var(--gothic-gold); padding: 15px 40px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 4px;
        }

        #archive-ui { display: none; width: 100%; height: 100%; position: relative; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; }
        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #status { margin-top: 20px; font-size: 11px; letter-spacing: 1px; text-align: center; max-width: 80%; word-break: break-all; }
    </style>
</head>
<body>

    <div id="gate">
        <h1 style="letter-spacing: 8px; font-weight: 300;">THE GOTHIC ARCHIVE</h1>
        <button class="ritual-btn" onclick="summon()">Summon Archive</button>
        <div id="status">THE GATE IS LOCKED</div>
    </div>

    <div id="archive-ui">
        <div id="viewport">
            <div id="canvas">
                <h1 style="padding: 40px;">THE ARCHIVE IS OPEN, MASTER.</h1>
            </div>
        </div>
        <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:1001;">
            <button onclick="auth.signOut().then(() => window.location.reload())" style="background:rgba(0,0,0,0.9); border:1px solid var(--gothic-red); color:var(--gothic-red); padding:10px 20px; cursor:pointer;">BANISH session</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 1. UPDATE THIS UID ONCE YOU SEE THE ERROR MESSAGE BELOW
        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        const status = document.getElementById('status');
        const gate = document.getElementById('gate');
        const archive = document.getElementById('archive-ui');

        async function summon() {
            status.innerText = "REDIRECTING...";
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            auth.signInWithRedirect(provider);
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.uid === MASTER_UID) {
                    status.innerText = "MASTER VERIFIED.";
                    gate.style.display = 'none';
                    archive.style.display = 'block';
                    // Center the canvas
                    const v = document.getElementById('viewport');
                    v.scrollLeft = (5000 - window.innerWidth) / 2;
                    v.scrollTop = (5000 - window.innerHeight) / 2;
                } else {
                    // This will tell you exactly what your UID is!
                    status.innerHTML = `<span style="color:var(--gothic-red)">UNAUTHORIZED SOUL.</span><br><br>Your Master UID is:<br><b style="font-size:14px; color:white;">${user.uid}</b><br><br>Copy this ID and replace the MASTER_UID in your code.`;
                }
            } else {
                status.innerText = "THE GATE IS LOCKED";
            }
        });
    </script>
</body>
</html>
