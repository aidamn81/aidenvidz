<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        /* --- Login Overlay --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 50px;
            text-align: center;
            background: #111;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.15);
        }

        .btn-google {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            background: var(--gothic-gold);
            color: black;
        }

        /* --- Main Archive UI --- */
        #archive-ui {
            display: none; width: 100%; height: 100%;
        }

        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .menu-bar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px 25px;
            border: 1px solid var(--gothic-gold);
            z-index: 100;
        }

        .btn { color: var(--gothic-gold); cursor: pointer; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <h1 style="margin-bottom: 30px; letter-spacing: 5px;">THE GOTHIC ARCHIVE</h1>
            <button class="btn-google" onclick="loginWithGoogle()">Summon Archive</button>
            <p id="auth-error" style="color: var(--gothic-red); margin-top: 20px;"></p>
        </div>
    </div>

    <div id="archive-ui">
        <div id="canvas">
            </div>

        <div class="menu-bar">
            <span class="btn" onclick="saveData()">Save</span>
            <span class="btn" onclick="loadData()">Load</span>
            <span class="btn" onclick="logout()">Seal</span>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        function loginWithGoogle() {
            auth.signInWithPopup(provider).catch(error => {
                document.getElementById('auth-error').innerText = error.message;
            });
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        function showArchive() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('archive-ui').style.display = 'block';
            // Trigger your specific load logic here
        }

        auth.onAuthStateChanged((user) => {
            if (user && user.uid === MASTER_UID) {
                showArchive();
            } else if (user) {
                // If a user logs in but isn't YOU
                document.getElementById('auth-error').innerText = "You are not the Master of this Archive.";
                auth.signOut();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('archive-ui').style.display = 'none';
            }
        });

        // --- DATABASE INTERACTION ---
        function saveData() {
            if (auth.currentUser) {
                db.ref('archive/' + auth.currentUser.uid).set({
                    // Place your grid/folder/relic state data here
                    timestamp: Date.now()
                }).then(() => alert("Archive progression saved."));
            }
        }

        function loadData() {
            if (auth.currentUser) {
                db.ref('archive/' + auth.currentUser.uid).once('value').then(snap => {
                    const data = snap.val();
                    if (data) console.log("State Restored", data);
                });
            }
        }

        // REMINDER: Paste your existing Archive mechanics (drag, snap-to-grid, etc.) below this line.
    </script>
</body>
</html>
