<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
            --gothic-grey: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            touch-action: none;
        }

        /* --- AUTH OVERLAY --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 60px 40px;
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.1);
        }

        .ritual-btn {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            transition: all 0.5s ease;
            margin-top: 20px;
        }

        .ritual-btn:hover {
            background: var(--gothic-gold);
            color: var(--gothic-black);
            box-shadow: 0 0 15px var(--gothic-gold);
        }

        /* --- ARCHIVE UI --- */
        #archive-ui {
            display: none;
            width: 100%; height: 100%;
            position: relative;
        }

        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-color: var(--gothic-black);
            background-image: radial-gradient(var(--gothic-grey) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .menu-bar {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 25px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 30px;
            border: 1px solid var(--gothic-gold);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .menu-item {
            color: var(--gothic-gold);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        #error-msg {
            color: var(--gothic-red);
            margin-top: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <h1 style="letter-spacing: 8px; font-weight: 300; margin-bottom: 40px;">THE GOTHIC ARCHIVE</h1>
            <button class="ritual-btn" onclick="summonArchive()">Summon Archive</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="archive-ui">
        <div id="canvas"></div>
        <div class="menu-bar">
            <div class="menu-item" onclick="saveArchive()">Seal Progress</div>
            <div class="menu-item" onclick="loadArchive()">Restore State</div>
            <div class="menu-item" onclick="banishArchive()" style="color: var(--gothic-red);">Banish</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        function summonArchive() {
            // Using Redirect instead of Popup for iPad Safari reliability
            auth.signInWithRedirect(provider);
        }

        function banishArchive() {
            auth.signOut().then(() => window.location.reload());
        }

        // Handle the redirect result when the page reloads
        auth.getRedirectResult().catch(error => {
            if(error.code !== 'auth/no-auth-event') {
                document.getElementById('error-msg').innerText = "The Ritual failed: " + error.message;
            }
        });

        auth.onAuthStateChanged((user) => {
            const overlay = document.getElementById('auth-overlay');
            const ui = document.getElementById('archive-ui');

            if (user) {
                if (user.uid === MASTER_UID) {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    loadArchive();
                } else {
                    document.getElementById('error-msg').innerText = "You are not the Master. Access denied.";
                    auth.signOut();
                }
            } else {
                overlay.style.display = 'flex';
                ui.style.display = 'none';
            }
        });

        function saveArchive() {
            const user = auth.currentUser;
            if (user && user.uid === MASTER_UID) {
                db.ref('archive/' + user.uid).set({
                    lastUpdated: Date.now()
                    // Your relic data here
                }).then(() => alert("The Archive has been sealed."));
            }
        }

        function loadArchive() {
            const user = auth.currentUser;
            if (user && user.uid === MASTER_UID) {
                db.ref('archive/' + user.uid).once('value').then(snap => {
                    if (snap.val()) console.log("State Restored");
                });
            }
        }
    </script>
</body>
</html>
