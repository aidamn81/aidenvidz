<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- MINI PLAYER --- */
        #theater-section {
            width: 100%;
            background: #000;
            padding: 20px 0;
            border-bottom: 1px solid var(--gothic-red);
            display: flex;
            justify-content: center;
        }

        .player-wrapper {
            width: 70%; /* Smaller player size */
            max-width: 700px;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 10px var(--gothic-red);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            border: 1px solid #222;
        }

        /* --- TOOLBAR --- */
        .controls {
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            gap: 10px;
        }

        .search-input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 20px;
        }

        .btn {
            background: var(--gothic-red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* --- THUMBNAIL GRID --- */
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            width: 95%;
            padding-bottom: 50px;
        }

        .video-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .video-card:hover {
            border-color: var(--gold);
            transform: scale(1.03);
        }

        /* Video Thumbnail Logic */
        .thumb-container {
            width: 100%;
            height: 120px;
            background: #000;
            overflow: hidden;
            pointer-events: none; /* User can't click the mini-video directly */
        }

        .thumb-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .card-label {
            padding: 8px;
            font-size: 0.85rem;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- MODAL --- */
        #summon-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-box {
            background: #111;
            padding: 30px;
            border: 1px solid var(--gothic-red);
            width: 90%; max-width: 400px;
        }

        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: white; border: 1px solid #333; }

        @media (max-width: 600px) {
            .player-wrapper { width: 95%; }
            #video-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="theater-section">
        <div class="player-wrapper">
            <video id="master-player" controls preload="auto">
                <source id="master-source" src="">
            </video>
            <div style="padding: 10px; background: #0a0a0a; font-size: 0.9rem;">
                <span id="playing-title" style="color:var(--gold)">Select a video...</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="search-bar" class="search-input" placeholder="Filter vault..." oninput="search()">
        <button class="btn" onclick="openSummon()">Summon +</button>
    </div>

    <div id="video-grid"></div>

    <div id="summon-modal">
        <div class="modal-box">
            <h2 style="color:var(--gothic-red); margin-top:0;">New Vision</h2>
            <input type="text" id="title-in" placeholder="Title">
            <input type="text" id="url-in" placeholder="Any Video Link (pCloud, Web, etc)">
            <input type="text" id="tags-in" placeholder="Tags">
            <button class="btn" style="width:100%" onclick="saveVideo()">Add to Vault</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#222;" onclick="openSummon()">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let archive = [];

        function openSummon() {
            const m = document.getElementById('summon-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveVideo() {
            const title = document.getElementById('title-in').value;
            const url = document.getElementById('url-in').value;
            const tags = document.getElementById('tags-in').value;
            if(!title || !url) return;
            
            db.ref('vault').push({ title, url, tags });
            openSummon();
            document.getElementById('title-in').value = "";
            document.getElementById('url-in').value = "";
        }

        db.ref('vault').on('value', snap => {
            const data = snap.val();
            archive = [];
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            
            for(let id in data) {
                const v = data[id];
                archive.push(v);
                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => play(v.url, v.title);
                card.innerHTML = `
                    <div class="thumb-container">
                        <video preload="metadata">
                            <source src="${v.url}#t=1">
                        </video>
                    </div>
                    <div class="card-label">${v.title}</div>
                `;
                grid.appendChild(card);
            }
        });

        function play(url, title) {
            const p = document.getElementById('master-player');
            const s = document.getElementById('master-source');
            s.src = url;
            p.load();
            p.play();
            document.getElementById('playing-title').innerText = title;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function search() {
            const term = document.getElementById('search-bar').value.toLowerCase();
            const cards = document.querySelectorAll('.video-card');
            archive.forEach((v, i) => {
                const match = v.title.toLowerCase().includes(term) || v.tags.toLowerCase().includes(term);
                cards[i].style.display = match ? "block" : "none";
            });
        }
    </script>
</body>
</html>
