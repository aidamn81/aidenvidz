<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        /* --- Login Overlay --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 40px;
            text-align: center;
            background: #111;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        .auth-container input {
            display: block; width: 250px;
            margin: 10px auto; padding: 10px;
            background: #000; border: 1px solid var(--gothic-gold);
            color: #fff;
        }

        .auth-container button {
            background: var(--gothic-red);
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 10px 25px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }

        /* --- Main Archive UI (Hidden initially) --- */
        #archive-ui {
            display: none; width: 100%; height: 100%;
        }

        #canvas {
            width: 5000px; height: 5000px;
            position: absolute; cursor: grab;
            background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Menu Bars */
        .menu-bar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(10, 10, 10, 0.8);
            padding: 10px 20px; border: 1px solid var(--gothic-gold);
            z-index: 100;
        }

        .btn { color: var(--gothic-gold); cursor: pointer; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <h1 style="font-size: 1.5rem; margin-bottom: 20px;">The Gothic Archive</h1>
            <input type="email" id="email" placeholder="Guardian Email">
            <input type="password" id="password" placeholder="Key Phrase">
            <button onclick="login()">Enter</button>
            <p id="auth-error" style="color: red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="archive-ui">
        <div id="canvas">
            </div>

        <div class="menu-bar">
            <span class="btn" onclick="saveData()">Save</span>
            <span class="btn" onclick="loadData()">Load</span>
            <span class="btn" onclick="logout()">Seal Archive</span>
        </div>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- AUTHENTICATION LOGIC ---
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorText = document.getElementById('auth-error');

            auth.signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    showArchive();
                })
                .catch((error) => {
                    errorText.innerText = "Access Denied: " + error.message;
                });
        }

        function showArchive() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('archive-ui').style.display = 'block';
            loadData(); // Auto-load when entering
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        // Monitor Auth State
        auth.onAuthStateChanged((user) => {
            if (user && user.uid === "pFJGayQYzBUpD93U88KGBwxJSxI2") {
                showArchive();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('archive-ui').style.display = 'none';
            }
        });

        // --- DATABASE LOGIC ---
        function saveData() {
            const user = auth.currentUser;
            if (user) {
                // Placeholder for your Gothic Archive state saving
                db.ref('archive_data/' + user.uid).set({
                    last_accessed: Date.now(),
                    // ... your existing grid/relic data
                }).then(() => alert("Archive Sealed & Saved."));
            }
        }

        function loadData() {
            const user = auth.currentUser;
            if (user) {
                db.ref('archive_data/' + user.uid).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (data) console.log("Data retrieved", data);
                });
            }
        }

        // --- GOTHIC MECHANICS (Preserved) ---
        // Insert your existing drag-and-drop, grid, and relic logic here.
    </script>
</body>
</html>
