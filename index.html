<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- THEATER SECTION (FIXED VISIBILITY) --- */
        #theater-section {
            width: 100%;
            background: #000;
            padding: 20px 0;
            border-bottom: 3px solid var(--gothic-red);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky; /* Keeps player visible while scrolling */
            top: 0;
            z-index: 100;
        }

        .player-container {
            width: 90%;
            max-width: 800px;
            height: 250px; /* HARD-CODED HEIGHT to prevent invisible player */
            background: #111;
            border: 1px solid #222;
            box-shadow: 0 0 30px rgba(74,4,4,0.6);
            position: relative;
        }

        @media (min-width: 600px) { .player-container { height: 450px; } }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .now-playing-bar {
            width: 90%;
            max-width: 800px;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-top: none;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        /* --- GRID & UI --- */
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            width: 95%;
            padding: 20px 0 100px;
        }

        .video-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .thumb-box {
            width: 100%;
            height: 100px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        .card-info { padding: 8px; }
        .v-title { font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* TOOLBAR */
        .toolbar { padding: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        .search { background: #111; border: 1px solid var(--gothic-red); color: white; padding: 10px; border-radius: 20px; width: 60%; }
        .btn { background: var(--gothic-red); color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #status-light { font-size: 0.6rem; color: #444; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="theater-section">
        <div id="status-light">VAULT OFFLINE</div>
        <div class="player-container">
            <iframe id="main-vault-player" src="about:blank" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div class="now-playing-bar">
            <span id="v-name" style="color:var(--gold)">CHOOSE A VISION</span>
            <span id="v-list" style="color:#555"></span>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" class="search" placeholder="Search..." oninput="drawUI()">
        <button class="btn" onclick="document.getElementById('m-add').style.display='flex'">+</button>
    </div>

    <div id="video-grid"></div>

    <div id="m-add" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center;">
        <div style="background:#0d0d0d; padding:20px; border:1px solid var(--gothic-red); width:80%; max-width:400px;">
            <input type="text" id="add-title" placeholder="Title">
            <input type="text" id="add-url" placeholder="pCloud Link">
            <button class="btn" style="width:100%" onclick="saveToVault()">COMMIT</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#222;" onclick="document.getElementById('m-add').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let vaultData = [];

        db.ref(".info/connected").on("value", s => {
            const el = document.getElementById('status-light');
            el.innerText = s.val() ? "VAULT ONLINE" : "VAULT OFFLINE";
            el.style.color = s.val() ? "var(--gold)" : "var(--gothic-red)";
        });

        db.ref('vault').on('value', snap => {
            const raw = snap.val();
            vaultData = [];
            for(let id in raw) vaultData.push({id, ...raw[id]});
            drawUI();
        });

        function drawUI() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            vaultData.forEach(item => {
                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => launch(item.url, item.title);
                const thumb = item.customThumb ? `<img src="${item.customThumb}">` : `<div style="color:#222">👁️</div>`;
                card.innerHTML = `<div class="thumb-box">${thumb}</div><div class="card-info"><div class="v-title">${item.title}</div></div>`;
                grid.appendChild(card);
            });
        }

        function launch(url, title) {
            let cleanUrl = url;
            if(cleanUrl.includes('show?code=')) {
                cleanUrl = cleanUrl.split('&mode=')[0] + "&mode=video";
            }
            document.getElementById('main-vault-player').src = cleanUrl;
            document.getElementById('v-name').innerText = title;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function saveToVault() {
            const title = document.getElementById('add-title').value;
            const url = document.getElementById('add-url').value;
            if(title && url) {
                db.ref('vault').push({title, url, timestamp: Date.now()});
                document.getElementById('m-add').style.display = 'none';
            }
        }
    </script>
</body>
</html>
