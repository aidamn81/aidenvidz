<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --dark-gray: #111;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER & BANNER --- */
        header {
            width: 100%;
            height: 180px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--gothic-red);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--gothic-red);
            margin: 0;
        }

        /* --- PLAYER SECTION --- */
        #vault-player-container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            background: #000;
            border: 1px solid #222;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            background: #000;
        }

        .video-meta {
            padding: 20px;
            background: var(--dark-gray);
            border-top: 1px solid var(--gothic-red);
        }

        /* --- NAVIGATION & TOOLS --- */
        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 5%;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            gap: 10px;
        }

        .search-bar {
            background: #151515;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            width: 60%;
            border-radius: 4px;
        }

        .btn-gothic {
            background: var(--gothic-red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* --- SIDE MENU (Gothic Archive Style) --- */
        #side-menu {
            position: fixed;
            left: -300px;
            top: 0;
            width: 280px;
            height: 100%;
            background: #0d0d0d;
            border-right: 2px solid var(--gothic-red);
            z-index: 1000;
            transition: 0.4s;
            padding: 60px 20px;
        }

        #side-menu.open { left: 0; }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            color: var(--soft-white);
        }

        .menu-item:hover { color: var(--gold); background: #151515; }

        /* --- VIDEO GRID --- */
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 30px 5%;
        }

        .video-card {
            background: #111;
            border: 1px solid #222;
            transition: 0.3s;
            cursor: pointer;
            overflow: hidden;
        }

        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .thumbnail-box {
            width: 100%;
            height: 170px;
            background: #000;
            position: relative;
        }

        /* Auto-thumbnail magic */
        .thumbnail-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .card-info { padding: 15px; }
        .card-info h3 { margin: 0 0 10px; font-size: 1rem; color: var(--gold); }
        .card-info p { margin: 0; font-size: 0.8rem; color: #777; }

        /* --- MODAL FOR SUMMONING --- */
        #summon-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #151515;
            padding: 30px;
            border: 1px solid var(--gothic-red);
            width: 90%;
            max-width: 450px;
        }

        .modal-content input, .modal-content select {
            width: 100%; margin-bottom: 15px; padding: 12px;
            background: #000; border: 1px solid #333; color: white;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 1.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div id="side-menu">
        <h2 style="color:var(--gothic-red)">PLAYLISTS</h2>
        <div class="menu-item" onclick="filterVault('all')">All Visions</div>
        <div class="menu-item" onclick="filterVault('Rituals')">Rituals</div>
        <div class="menu-item" onclick="filterVault('Atmospheres')">Atmospheres</div>
        <div class="menu-item" onclick="filterVault('Archives')">Archives</div>
        <button class="btn-gothic" style="margin-top: 50px; width: 100%;" onclick="toggleMenu()">Close</button>
    </div>

    <header>
        <h1>Aiden's Vault</h1>
    </header>

    <div id="vault-player-container">
        <video id="main-video-element" controls preload="auto">
            <source id="main-source" src="">
        </video>
        <div class="video-meta">
            <h2 id="display-title" style="margin:0; color:var(--gold);">Choose a vision from below...</h2>
            <p id="display-tags" style="margin:10px 0 0; color:#666;"></p>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-gothic" onclick="toggleMenu()">☰ Menu</button>
        <input type="text" class="search-bar" id="search-input" placeholder="Search by tags or title..." oninput="searchVault()">
        <button class="btn-gothic" onclick="toggleSummon()">Summon +</button>
    </div>

    <div id="video-grid">
        </div>

    <div id="summon-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:var(--gothic-red)">New Video</h2>
            <input type="text" id="in-title" placeholder="Video Title">
            <input type="text" id="in-url" placeholder="pCloud Direct Link">
            <input type="text" id="in-tags" placeholder="Tags (horror, music, etc)">
            <select id="in-playlist">
                <option value="Rituals">Rituals</option>
                <option value="Atmospheres">Atmospheres</option>
                <option value="Archives">Archives</option>
            </select>
            <button class="btn-gothic" style="width:100%" onclick="saveVideo()">Add to Vault</button>
            <button class="btn-gothic" style="width:100%; margin-top:10px; background:#222;" onclick="toggleSummon()">Cancel</button>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        let allVideos = [];

        // --- UI HANDLERS ---
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function toggleSummon() { 
            const m = document.getElementById('summon-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // --- SAVE DATA ---
        function saveVideo() {
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            const tags = document.getElementById('in-tags').value;
            const playlist = document.getElementById('in-playlist').value;

            if(!title || !url) return alert("Title and URL required");

            rtdb.ref('videos').push({
                title, url, tags, playlist,
                addedAt: Date.now()
            });

            toggleSummon();
            document.getElementById('in-title').value = "";
            document.getElementById('in-url').value = "";
        }

        // --- LOAD DATA ---
        rtdb.ref('videos').on('value', (snap) => {
            const data = snap.val();
            allVideos = [];
            for(let id in data) {
                allVideos.push({ id, ...data[id] });
            }
            renderGrid(allVideos);
        });

        function renderGrid(list) {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            
            list.reverse().forEach(vid => {
                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => playVideo(vid.url, vid.title, vid.tags);
                
                // #t=0.5 triggers the first frame as a thumbnail
                card.innerHTML = `
                    <div class="thumbnail-box">
                        <video preload="metadata">
                            <source src="${vid.url}#t=0.5">
                        </video>
                    </div>
                    <div class="card-info">
                        <h3>${vid.title}</h3>
                        <p>${vid.playlist} | ${vid.tags}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playVideo(url, title, tags) {
            const v = document.getElementById('main-video-element');
            const s = document.getElementById('main-source');
            
            s.src = url;
            v.load();
            v.play();

            document.getElementById('display-title').innerText = title;
            document.getElementById('display-tags').innerText = "Tagged: " + tags;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- SEARCH & FILTER ---
        function searchVault() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allVideos.filter(v => 
                v.title.toLowerCase().includes(term) || v.tags.toLowerCase().includes(term)
            );
            renderGrid(filtered);
        }

        function filterVault(category) {
            toggleMenu();
            if(category === 'all') return renderGrid(allVideos);
            const filtered = allVideos.filter(v => v.playlist === category);
            renderGrid(filtered);
        }
    </script>
</body>
</html>
