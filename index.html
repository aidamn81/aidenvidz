<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #connection-status { font-size: 0.7rem; padding: 5px; color: #444; letter-spacing: 1px; }

        /* --- THEATER PLAYER --- */
        #theater-section {
            width: 100%; background: #000; padding: 15px;
            border-bottom: 2px solid var(--gothic-red);
            display: flex; justify-content: center;
        }

        .player-wrapper {
            width: 85%; max-width: 800px;
            box-shadow: 0 0 30px rgba(74,4,4,0.4);
            border-radius: 8px; overflow: hidden; background: #000;
        }

        video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }

        .now-playing {
            padding: 10px; background: #0a0a0a; border-top: 1px solid #222;
            font-size: 0.9rem; display: flex; justify-content: space-between;
        }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 95%; padding: 20px 0 10px;
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }

        .search-input {
            background: #111; border: 1px solid #333; color: white;
            padding: 10px 20px; border-radius: 25px; flex-grow: 1;
            min-width: 250px; outline: none;
        }

        .btn {
            background: var(--gothic-red); color: white; border: none;
            padding: 10px 20px; cursor: pointer; text-transform: uppercase;
            font-size: 0.75rem; border-radius: 4px; letter-spacing: 1px; font-weight: bold;
        }

        #playlist-bar { width: 95%; display: flex; overflow-x: auto; padding: 10px 0 20px; gap: 10px; }
        .playlist-tab {
            border: 1px solid #333; background: #0d0d0d; color: #777;
            padding: 6px 15px; border-radius: 20px; font-size: 0.8rem;
            cursor: pointer; white-space: nowrap;
        }
        .playlist-tab.active { border-color: var(--gold); color: var(--gold); }

        /* --- GRID --- */
        #video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; width: 95%; padding-bottom: 60px;
        }

        .video-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; }
        .thumb-box { width: 100%; height: 110px; background: #000; position: relative; cursor: pointer; }
        .thumb-box img, .thumb-box video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .card-label { padding: 8px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 5px; }
        .video-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; }
        .card-actions { display: flex; gap: 12px; justify-content: flex-end; }
        .icon-btn { cursor: pointer; font-size: 1rem; opacity: 0.7; }

        /* --- MODAL --- */
        #summon-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box { background: #111; padding: 25px; border: 1px solid var(--gothic-red); width: 90%; max-width: 420px; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 12px; background: #000; border: 1px solid #333; color: white; }

        @media (max-width: 768px) { #video-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="connection-status">VAULT STATUS: DISCONNECTED</div>

    <div id="theater-section">
        <div class="player-wrapper">
            <video id="master-player" controls playsinline preload="auto">
                <source id="master-source" src="" type="video/mp4">
            </video>
            <div class="now-playing">
                <span id="playing-title" style="color:var(--gold)">Awaiting Vision...</span>
                <span id="playing-list" style="color:#444;"></span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search-bar" class="search-input" placeholder="Search archive..." oninput="refreshUI()">
        <button class="btn" onclick="openSummon()">Summon +</button>
    </div>

    <div id="playlist-bar"></div>
    <div id="video-grid"></div>

    <input type="file" id="update-thumb-input" style="display:none;" accept="image/*" onchange="processUpdateThumb(this)">

    <div id="summon-modal">
        <div class="modal-box">
            <h2 style="margin-top:0; color:var(--gothic-red);">NEW VISION</h2>
            <input type="hidden" id="edit-id">
            <label style="font-size:0.7rem; color:var(--gold)">Title</label><input type="text" id="in-title">
            <label style="font-size:0.7rem; color:var(--gold)">Video URL</label><input type="text" id="in-url">
            <label style="font-size:0.7rem; color:var(--gold)">Tags</label><input type="text" id="in-tags">
            <label style="font-size:0.7rem; color:var(--gold)">Thumbnail</label><input type="file" id="in-thumb" accept="image/*">
            <select id="playlist-select" onchange="checkNewPlaylist(this.value)">
                <option value="General">General Archive</option>
                <option value="NEW_PLAYLIST">+ Create New...</option>
            </select>
            <input type="text" id="in-new-playlist" placeholder="Playlist Name" style="display:none;">
            <button class="btn" style="width:100%" onclick="saveVideo()">Commit</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#222;" onclick="closeSummon()">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let archive = [];
        let currentPlaylist = 'All';
        let updatingId = null;

        db.ref(".info/connected").on("value", (snap) => {
            const statusEl = document.getElementById('connection-status');
            statusEl.innerText = snap.val() ? "VAULT STATUS: ONLINE" : "VAULT STATUS: OFFLINE";
            statusEl.style.color = snap.val() ? "var(--gold)" : "var(--gothic-red)";
        });

        function openSummon() { document.getElementById('summon-modal').style.display = 'flex'; }
        function closeSummon() { 
            document.getElementById('summon-modal').style.display = 'none'; 
            document.querySelectorAll('#summon-modal input').forEach(i => i.value = "");
        }

        function checkNewPlaylist(val) { document.getElementById('in-new-playlist').style.display = (val === "NEW_PLAYLIST") ? "block" : "none"; }

        function saveVideo() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            const tags = document.getElementById('in-tags').value;
            const thumbFile = document.getElementById('in-thumb').files[0];
            let playlist = document.getElementById('playlist-select').value;
            if (playlist === "NEW_PLAYLIST") playlist = document.getElementById('in-new-playlist').value || "General";
            
            const push = (img) => {
                const data = { title, url, tags, playlist, timestamp: Date.now() };
                if(img) data.customThumb = img;
                if(id) db.ref('vault/'+id).update(data); else db.ref('vault').push(data);
                closeSummon();
            };
            if(thumbFile) { const r = new FileReader(); r.onload=e=>push(e.target.result); r.readAsDataURL(thumbFile); } else push(null);
        }

        db.ref('vault').on('value', snap => {
            const data = snap.val(); archive = [];
            for(let id in data) archive.push({ id, ...data[id] });
            archive.sort((a,b) => b.timestamp - a.timestamp);
            renderPlaylists(); refreshUI();
        });

        function renderPlaylists() {
            const bar = document.getElementById('playlist-bar');
            const lists = [...new Set(archive.map(v => v.playlist))].filter(l => l && l !== "General");
            bar.innerHTML = `<div class="playlist-tab ${currentPlaylist === 'All' ? 'active' : ''}" onclick="setPlaylist('All')">All</div>`;
            lists.forEach(l => bar.innerHTML += `<div class="playlist-tab ${currentPlaylist === l ? 'active' : ''}" onclick="setPlaylist('${l}')">${l}</div>`);
        }

        function setPlaylist(name) { currentPlaylist = name; renderPlaylists(); refreshUI(); }

        function refreshUI() {
            const grid = document.getElementById('video-grid');
            const term = document.getElementById('search-bar').value.toLowerCase();
            grid.innerHTML = "";
            archive.forEach(v => {
                if ((currentPlaylist === 'All' || v.playlist === currentPlaylist) && v.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    const thumb = v.customThumb ? `<img src="${v.customThumb}">` : `<video muted playsinline><source src="${v.url}#t=1"></video>`;
                    card.innerHTML = `
                        <div class="thumb-box" onclick="play('${v.url}', '${v.title.replace(/'/g, "\\'")}', '${v.playlist}')">${thumb}</div>
                        <div class="card-label">
                            <div class="video-title">${v.title}</div>
                            <div class="card-actions">
                                <span class="icon-btn" onclick="triggerEdit('${v.id}')">✏️</span>
                                <span class="icon-btn" onclick="deleteVideo('${v.id}', '${v.title}')">🗑</span>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                }
            });
        }

        // CRITICAL FIX: The Force-Load Player Function
        function play(url, title, list) {
            const player = document.getElementById('master-player');
            const source = document.getElementById('master-source');
            
            // 1. Pause and reset
            player.pause();
            
            // 2. Clear and set new source
            source.src = url;
            
            // 3. Force re-load of the media element
            player.load();
            
            // 4. Attempt play with a slight delay to allow iPad buffer
            setTimeout(() => {
                player.play().catch(e => console.log("Playback blocked:", e));
            }, 100);

            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-list').innerText = "In: " + list;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function triggerEdit(id) {
            const v = archive.find(i => i.id === id);
            document.getElementById('edit-id').value = v.id;
            document.getElementById('in-title').value = v.title;
            document.getElementById('in-url').value = v.url;
            document.getElementById('in-tags').value = v.tags || "";
            openSummon();
        }

        function deleteVideo(id, title) { if(confirm(`Banish ${title}?`)) db.ref('vault/'+id).remove(); }
    </script>
</body>
</html>
