<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gothic Archive</title>
    
    <!-- 1. CORE FIREBASE V8 ENGINE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- CORE ARCHIVE INTERFACE STYLE --- */
        :root {
            --bg-dark: #0a0a0c;
            --accent-blood: #800020;
            --panel-dark: #121216;
            --text-goth: #d4d4dc;
            --grid-line: rgba(128, 0, 32, 0.15);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-goth);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        #archive-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Guide Grid (Only active during editing) */
        .edit-mode #archive-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        .controls-bar {
            background: var(--panel-dark);
            border: 1px solid var(--accent-blood);
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        button, input, select {
            background: #1c1c22;
            border: 1px solid var(--accent-blood);
            color: var(--text-goth);
            padding: 8px 15px;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-blood);
            color: #fff;
        }

        /* Relic Grid Item Structure */
        .relic-item {
            position: absolute;
            background: var(--panel-dark);
            border: 1px solid #2a2a35;
            padding: 10px;
            box-sizing: border-box;
            cursor: move;
            z-index: 2;
            transition: border-color 0.2s;
        }

        .relic-item:hover {
            border-color: var(--accent-blood);
        }

        .relic-thumb {
            width: 100%;
            height: calc(100% - 30px);
            object-fit: cover;
            background: #000;
        }

        .relic-title {
            height: 25px;
            line-height: 25px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }

        /* Context Menu Styling (Scrollable) */
        .goth-context-menu {
            position: fixed;
            background: var(--panel-dark);
            border: 1px solid var(--accent-blood);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            z-index: 10000;
            max-height: 300px;
            overflow-y: auto;
            width: 200px;
        }

        .goth-context-menu div {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #1c1c22;
        }

        .goth-context-menu div:hover {
            background: var(--accent-blood);
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- 2. CONTROLS INTERFACE -->
    <div class="controls-bar">
        <input type="text" id="relic-url" placeholder="Paste Video/Note Link Here">
        <input type="text" id="relic-name" placeholder="Item Name">
        <button id="btn-deposit">Deposit Link</button>
        <button id="btn-toggle-edit">Toggle Edit Mode</button>
        <button id="btn-recenter">Formation Recentering</button>
    </div>

    <!-- 3. PERSISTENT GRID WORKSPACE -->
    <div id="archive-container"></div>

    <script>
        // ==========================================
        // 4. DATABASE INITIALIZATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Secure Initialization check
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        let editModeActive = false;
        const container = document.getElementById('archive-container');

        // ==========================================
        // 5. THE REAL-TIME REFRESH LINK
        // ==========================================
        // This watches the database live. When you reload, this immediately draws your entries.
        db.collection("notes").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
            container.innerHTML = ""; // Clear out workspace to rebuild fresh state
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                createRelicElement(doc.id, data);
            });
            
            // Reapply item drag settings if edit mode was active
            if (editModeActive) makeRelicsInteractive();
        }, (error) => {
            console.error("Firestore loading error on sync loop: ", error);
        });

        // ==========================================
        // 6. DEPOSIT FUNCTION (DATA PERSISTENCE TARGET)
        // ==========================================
        document.getElementById('btn-deposit').addEventListener('click', () => {
            const url = document.getElementById('relic-url').value.trim();
            const name = document.getElementById('relic-name').value.trim() || "Untitled Relic";

            if (!url) {
                alert("Please drop a valid link before attempting deposit.");
                return;
            }

            // Calculate staggered layout grid points safely
            const currentItemCount = container.children.length;
            const calculatedLeft = (currentItemCount * 50) % (window.innerWidth - 200) + 20;
            const calculatedTop = Math.floor((currentItemCount * 50) / (window.innerWidth - 200)) * 200 + 100;

            const newRelic = {
                title: name,
                linkUrl: url,
                imageUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400", // Default gothic placeholder
                x: calculatedLeft,
                y: calculatedTop,
                width: 220,
                height: 160,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            // CRITICAL: We write to the server directly! The snapshot listener above handles drawing it.
            db.collection("notes").add(newRelic)
                .then(() => {
                    document.getElementById('relic-url').value = "";
                    document.getElementById('relic-name').value = "";
                })
                .catch((err) => {
                    console.error("Write execution dropped by application script: ", err);
                });
        });

        // ==========================================
        // 7. INTERFACE BUILDER & EDIT MECHANICS
        // ==========================================
        function createRelicElement(id, data) {
            const relic = document.createElement('div');
            relic.className = 'relic-item';
            relic.id = id;
            relic.style.left = `${data.x}px`;
            relic.style.top = `${data.y}px`;
            relic.style.width = `${data.width}px`;
            relic.style.height = `${data.height}px`;

            relic.innerHTML = `
                <img src="${data.imageUrl}" class="relic-thumb" alt="Archive Resource">
                <div class="relic-title">${data.title}</div>
            `;

            // Handle standard viewing interaction (Double click opens resource link)
            relic.addEventListener('dblclick', () => {
                window.open(data.linkUrl, '_blank');
            });

            // Handle performance context menus (Long Press or Right Click)
            relic.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                spawnContextMenu(e, id, data);
            });

            container.appendChild(relic);
        }

        // Context Menu Implementation with mandatory layout requirements preserved
        function spawnContextMenu(e, id, data) {
            // Remove preexisting menus instantly
            const oldMenu = document.querySelector('.goth-context-menu');
            if (oldMenu) oldMenu.remove();

            const menu = document.createElement('div');
            menu.className = 'goth-context-menu';
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;

            menu.innerHTML = `
                <div onclick="window.open('${data.linkUrl}', '_blank')">Open in New Tab</div>
                <div onclick="renameRelic('${id}')">Rename</div>
                <div onclick="changeRelicImage('${id}')">Change Image</div>
                <div onclick="snapToOriginalShape('${id}')">Snap to Original Shape</div>
                <div onclick="deleteRelicConfirmation('${id}')" style="color: #ff4d4d;">Delete Relic</div>
            `;

            document.body.appendChild(menu);

            // Close context menu on external click safely
            setTimeout(() => {
                document.addEventListener('click', function closeMenu() {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                });
            }, 50);
        }

        // ==========================================
        // 8. MANDATORY DATABASE MUTATION MANAGEMENT
        // ==========================================
        window.renameRelic = function(id) {
            const currentTitle = document.getElementById(id).querySelector('.relic-title').innerText;
            const newName = prompt("Enter replacement asset marker designation:", currentTitle);
            if (newName) {
                db.collection("notes").doc(id).update({ title: newName });
            }
        };

        window.changeRelicImage = function(id) {
            const newImg = prompt("Paste structural URL target for asset thumb visualization:");
            if (newImg) {
                db.collection("notes").doc(id).update({ imageUrl: newImg });
            }
        };

        window.snapToOriginalShape = function(id) {
            db.collection("notes").doc(id).update({
                width: 220,
                height: 160
            });
        };

        window.deleteRelicConfirmation = function(id) {
            if (confirm("Are you absolutely sure you want to purge this record from the archive structure permanently?")) {
                db.collection("notes").doc(id).delete();
            }
        };

        // Grid Dragging with soft snap functionality integrated
        function makeRelicsInteractive() {
            const items = document.querySelectorAll('.relic-item');
            items.forEach(item => {
                let isDragging = false;
                let startX, startY;

                item.addEventListener('mousedown', (e) => {
                    if (!editModeActive || e.button !== 0) return;
                    isDragging = true;
                    startX = e.clientX - item.offsetLeft;
                    startY = e.clientY - item.offsetTop;
                    item.style.zIndex = 1000;
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    let newX = e.clientX - startX;
                    let newY = e.clientY - startY;

                    // Soft grid alignment snapping (40px increments)
                    if (editModeActive) {
                        newX = Math.round(newX / 40) * 40;
                        newY = Math.round(newY / 40) * 40;
                    }

                    item.style.left = `${newX}px`;
                    item.style.top = `${newY}px`;
                });

                document.addEventListener('mouseup', () => {
                    if (!isDragging) return;
                    isDragging = false;
                    item.style.zIndex = 2;

                    // Write updated positions back into cloud documents permanently
                    db.collection("notes").doc(item.id).update({
                        x: parseInt(item.style.left),
                        y: parseInt(item.style.top)
                    });
                });
            });
        }

        // Mode Switching UI Controller
        document.getElementById('btn-toggle-edit').addEventListener('click', () => {
            editModeActive = !editModeActive;
            document.body.classList.toggle('edit-mode', editModeActive);
            document.getElementById('btn-toggle-edit').innerText = editModeActive ? "Exit Edit Mode" : "Toggle Edit Mode";
            if (editModeActive) {
                makeRelicsInteractive();
            } else {
                // Remove interactive styling bindings instantly
                location.reload(); 
            }
        });

        // Formation Style Recentering Mechanics
        document.getElementById('btn-recenter').addEventListener('click', () => {
            const items = document.querySelectorAll('.relic-item');
            items.forEach((item, index) => {
                const targetX = (index * 60) % (window.innerWidth - 260) + 40;
                const targetY = Math.floor((index * 60) / (window.innerWidth - 260)) * 180 + 120;
                
                db.collection("notes").doc(item.id).update({
                    x: targetX,
                    y: targetY
                });
            });
        });
    </script>
</body>
</html>
