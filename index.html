<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
            --grid-color: rgba(197, 160, 89, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        /* --- LOADING GATE --- */
        #loading-gate {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--gothic-black);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #auth-ui { display: none; text-align: center; }

        .ritual-btn {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 20px;
        }

        /* --- THE ARCHIVE --- */
        #archive-ui { display: none; width: 100%; height: 100%; position: relative; }
        #viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; }
        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .status-msg { margin-top: 20px; font-size: 12px; letter-spacing: 2px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="loading-gate">
        <h1 style="letter-spacing: 8px; font-weight: 300;">THE GOTHIC ARCHIVE</h1>
        
        <div id="auth-ui">
            <button class="ritual-btn" onclick="summon()">Summon Archive</button>
        </div>

        <div id="status" class="status-msg">CONSULTING THE ORACLE...</div>
    </div>

    <div id="archive-ui">
        <div id="viewport">
            <div id="canvas"></div>
        </div>
        <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:20px; z-index:1001;">
            <button onclick="saveArchive()" style="background:rgba(0,0,0,0.9); border:1px solid var(--gothic-gold); color:var(--gothic-gold); padding:10px 20px; cursor:pointer;">SEAL</button>
            <button onclick="banish()" style="background:rgba(0,0,0,0.9); border:1px solid var(--gothic-red); color:var(--gothic-red); padding:10px 20px; cursor:pointer;">BANISH</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();
        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        const gate = document.getElementById('loading-gate');
        const authUI = document.getElementById('auth-ui');
        const status = document.getElementById('status');
        const archive = document.getElementById('archive-ui');

        async function summon() {
            status.innerText = "REDIRECTING TO GOOGLE...";
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            auth.signInWithRedirect(provider);
        }

        function banish() {
            auth.signOut().then(() => window.location.reload());
        }

        // --- THE LOGIC GATE ---
        auth.getRedirectResult().then((result) => {
            // result handled by onAuthStateChanged
        }).catch(err => {
            status.innerText = "RITUAL FAILED: " + err.message;
            authUI.style.display = 'block';
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.uid === MASTER_UID) {
                    status.innerText = "MASTER VERIFIED.";
                    setTimeout(() => {
                        gate.style.opacity = '0';
                        setTimeout(() => {
                            gate.style.display = 'none';
                            archive.style.display = 'block';
                            loadArchive();
                        }, 500);
                    }, 800);
                } else {
                    status.innerText = "INTRUDER DETECTED.";
                    auth.signOut();
                }
            } else {
                // No user found, show the login button
                status.innerText = "THE GATE IS LOCKED.";
                authUI.style.display = 'block';
            }
        });

        function saveArchive() {
            const user = auth.currentUser;
            if (user && user.uid === MASTER_UID) {
                db.ref('archive/' + user.uid).set({ lastUpdated: Date.now() })
                .then(() => alert("ARCHIVE SEALED."));
            }
        }

        function loadArchive() {
            const v = document.getElementById('viewport');
            v.scrollLeft = (5000 - window.innerWidth) / 2;
            v.scrollTop = (5000 - window.innerHeight) / 2;
        }
    </script>
</body>
</html>
