<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        /* Fixed Navigation / Control Bar */
        #control-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 90vw;
            overflow-x: auto;
            white-space: nowrap;
        }

        .btn {
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border-radius: 2px;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 8px rgba(128, 0, 32, 0.4);
        }

        .btn.active {
            background: var(--accent-color);
            border-color: var(--accent-glow);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-color);
        }

        /* Scale Indicator */
        #scale-display {
            font-size: 11px;
            color: var(--text-dim);
            min-width: 45px;
            text-align: center;
        }

        /* Viewport and Canvas */
        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            cursor: grab;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 5000px;
            height: 5000px;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(to right, rgba(38, 38, 38, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(38, 38, 38, 0.1) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            transform-origin: 0 0;
        }

        /* Guide Grid - Visible only in Edit Mode */
        body.edit-mode #canvas::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(128, 0, 32, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(128, 0, 32, 0.15) 1px, transparent 1px);
            background-size: calc(var(--grid-size) * 2) calc(var(--grid-size) * 2);
            pointer-events: none;
        }

        /* Conditional Visibility Classes */
        .edit-only {
            display: none !important;
        }
        body.edit-mode .edit-only {
            display: inline-block !important;
        }
        body.edit-mode .btn.edit-only {
            display: inline-block !important;
        }

        /* Relic Display Nodes / Folders */
        .relic {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 140px;
            min-height: 140px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: none;
            z-index: 10;
        }

        .relic.dragging {
            z-index: 100;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(128, 0, 32, 0.6);
        }

        .relic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            cursor: move;
        }

        .relic-title {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }

        .relic-menu-trigger {
            cursor: pointer;
            color: var(--text-dim);
            padding: 0 4px;
        }

        .relic-menu-trigger:hover {
            color: var(--text-color);
        }

        .relic-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .relic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
            pointer-events: none;
        }

        .relic-link {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            font-size: 11px;
            text-align: center;
            background: rgba(13, 13, 13, 0.4);
            transition: background 0.2s;
        }

        .relic-link:hover {
            background: rgba(13, 13, 13, 0.1);
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }

        /* Resize Handle */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--border-color) 50%);
        }

        body.edit-mode .resize-handle {
            background: linear-gradient(135deg, transparent 50%, var(--accent-color) 50%);
        }

        /* Folders Style Modification */
        .folder {
            border-style: double;
            border-width: 3px;
        }

        /* Context Popup Menu - Scrollable */
        #context-menu {
            position: fixed;
            background: #141414;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            border-radius: 3px;
            max-height: 240px;
            overflow-y: auto;
            width: 180px;
        }

        .menu-item {
            padding: 10px 14px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--text-color);
            border-bottom: 1px solid rgba(38, 38, 38, 0.5);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: #fff;
        }

        /* Modals Frame Infrastructure */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #141414;
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
            width: 320px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .modal-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 2px;
            width: 100%;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Top Fixed Control system -->
    <div id="control-bar">
        <button class="btn" id="btn-edit-mode">Edit Mode</button>
        <button class="btn edit-only" id="btn-add-link">Add Link</button>
        <button class="btn edit-only" id="btn-add-folder">Add Folder</button>
        <button class="btn edit-only" id="btn-recentering">Recenter View</button>
        <button class="btn" id="btn-save">Save Archive</button>
        <button class="btn" id="btn-load">Load Archive</button>
        <span id="scale-display">100%</span>
    </div>

    <!-- Scrollable Infinite Field Viewport -->
    <div id="viewport">
        <div id="canvas"></div>
    </div>

    <!-- Shared Scrollable Context Menu -->
    <div id="context-menu">
        <div class="menu-item" data-action="open-tab">Open in New Tab</div>
        <div class="menu-item" data-action="rename">Rename</div>
        <div class="menu-item" data-action="change-image">Change Image</div>
        <div class="menu-item" data-action="snap-shape">Resize to Original</div>
        <div class="menu-item" data-action="move-folder">Move to Folder</div>
        <div class="menu-item" data-action="delete">Delete</div>
    </div>

    <!-- Reusable Modal Window Infrastructure -->
    <div class="modal-overlay" id="archive-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-title-text">Prompt</div>
            <div id="modal-body-content"></div>
            <div class="modal-actions">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn" id="modal-confirm" style="background: var(--accent-color);">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // State Configuration Architecture
        const state = {
            isEditMode: false,
            scale: 1,
            panX: 0,
            panY: 0,
            isPanning: false,
            startX: 0,
            startY: 0,
            draggedElement: null,
            dragOffsetX: 0,
            dragOffsetY: 0,
            resizingElement: null,
            initialWidth: 0,
            initialHeight: 0,
            activeTargetId: null,
            gridSnapSize: 20,
            relics: [
                { id: "1", title: "The Crow", type: "link", url: "https://www.imdb.com", img: "https://picsum.photos/id/1062/200/200", x: 200, y: 200, w: 160, h: 160, origW: 160, origH: 160, folder: null },
                { id: "2", title: "Gothic Tech", type: "folder", x: 440, y: 200, w: 180, h: 180, origW: 180, origH: 180, folder: null },
                { id: "3", title: "Sub-Item Alpha", type: "link", url: "https://github.com", img: "", x: 20, y: 40, w: 140, h: 140, origW: 140, origH: 140, folder: "2" }
            ]
        };

        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');
        const contextMenu = document.getElementById('context-menu');
        const scaleDisplay = document.getElementById('scale-display');

        // Initial launch systems setup
        window.addEventListener('DOMContentLoaded', () => {
            recenterWorkspace();
            renderArchive();
            setupInteractions();
            setupGlobalMenus();
        });

        function recenterWorkspace() {
            // Formation style centering calculations relative to screen dimensions
            const vWidth = viewport.clientWidth;
            const vHeight = viewport.clientHeight;
            state.panX = (vWidth / 2) - 300;
            state.panY = (vHeight / 2) - 300;
            state.scale = 1;
            updateTransform();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            scaleDisplay.textContent = `${Math.round(state.scale * 100)}%`;
        }

        // Infinite Scroll & Render Engine Core
        function renderArchive() {
            canvas.innerHTML = '';
            
            // Filter elements cleanly across outer parent frameworks
            state.relics.forEach(relic => {
                if (relic.folder === null) {
                    canvas.appendChild(createRelicElement(relic));
                }
            });

            // Map subelements safely within internal folder layers
            state.relics.forEach(relic => {
                if (relic.folder !== null) {
                    const parentFolder = document.querySelector(`[data-id="${relic.folder}"] .relic-body`);
                    if (parentFolder) {
                        const el = createRelicElement(relic);
                        el.style.position = "absolute";
                        el.style.left = `${relic.x}px`;
                        el.style.top = `${relic.y}px`;
                        parentFolder.appendChild(el);
                    }
                }
            });
        }

        function createRelicElement(relic) {
            const node = document.createElement('div');
            node.className = `relic ${relic.type === 'folder' ? 'folder' : ''}`;
            node.style.left = `${relic.x}px`;
            node.style.top = `${relic.y}px`;
            node.style.width = `${relic.w}px`;
            node.style.height = `${relic.h}px`;
            node.setAttribute('data-id', relic.id);

            const header = document.createElement('div');
            header.className = 'relic-header';
            
            const title = document.createElement('div');
            title.className = 'relic-title';
            title.textContent = relic.title;
            
            const trigger = document.createElement('div');
            trigger.className = 'relic-menu-trigger';
            trigger.innerHTML = '&#8942;';
            
            header.appendChild(title);
            header.appendChild(trigger);
            node.appendChild(header);

            const body = document.createElement('div');
            body.className = 'relic-body';

            if (relic.type === 'link') {
                if (relic.img) {
                    const img = document.createElement('img');
                    img.className = 'relic-img';
                    img.src = relic.img;
                    body.appendChild(img);
                }
                const link = document.createElement('a');
                link.className = 'relic-link';
                link.href = state.isEditMode ? '#' : relic.url;
                if (!state.isEditMode) link.target = '_blank';
                link.textContent = relic.img ? '' : relic.title;
                body.appendChild(link);
            }

            node.appendChild(body);

            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            node.appendChild(handle);

            return node;
        }

        // Drag, Drop, Zoom & Soft Snap to Grid Infrastructure
        function setupInteractions() {
            viewport.addEventListener('mousedown', (e) => {
                if (e.target === viewport || e.target === canvas) {
                    state.isPanning = true;
                    state.startX = e.clientX - state.panX;
                    state.startY = e.clientY - state.panY;
                }
            });

            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 0.05;
                state.scale = e.deltaY < 0 ? Math.min(state.scale + zoomFactor, 2) : Math.max(state.scale - zoomFactor, 0.4);
                updateTransform();
            }, { passive: false });

            window.addEventListener('mousemove', (e) => {
                if (state.isPanning) {
                    state.panX = e.clientX - state.startX;
                    state.panY = e.clientY - state.startY;
                    updateTransform();
                } else if (state.draggedElement && state.isEditMode) {
                    let rawX = (e.clientX - state.dragOffsetX) / state.scale;
                    let rawY = (e.clientY - state.dragOffsetY) / state.scale;
                    
                    // Soft snap layout calculator matrix
                    let snappedX = Math.round(rawX / state.gridSnapSize) * state.gridSnapSize;
                    let snappedY = Math.round(rawY / state.gridSnapSize) * state.gridSnapSize;

                    state.draggedElement.style.left = `${snappedX}px`;
                    state.draggedElement.style.top = `${snappedY}px`;
                } else if (state.resizingElement && state.isEditMode) {
                    const deltaX = (e.clientX - state.startX) / state.scale;
                    const deltaY = (e.clientY - state.startY) / state.scale;
                    
                    let targetW = Math.round((state.initialWidth + deltaX) / state.gridSnapSize) * state.gridSnapSize;
                    let targetH = Math.round((state.initialHeight + deltaY) / state.gridSnapSize) * state.gridSnapSize;

                    state.resizingElement.style.width = `${Math.max(targetW, 80)}px`;
                    state.resizingElement.style.height = `${Math.max(targetH, 80)}px`;
                }
            });

            window.addEventListener('mouseup', () => {
                if (state.draggedElement) {
                    const relic = state.relics.find(r => r.id === state.draggedElement.getAttribute('data-id'));
                    if (relic) {
                        relic.x = parseInt(state.draggedElement.style.left);
                        relic.y = parseInt(state.draggedElement.style.top);
                    }
                    state.draggedElement.classList.remove('dragging');
                    state.draggedElement = null;
                }
                if (state.resizingElement) {
                    const relic = state.relics.find(r => r.id === state.resizingElement.getAttribute('data-id'));
                    if (relic) {
                        relic.w = parseInt(state.resizingElement.style.width);
                        relic.h = parseInt(state.resizingElement.style.height);
                    }
                    state.resizingElement = null;
                }
                state.isPanning = false;
            });

            // Universal Click Delegation Routers
            canvas.addEventListener('mousedown', (e) => {
                const trigger = e.target.closest('.relic-menu-trigger');
                const handle = e.target.closest('.resize-handle');
                const relicEl = e.target.closest('.relic');

                if (trigger && relicEl) {
                    e.stopPropagation();
                    state.activeTargetId = relicEl.getAttribute('data-id');
                    showContextMenu(e.clientX, e.clientY);
                    return;
                }

                if (handle && relicEl && state.isEditMode) {
                    e.stopPropagation();
                    state.resizingElement = relicEl;
                    state.startX = e.clientX;
                    state.startY = e.clientY;
                    state.initialWidth = relicEl.offsetWidth;
                    state.initialHeight = relicEl.offsetHeight;
                    return;
                }

                if (relicEl && state.isEditMode && e.target.closest('.relic-header')) {
                    e.stopPropagation();
                    state.draggedElement = relicEl;
                    relicEl.classList.add('dragging');
                    const rect = relicEl.getBoundingClientRect();
                    state.dragOffsetX = e.clientX - rect.left;
                    state.dragOffsetY = e.clientY - rect.top;
                }
            });

            // Touch finger gesture mappings
            canvas.addEventListener('touchstart', (e) => {
                if(e.touches.length === 1) {
                    const touch = e.touches[0];
                    const handle = touch.target.closest('.resize-handle');
                    const relicEl = touch.target.closest('.relic');

                    if (handle && relicEl && state.isEditMode) {
                        state.resizingElement = relicEl;
                        state.startX = touch.clientX;
                        state.startY = touch.clientY;
                        state.initialWidth = relicEl.offsetWidth;
                        state.initialHeight = relicEl.offsetHeight;
                    }
                }
            }, {passive: true});
        }

        function showContextMenu(mx, my) {
            contextMenu.style.left = `${mx}px`;
            contextMenu.style.top = `${my}px`;
            contextMenu.style.display = 'block';
        }

        // Global Command Handlers Infrastructure Map
        function setupGlobalMenus() {
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu') && !e.target.closest('.relic-menu-trigger')) {
                    contextMenu.style.display = 'none';
                }
            });

            contextMenu.addEventListener('click', (e) => {
                const action = e.target.getAttribute('data-action');
                if (!action) return;
                contextMenu.style.display = 'none';
                executeMenuAction(action);
            });

            document.getElementById('btn-edit-mode').addEventListener('click', (e) => {
                state.isEditMode = !state.isEditMode;
                document.body.classList.toggle('edit-mode', state.isEditMode);
                e.target.classList.toggle('active', state.isEditMode);
                renderArchive();
            });

            document.getElementById('btn-recentering').addEventListener('click', recenterWorkspace);

            document.getElementById('btn-add-link').addEventListener('click', () => {
                openPromptModal("Add Connection Link", "Enter connection node title name:", (title) => {
                    if(!title) return;
                    openPromptModal("Input Target URL", "Provide target navigation string absolute path:", (targetUrl) => {
                        if(!targetUrl) return;
                        const newId = String(Date.now());
                        state.relics.push({
                            id: newId, title: title, type: "link", url: targetUrl, img: "",
                            x: 160, y: 160, w: 140, h: 140, origW: 140, origH: 140, folder: null
                        });
                        renderArchive();
                    });
                });
            });

            document.getElementById('btn-add-folder').addEventListener('click', () => {
                openPromptModal("Create Structural Directory", "Enter folder node directory tag name:", (title) => {
                    if(!title) return;
                    const newId = String(Date.now());
                    state.relics.push({
                        id: newId, title: title, type: "folder",
                        x: 200, y: 200, w: 180, h: 180, origW: 180, origH: 180, folder: null
                    });
                    renderArchive();
                });
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                localStorage.setItem('gothic_archive_formation_save', JSON.stringify(state.relics));
                alert("Archive map structure safely compiled inside localized index blocks.");
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const stored = localStorage.getItem('gothic_archive_formation_save');
                if (stored) {
                    state.relics = JSON.parse(stored);
                    renderArchive();
                } else {
                    alert("No previous data matrix maps discovered inside application cache registry.");
                }
            });
        }

        function executeMenuAction(action) {
            const relic = state.relics.find(r => r.id === state.activeTargetId);
            if (!relic) return;

            switch(action) {
                case 'open-tab':
                    if (relic.type === 'link') window.open(relic.url, '_blank');
                    break;
                case 'rename':
                    openPromptModal("Rename Element Index", `Modify name string configurations for [${relic.title}]:`, (newName) => {
                        if (newName) {
                            relic.title = newName;
                            renderArchive();
                        }
                    }, relic.title);
                    break;
                case 'change-image':
                    openPromptModal("Modify Display Thumbnail Source", "Provide absolute system path link localization:", (newUrl) => {
                        if (newUrl !== null) {
                            relic.img = newUrl;
                            renderArchive();
                        }
                    }, relic.img || "");
                    break;
                case 'snap-shape':
                    relic.w = relic.origW || 140;
                    relic.h = relic.origH || 140;
                    renderArchive();
                    break;
                case 'move-folder':
                    const targets = state.relics.filter(r => r.type === 'folder' && r.id !== relic.id);
                    if(targets.length === 0) {
                        alert("No alternative navigation directory targets currently configured.");
                        return;
                    }
                    let promptMsg = "Available operational locations:\nID : Name\n0 : [Root Framework Matrix Base]\n";
                    targets.forEach(t => promptMsg += `${t.id} : ${t.title}\n`);
                    openPromptModal("Move Element Location Layer", promptMsg + "\nSpecify target directory index ID identifier:", (targetFolderId) => {
                        if(targetFolderId === "0") {
                            relic.folder = null;
                        } else if(state.relics.some(r => r.id === targetFolderId && r.type === 'folder')) {
                            relic.folder = targetFolderId;
                        }
                        renderArchive();
                    });
                    break;
                case 'delete':
                    openConfirmModal("Purge Confirmation Verification", `Permanently dismantle element track [${relic.title}] from workspace indices?`, () => {
                        state.relics = state.relics.filter(r => r.id !== relic.id);
                        state.relics.forEach(r => { if(r.folder === relic.id) r.folder = null; });
                        renderArchive();
                    });
                    break;
            }
        }

        // Overlay Overlay Modal Framework Window Implementations
        function openPromptModal(title, text, callback, defaultVal = "") {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <input type="text" class="modal-input" id="modal-custom-field" value="${defaultVal}">
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-custom-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openConfirmModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `<p style="font-size:11px; line-height:1.4; color:var(--text-color);">${text}</p>`;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                cleanup();
                callback();
            };

            cancelBtn.onclick = () => {
                cleanup();
            };
        }
    </script>
</body>
</html>
