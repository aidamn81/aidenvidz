<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
            --gothic-grey: #1a1a1a;
            --grid-line: rgba(197, 160, 89, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            touch-action: none;
        }

        /* --- THE INFINITE CANVAS --- */
        #viewport {
            width: 100vw; height: 100vh;
            overflow: auto;
            position: relative;
            cursor: grab;
        }

        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-color: var(--gothic-black);
            /* Formation Grid - Visible only in Edit Mode via JS class */
            background-image: radial-gradient(var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            transition: background-image 0.3s ease;
        }

        #canvas.edit-mode {
            --grid-line: rgba(197, 160, 89, 0.15);
        }

        /* --- RELICS & FOLDERS --- */
        .relic {
            position: absolute;
            min-width: 100px; min-height: 100px;
            border: 1px solid transparent;
            cursor: move;
            transition: border 0.3s ease;
        }

        .edit-mode .relic {
            border: 1px dashed var(--gothic-gold);
        }

        .relic img {
            width: 100%; height: auto;
            display: block;
            pointer-events: none;
        }

        /* --- INTERFACE --- */
        .ui-panel {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border: 1px solid var(--gothic-gold);
            backdrop-filter: blur(8px);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            color: var(--gothic-gold);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 10px;
        }

        .btn:hover { text-shadow: 0 0 10px var(--gothic-gold); }

        #loading-shroud {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--gothic-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loading-shroud">VERIFYING IDENTITY...</div>

    <div id="viewport">
        <div id="canvas">
            </div>
    </div>

    <div class="ui-panel">
        <div class="btn" onclick="toggleEdit()">Edit Mode</div>
        <div class="btn" onclick="saveArchive()">Seal Progress</div>
        <div class="btn" onclick="centerCanvas()">Recenter</div>
        <div class="btn" onclick="banish()" style="color: var(--gothic-red);">Banish</div>
    </div>

        let isEditMode = false;

        function toggleEdit() {

            alert(isEditMode ? "Edit Mode Active: Soft Snap Enabled" : "Edit Mode Locked");
        }

        function centerCanvas() {
            const viewport = document.getElementById('viewport');
            viewport.scrollLeft = (5000 - window.innerWidth) / 2;
            viewport.scrollTop = (5000 - window.innerHeight) / 2;
        }

        function banish() {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        }

        // --- DATA PERSISTENCE ---
        function saveArchive() {

    </script>
</body>
</html>
