<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --gothic-red: #4a0404; --deep-black: #050505; --gold: #c5a059; --soft-white: #e0e0e0; }
        body { background-color: var(--deep-black); color: var(--soft-white); font-family: 'Garamond', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #theater-section { width: 100%; background: #000; padding: 20px; border-bottom: 2px solid var(--gothic-red); display: flex; justify-content: center; }
        .player-wrapper { width: 90%; max-width: 800px; box-shadow: 0 0 40px rgba(74,4,4,0.6); border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; position: relative; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 95%; padding: 40px 0; }
        .video-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .thumb-box { width: 100%; height: 120px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-label { padding: 12px; font-size: 0.9rem; text-align: center; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <div id="theater-section">
        <div class="player-wrapper">
            <iframe id="master-frame" src="about:blank" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <div id="video-grid">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPath = 'archive/ca58db7b-32a7-4ebe-b918-754161bd1fe0';

        // Connect to your existing data
        db.ref(userPath).on('value', (snap) => {
            const data = snap.val();
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            
            if (data && data.relics) {
                Object.entries(data.relics).forEach(([id, video]) => {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    card.onclick = () => playVideo(video.url, video.title);
                    
                    const thumb = video.customThumb || video.thumbnail || "https://via.placeholder.com/200x120/050505/c5a059?text=👁️";
                    card.innerHTML = `
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <div class="card-label">${video.title}</div>
                    `;
                    grid.appendChild(card);
                });
            }
        });

        function playVideo(url, title) {
            const frame = document.getElementById('master-frame');
            // Auto-convert pCloud links to embed mode to bypass access errors
            let embedUrl = url;
            if (embedUrl.includes('pcloud.link/publink/show')) {
                embedUrl = embedUrl.replace('show?code=', 'show?code=') + "&mode=video";
            }
            frame.src = embedUrl;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
