<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        /* Fixed Upper Interface Wrapper for Layout Synchronization */
        #fixed-top-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0d0d0d;
            z-index: 1500;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fixed Navigation / Control Bar on Top of Video Player */
        #control-bar {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 95vw;
            max-width: 800px;
            margin-top: 15px;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* Master Media Stream Presentation Player Screen Framework */
        #player-container {
            width: 95vw;
            max-width: 800px;
            height: 40vh;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body.edit-mode #player-container {
            border-color: var(--accent-color);
        }

        #media-screen {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        #player-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            gap: 10px;
            pointer-events: none;
            z-index: 5;
        }

        #player-titlebar {
            background: #111;
            border-bottom: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 11px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border-radius: 2px;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 8px rgba(128, 0, 32, 0.4);
        }

        .btn.active {
            background: var(--accent-color);
            border-color: var(--accent-glow);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-color);
        }

        /* Scale Indicator */
        #scale-display {
            font-size: 11px;
            color: var(--text-dim);
            min-width: 45px;
            text-align: center;
        }

        /* Dynamic Field Viewport Adjusted Below Player Wrapper Stack */
        #viewport {
            position: absolute;
            top: calc(90px + 40vh);
            left: 0;
            width: 100%;
            height: calc(100% - (90px + 40vh));
            overflow: auto;
            cursor: grab;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 5000px;
            height: 5000px;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(to right, rgba(38, 38, 38, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(38, 38, 38, 0.1) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            transform-origin: 0 0;
        }

        /* Guide Grid - Visible only in Edit Mode */
        body.edit-mode #canvas::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(128, 0, 32, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(128, 0, 32, 0.15) 1px, transparent 1px);
            background-size: calc(var(--grid-size) * 2) calc(var(--grid-size) * 2);
            pointer-events: none;
        }

        /* Conditional Visibility Classes */
        .edit-only {
            display: none !important;
        }
        body.edit-mode .edit-only {
            display: inline-block !important;
        }
        body.edit-mode .btn.edit-only {
            display: inline-block !important;
        }

        /* Relic Display Nodes / Folders */
        .relic {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 140px;
            min-height: 140px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: none;
            z-index: 10;
        }

        .relic.dragging {
            z-index: 100;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(128, 0, 32, 0.6);
        }

        .relic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            cursor: move;
        }

        body:not(.edit-mode) .relic-header {
            cursor: pointer;
        }

        .relic-title {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 16px);
        }

        .relic-menu-trigger {
            cursor: pointer;
            color: var(--text-dim);
            padding: 0 4px;
        }

        .relic-menu-trigger:hover {
            color: var(--text-color);
        }

        .relic-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 2px;
            cursor: pointer;
        }

        .relic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
            pointer-events: none;
        }

        .relic-fallback-text {
            font-size: 11px;
            text-align: center;
            padding: 6px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Resize Handle */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--border-color) 50%);
        }

        body.edit-mode .resize-handle {
            background: linear-gradient(135deg, transparent 50%, var(--accent-color) 50%);
        }

        /* Folders Style Modification */
        .folder {
            border-style: double;
            border-width: 3px;
        }

        /* Context Popup Menu - Scrollable */
        #context-menu {
            position: fixed;
            background: #141414;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            border-radius: 3px;
            max-height: 240px;
            overflow-y: auto;
            width: 180px;
        }

        .menu-item {
            padding: 10px 14px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--text-color);
            border-bottom: 1px solid rgba(38, 38, 38, 0.5);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: #fff;
        }

        /* Modals Frame Infrastructure */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #141414;
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
            width: 320px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .modal-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 2px;
            width: 100%;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            <button class="btn" id="btn-edit-mode">Edit Mode</button>
            <button class="btn edit-only" id="btn-add-link">Add Video Link</button>
            <button class="btn edit-only" id="btn-add-folder">Add Folder</button>
            <button class="btn edit-only" id="btn-recentering">Recenter View</button>
            <button class="btn" id="btn-save">Save Archive</button>
            <button class="btn" id="btn-load">Load Archive</button>
            <span id="scale-display">100%</span>
        </div>

        <div id="player-container">
            <div id="player-titlebar">System Player: Idle</div>
            <div style="position: relative; flex: 1; width: 100%; height: 100%;">
                <div id="player-placeholder">
                    <span>☠ No Active Video Streaming ☠</span>
                    <span style="font-size: 10px; color: #555;">Select any video thumbnail element below to load stream tracks</span>
                </div>
                <iframe id="media-screen" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="viewport">
        <div id="canvas"></div>
    </div>

    <div id="context-menu">
        <div class="menu-item" data-action="play-media">Play Video</div>
        <div class="menu-item edit-only" data-action="rename">Rename</div>
        <div class="menu-item edit-only" data-action="change-image">Change Thumbnail</div>
        <div class="menu-item edit-only" data-action="snap-shape">Resize to Original</div>
        <div class="menu-item edit-only" data-action="move-folder">Move to Folder</div>
        <div class="menu-item edit-only" data-action="delete">Delete</div>
    </div>

    <div class="modal-overlay" id="archive-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-title-text">Prompt</div>
            <div id="modal-body-content"></div>
            <div class="modal-actions">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn" id="modal-confirm" style="background: var(--accent-color);">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // State Configuration Architecture Map Modules Data Setup
        const state = {
            isEditMode: false,
            scale: 1,
            panX: 0,
            panY: 0,
            isPanning: false,
            startX: 0,
            startY: 0,
            draggedElement: null,
            dragOffsetX: 0,
            dragOffsetY: 0,
            resizingElement: null,
            initialWidth: 0,
            initialHeight: 0,
            activeTargetId: null,
            gridSnapSize: 20,
            longPressTimer: null,
            relics: []
        };

        // Static hardcoded fallback initialization blocks used if no database registry is saved
        const defaultSetup = [
            { id: "1", title: "The Crow", type: "link", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "https://picsum.photos/id/1062/200/200", x: 40, y: 40, w: 160, h: 160, origW: 160, origH: 160, folder: null },
            { id: "2", title: "Gothic Tech", type: "folder", x: 260, y: 40, w: 180, h: 180, origW: 180, origH: 180, folder: null },
            { id: "3", title: "Sub-Item Alpha", type: "link", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "", x: 20, y: 40, w: 140, h: 140, origW: 140, origH: 140, folder: "2" }
        ];

        const viewport = document.getElementById('viewport');
        const canvas = document.getElementById('canvas');
        const contextMenu = document.getElementById('context-menu');
        const scaleDisplay = document.getElementById('scale-display');
        const mediaScreen = document.getElementById('media-screen');
        const playerPlaceholder = document.getElementById('player-placeholder');
        const playerTitlebar = document.getElementById('player-titlebar');

        // Initialization systems trigger routing
        window.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('gothic_archive_formation_save');
            if (stored) {
                state.relics = JSON.parse(stored);
            } else {
                state.relics = JSON.parse(JSON.stringify(defaultSetup));
            }
            recenterWorkspace();
            renderArchive();
            setupInteractions();
            setupGlobalMenus();
        });

        function recenterWorkspace() {
            state.panX = 40;
            state.panY = 40;
            state.scale = 1;
            updateTransform();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            scaleDisplay.textContent = `${Math.round(state.scale * 100)}%`;
        }

        // Infinite Scroll Field Rendering Engine Core
        function renderArchive() {
            canvas.innerHTML = '';
            
            // Generate root level framework items map
            state.relics.forEach(relic => {
                if (relic.folder === null) {
                    canvas.appendChild(createRelicElement(relic));
                }
            });

            // Map inner elements clean within folders mapping matrices
            state.relics.forEach(relic => {
                if (relic.folder !== null) {
                    const parentFolder = document.querySelector(`[data-id="${relic.folder}"] .relic-body`);
                    if (parentFolder) {
                        const el = createRelicElement(relic);
                        el.style.position = "absolute";
                        el.style.left = `${relic.x}px`;
                        el.style.top = `${relic.y}px`;
                        parentFolder.appendChild(el);
                    }
                }
            });
        }

        function createRelicElement(relic) {
            const node = document.createElement('div');
            node.className = `relic ${relic.type === 'folder' ? 'folder' : ''}`;
            node.style.left = `${relic.x}px`;
            node.style.top = `${relic.y}px`;
            node.style.width = `${relic.w}px`;
            node.style.height = `${relic.h}px`;
            node.setAttribute('data-id', relic.id);

            const header = document.createElement('div');
            header.className = 'relic-header';
            
            const title = document.createElement('div');
            title.className = 'relic-title';
            title.textContent = relic.title;
            
            const trigger = document.createElement('div');
            trigger.className = 'relic-menu-trigger';
            trigger.innerHTML = '&#8942;';
            
            header.appendChild(title);
            header.appendChild(trigger);
            node.appendChild(header);

            const body = document.createElement('div');
            body.className = 'relic-body';

            if (relic.type === 'link') {
                if (relic.img) {
                    const img = document.createElement('img');
                    img.className = 'relic-img';
                    img.src = relic.img;
                    body.appendChild(img);
                } else {
                    const fallback = document.createElement('div');
                    fallback.className = 'relic-fallback-text';
                    fallback.textContent = relic.title;
                    body.appendChild(fallback);
                }
            } else if (relic.type === 'folder') {
                const folderLabel = document.createElement('div');
                folderLabel.className = 'relic-fallback-text';
                folderLabel.style.color = 'var(--accent-color)';
                folderLabel.textContent = "[ Directory Folder ]";
                body.appendChild(folderLabel);
            }

            node.appendChild(body);

            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            node.appendChild(handle);

            return node;
        }

        // Event Handling and Multi-Touch Matrix Routing
        function setupInteractions() {
            viewport.addEventListener('mousedown', (e) => {
                if (e.target === viewport || e.target === canvas) {
                    state.isPanning = true;
                    state.startX = e.clientX - state.panX;
                    state.startY = e.clientY - state.panY;
                }
            });

            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 0.05;
                state.scale = e.deltaY < 0 ? Math.min(state.scale + zoomFactor, 2) : Math.max(state.scale - zoomFactor, 0.4);
                updateTransform();
            }, { passive: false });

            window.addEventListener('mousemove', (e) => {
                if (state.isPanning) {
                    state.panX = e.clientX - state.startX;
                    state.panY = e.clientY - state.startY;
                    updateTransform();
                } else if (state.draggedElement && state.isEditMode) {
                    let rawX = (e.clientX - state.dragOffsetX) / state.scale;
                    let rawY = (e.clientY - state.dragOffsetY) / state.scale;
                    
                    let snappedX = Math.round(rawX / state.gridSnapSize) * state.gridSnapSize;
                    let snappedY = Math.round(rawY / state.gridSnapSize) * state.gridSnapSize;

                    state.draggedElement.style.left = `${snappedX}px`;
                    state.draggedElement.style.top = `${snappedY}px`;
                } else if (state.resizingElement && state.isEditMode) {
                    const deltaX = (e.clientX - state.startX) / state.scale;
                    const deltaY = (e.clientY - state.startY) / state.scale;
                    
                    let targetW = Math.round((state.initialWidth + deltaX) / state.gridSnapSize) * state.gridSnapSize;
                    let targetH = Math.round((state.initialHeight + deltaY) / state.gridSnapSize) * state.gridSnapSize;

                    state.resizingElement.style.width = `${Math.max(targetW, 80)}px`;
                    state.resizingElement.style.height = `${Math.max(targetH, 80)}px`;
                }
            });

            window.addEventListener('mouseup', () => {
                clearLongPress();
                if (state.draggedElement) {
                    const relic = state.relics.find(r => r.id === state.draggedElement.getAttribute('data-id'));
                    if (relic) {
                        relic.x = parseInt(state.draggedElement.style.left);
                        relic.y = parseInt(state.draggedElement.style.top);
                    }
                    state.draggedElement.classList.remove('dragging');
                    state.draggedElement = null;
                }
                if (state.resizingElement) {
                    const relic = state.relics.find(r => r.id === state.resizingElement.getAttribute('data-id'));
                    if (relic) {
                        relic.w = parseInt(state.resizingElement.style.width);
                        relic.h = parseInt(state.resizingElement.style.height);
                    }
                    state.resizingElement = null;
                }
                state.isPanning = false;
            });

            // Handle Interaction Clicks, Context Configurations, and Dynamic Triggers
            canvas.addEventListener('mousedown', (e) => {
                const trigger = e.target.closest('.relic-menu-trigger');
                const handle = e.target.closest('.resize-handle');
                const relicEl = e.target.closest('.relic');

                if (trigger && relicEl) {
                    e.stopPropagation();
                    state.activeTargetId = relicEl.getAttribute('data-id');
                    showContextMenu(e.clientX, e.clientY);
                    return;
                }

                if (handle && relicEl && state.isEditMode) {
                    e.stopPropagation();
                    state.resizingElement = relicEl;
                    state.startX = e.clientX;
                    state.startY = e.clientY;
                    state.initialWidth = relicEl.offsetWidth;
                    state.initialHeight = relicEl.offsetHeight;
                    return;
                }

                if (relicEl) {
                    e.stopPropagation();
                    state.activeTargetId = relicEl.getAttribute('data-id');
                    
                    // Trigger tracking configurations layout mapping for long tap thumbnail processing adjustments
                    startLongPress(e.clientX, e.clientY);

                    if (state.isEditMode && e.target.closest('.relic-header')) {
                        state.draggedElement = relicEl;
                        relicEl.classList.add('dragging');
                        const rect = relicEl.getBoundingClientRect();
                        state.dragOffsetX = e.clientX - rect.left;
                        state.dragOffsetY = e.clientY - rect.top;
                    }
                }
            });

            canvas.addEventListener('click', (e) => {
                const trigger = e.target.closest('.relic-menu-trigger');
                const handle = e.target.closest('.resize-handle');
                const relicEl = e.target.closest('.relic');

                if (!trigger && !handle && relicEl) {
                    // Regular viewing mode tap plays video directly inside system iframe screen
                    const relic = state.relics.find(r => r.id === relicEl.getAttribute('data-id'));
                    if (relic && relic.type === 'link') {
                        e.stopPropagation();
                        executeMenuAction('play-media');
                    }
                }
            });

            // Touch support finger gesture mapping parameters
            canvas.addEventListener('touchstart', (e) => {
                if(e.touches.length === 1) {
                    const touch = e.touches[0];
                    const handle = touch.target.closest('.resize-handle');
                    const relicEl = touch.target.closest('.relic');

                    if (relicEl) {
                        state.activeTargetId = relicEl.getAttribute('data-id');
                        startLongPress(touch.clientX, touch.clientY);
                    }

                    if (handle && relicEl && state.isEditMode) {
                        state.resizingElement = relicEl;
                        state.startX = touch.clientX;
                        state.startY = touch.clientY;
                        state.initialWidth = relicEl.offsetWidth;
                        state.initialHeight = relicEl.offsetHeight;
                    }
                }
            }, {passive: true});

            canvas.addEventListener('touchend', () => {
                clearLongPress();
            });
            canvas.addEventListener('touchmove', () => {
                clearLongPress();
            });
        }

        // Long Press Timing Mechanisms Context Configuration Mapping
        function startLongPress(mx, my) {
            clearLongPress();
            state.longPressTimer = setTimeout(() => {
                // If edit mode is initialized, long press brings up the thumbnail modification modal dialogue
                if (state.isEditMode) {
                    executeMenuAction('change-image');
                } else {
                    // Non-authorized viewers receive regular contextual stream setup options
                    showContextMenu(mx, my);
                }
            }, 700); // 700 millisecond precision threshold hold mapping parameter matrix
        }

        function clearLongPress() {
            if (state.longPressTimer) {
                clearTimeout(state.longPressTimer);
                state.longPressTimer = null;
            }
        }

        function showContextMenu(mx, my) {
            contextMenu.style.left = `${mx}px`;
            contextMenu.style.top = `${my}px`;
            contextMenu.style.display = 'block';
        }

        // Global Command Handlers Infrastructure Map Pipelines
        function setupGlobalMenus() {
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu') && !e.target.closest('.relic-menu-trigger')) {
                    contextMenu.style.display = 'none';
                }
            });

            contextMenu.addEventListener('click', (e) => {
                const action = e.target.getAttribute('data-action');
                if (!action) return;
                contextMenu.style.display = 'none';
                executeMenuAction(action);
            });

            document.getElementById('btn-edit-mode').addEventListener('click', (e) => {
                if (!state.isEditMode) {
                    // Security verification entry logic barrier block protection matrix
                    openPromptModal("Security Access Verification", "Enter secure pass code key alignment data:", (password) => {
                        if (password === "1981") {
                            state.isEditMode = true;
                            document.body.classList.add('edit-mode');
                            e.target.classList.add('active');
                            renderArchive();
                        } else if (password !== null) {
                            alert("Access Denied: Terminal encryption signature validation mismatched.");
                        }
                    }, "");
                } else {
                    state.isEditMode = false;
                    document.body.classList.remove('edit-mode');
                    e.target.classList.remove('active');
                    renderArchive();
                }
            });

            document.getElementById('btn-recentering').addEventListener('click', recenterWorkspace);

            document.getElementById('btn-add-link').addEventListener('click', () => {
                openPromptModal("Upload Video Connection", "Enter descriptive track title configuration designation:", (title) => {
                    if(!title) return;
                    openPromptModal("Input Absolute Stream Path", "Provide valid embedded stream URL code destination index mapping (e.g. YouTube Embed path URL):", (targetUrl) => {
                        if(!targetUrl) return;
                        const newId = String(Date.now());
                        state.relics.push({
                            id: newId, title: title, type: "link", url: targetUrl, img: "",
                            x: 60, y: 60, w: 140, h: 140, origW: 140, origH: 140, folder: null
                        });
                        renderArchive();
                    });
                });
            });

            document.getElementById('btn-add-folder').addEventListener('click', () => {
                openPromptModal("Create Dynamic Directory", "Specify folder structural categorization sorting index string:", (title) => {
                    if(!title) return;
                    const newId = String(Date.now());
                    state.relics.push({
                        id: newId, title: title, type: "folder",
                        x: 80, y: 80, w: 180, h: 180, origW: 180, origH: 180, folder: null
                    });
                    renderArchive();
                });
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                localStorage.setItem('gothic_archive_formation_save', JSON.stringify(state.relics));
                alert("Archive structures safely parsed and saved within local indices.");
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const stored = localStorage.getItem('gothic_archive_formation_save');
                if (stored) {
                    state.relics = JSON.parse(stored);
                    renderArchive();
                } else {
                    alert("No previous data matrix maps discovered inside application cache registry.");
                }
            });
        }

        function executeMenuAction(action) {
            const relic = state.relics.find(r => r.id === state.activeTargetId);
            if (!relic) return;

            switch(action) {
                case 'play-media':
                    if (relic.type === 'link') {
                        playerPlaceholder.style.display = 'none';
                        mediaScreen.src = relic.url;
                        playerTitlebar.textContent = `System Player Now Streaming: ${relic.title}`;
                    }
                    break;
                case 'rename':
                    openPromptModal("Rename Element Index", `Modify name configuration mappings for [${relic.title}]:`, (newName) => {
                        if (newName) {
                            relic.title = newName;
                            renderArchive();
                        }
                    }, relic.title);
                    break;
                case 'change-image':
                    openPromptModal("Modify Display Thumbnail Source", "Provide target graphic index link asset localization mapping absolute path:", (newUrl) => {
                        if (newUrl !== null) {
                            relic.img = newUrl;
                            renderArchive();
                        }
                    }, relic.img || "");
                    break;
                case 'snap-shape':
                    relic.w = relic.origW || 140;
                    relic.h = relic.origH || 140;
                    renderArchive();
                    break;
                case 'move-folder':
                    const targets = state.relics.filter(r => r.type === 'folder' && r.id !== relic.id);
                    if(targets.length === 0) {
                        alert("No alternative directory sorting maps configured yet inside database registries.");
                        return;
                    }
                    let promptMsg = "Available operational directory pathways:\nID : Name\n0 : [Root Framework Layout Grid Base]\n";
                    targets.forEach(t => promptMsg += `${t.id} : ${t.title}\n`);
                    openPromptModal("Move Element Location Layer", promptMsg + "\nSpecify target operational index locator ID data tag:", (targetFolderId) => {
                        if(targetFolderId === "0") {
                            relic.folder = null;
                        } else if(state.relics.some(r => r.id === targetFolderId && r.type === 'folder')) {
                            relic.folder = targetFolderId;
                        }
                        renderArchive();
                    });
                    break;
                case 'delete':
                    openConfirmModal("Purge Confirmation Verification", `Permanently dismantle tracking data for element path [${relic.title}] from memory layers?`, () => {
                        state.relics = state.relics.filter(r => r.id !== relic.id);
                        state.relics.forEach(r => { if(r.folder === relic.id) r.folder = null; });
                        renderArchive();
                    });
                    break;
            }
        }

        // Custom Overlay Modal Frame Window Infrastructure Setup Logic Implementation
        function openPromptModal(title, text, callback, defaultVal = "") {
            const container = document.getElementById('modal-body-content');
            const isPasswordType = title === "Security Access Verification";
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <input type="${isPasswordType ? 'password' : 'text'}" class="modal-input" id="modal-custom-field" value="${defaultVal}">
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-custom-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openConfirmModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `<p style="font-size:11px; line-height:1.4; color:var(--text-color);">${text}</p>`;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                cleanup();
                callback();
            };

            cancelBtn.onclick = () => {
                cleanup();
            };
        }
    </script>
</body>
</html>
