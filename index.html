<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-line: rgba(128, 0, 32, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        /* Fixed Upper Interface Wrapper */
        #fixed-top-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0d0d0d;
            z-index: 1500;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fixed Navigation / Control Bar */
        #control-bar {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 95vw;
            max-width: 900px;
            margin-top: 15px;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }

        #search-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 11px;
            border-radius: 2px;
            width: 140px;
            text-transform: uppercase;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Upper Presentation Row - Holds Player & Flanking Side Images */
        #presentation-row {
            display: flex;
            align-items: stretch;
            gap: 15px;
            width: 95vw;
            max-width: 800px;
            height: 240px; 
            margin-bottom: 5px;
            position: relative;
        }

        /* Resizable Handle Element */
        #resize-handle {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            z-index: 1600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-dim);
            font-weight: bold;
            line-height: 1;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 3px;
        }

        #resize-handle:hover {
            color: var(--accent-glow);
            border-color: var(--accent-color);
        }

        /* Flanking Customizable Graphic Blocks */
        .side-asset-box {
            width: 70px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: border-color 0.2s ease;
            flex-shrink: 0;
        }

        body.edit-mode .side-asset-box {
            cursor: pointer;
            border-color: rgba(128, 0, 32, 0.5);
        }

        body.edit-mode .side-asset-box:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .side-asset-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .side-asset-placeholder {
            font-size: 9px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 4px;
            pointer-events: none;
        }

        body.edit-mode .side-asset-placeholder {
            color: var(--text-dim);
        }

        /* Master Presentation Video Player Frame */
        #player-container {
            flex: 1;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body.edit-mode #player-container {
            border-color: var(--accent-color);
        }

        #media-screen {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            border-bottom-left-radius: 11px;
            border-bottom-right-radius: 11px;
        }

        #player-placeholder {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: calc(100% - 25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            gap: 4px;
            pointer-events: none;
            z-index: 5;
            border-bottom-left-radius: 11px;
            border-bottom-right-radius: 11px;
        }

        #player-titlebar {
            background: #111;
            border-bottom: 1px solid var(--border-color);
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top-left-radius: 11px;
            border-top-right-radius: 11px;
            flex-shrink: 0;
        }

        .btn {
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border-radius: 2px;
        }

        .btn:hover {
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 8px rgba(128, 0, 32, 0.4);
        }

        .btn.active {
            background: var(--accent-color);
            border-color: var(--accent-glow);
            color: #fff;
            box-shadow: 0 0 12px var(--accent-color);
        }

        /* Infinite Scroll Canvas Environment Workspace */
        #viewport {
            position: absolute;
            top: 360px; 
            left: 0;
            width: 100%;
            height: calc(100% - 360px);
            overflow: auto;
            background-color: #0d0d0d;
        }

        /* Subtle Guide Grid for Edit Mode */
        #grid-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 5000px;
            height: 5000px;
            pointer-events: none;
            display: none;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        body.edit-mode #grid-canvas {
            display: block;
        }

        #relics-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 5000px;
            height: 5000px;
            z-index: 2;
        }

        .edit-only {
            display: none !important;
        }
        body.edit-mode .edit-only {
            display: inline-block !important;
        }

        /* Absolute Free-Drag Relic Structure Box */
        .relic {
            position: absolute;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: grab;
            overflow: hidden;
        }

        .relic:active {
            cursor: grabbing;
        }

        body.edit-mode .relic {
            border-color: rgba(128, 0, 32, 0.4);
        }

        .relic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            pointer-events: none;
        }

        .relic-title {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .relic-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 2px;
            pointer-events: none;
        }

        .relic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }

        .relic-fallback-text {
            font-size: 11px;
            text-align: center;
            padding: 6px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* Tags Inline Core Layout Row */
        .relic-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 35px;
            overflow: hidden;
            pointer-events: none;
        }

        .mini-tag {
            background: #1f1f1f;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 2px;
            text-transform: uppercase;
        }

        /* Soft Scale Finger Control Tab Node */
        .resize-finger-anchor {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 18px;
            height: 18px;
            background: rgba(128, 0, 32, 0.6);
            border-top-left-radius: 4px;
            cursor: se-resize;
            display: none;
            z-index: 10;
        }

        body.edit-mode .resize-finger-anchor {
            display: block;
        }

        /* Context Popup Menu - Scrollable Elements */
        #context-menu {
            position: fixed;
            background: #141414;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            border-radius: 3px;
            width: 200px;
            max-height: 260px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .menu-item {
            padding: 10px 14px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--text-color);
            border-bottom: 1px solid rgba(38, 38, 38, 0.5);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: #fff;
        }

        /* Modals Architecture Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #141414;
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 4px;
            width: 360px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .modal-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 2px;
            width: 100%;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-textarea {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 11px;
            border-radius: 2px;
            width: 100%;
            height: 120px;
            resize: none;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <input type="file" id="device-image-picker" accept="image/*" style="display: none;">
    <input type="file" id="side-left-picker" accept="image/*" style="display: none;">
    <input type="file" id="side-right-picker" accept="image/*" style="display: none;">

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            <input type="text" id="search-input" placeholder="SEARCH ARCHIVE...">
            <button class="btn" id="btn-edit-mode">Edit Mode</button>
            <button class="btn edit-only" id="btn-add-link">Add Video Link</button>
            <button class="btn edit-only" id="btn-add-bulk">Add Bulk Links</button>
            <button class="btn edit-only" id="btn-recenter">Recenter Matrix</button>
            <button class="btn edit-only" id="btn-save">Save Archive</button>
            <button class="btn edit-only" id="btn-load">Load Archive</button>
        </div>

        <div id="presentation-row">
            <div class="side-asset-box" id="side-left-box">
                <div class="side-asset-placeholder">L Slot</div>
            </div>

            <div id="player-container">
                <div id="player-titlebar">System Player: Idle</div>
                <div style="position: relative; flex: 1; width: 100%; height: 100%;">
                    <div id="player-placeholder">
                        <span>☠ No Stream Tracks Loaded ☠</span>
                    </div>
                    <iframe id="media-screen" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>

            <div class="side-asset-box" id="side-right-box">
                <div class="side-asset-placeholder">R Slot</div>
            </div>

            <div id="resize-handle">⇲</div>
        </div>
    </div>

    <div id="viewport">
        <div id="grid-canvas"></div>
        <div id="relics-container"></div>
    </div>

    <div id="context-menu">
        <div class="menu-item" data-action="play-media">Play Video</div>
        <div class="menu-item edit-only" data-action="rename">Rename</div>
        <div class="menu-item edit-only" data-action="edit-tags">Edit Tags</div>
        <div class="menu-item edit-only" data-action="change-image">Change Thumbnail</div>
        <div class="menu-item edit-only" data-action="snap-original">Snap to Original Shape</div>
        <div class="menu-item edit-only" data-action="delete">Delete</div>
    </div>

    <div class="modal-overlay" id="archive-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-title-text">Prompt</div>
            <div id="modal-body-content"></div>
            <div class="modal-actions">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn" id="modal-confirm" style="background: var(--accent-color);">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // State Configuration Data Setup (Preserving Spatial Proportions & Formations)
        const state = {
            isEditMode: false,
            activeTargetId: null,
            lastTapTime: 0,
            searchQuery: "",
            relics: [],
            sideImages: { left: "", right: "" }
        };

        const defaultSetup = [
            { id: "1", title: "The Crow", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg", x: 2200, y: 2200, w: 180, h: 180, tags: ["gothic", "classic"] },
            { id: "2", title: "Gothic Tech Sound", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "", x: 2420, y: 2200, w: 180, h: 180, tags: ["industrial"] }
        ];

        const fixedTopWrapper = document.getElementById('fixed-top-wrapper');
        const presentationRow = document.getElementById('presentation-row');
        const resizeHandle = document.getElementById('resize-handle');
        const viewport = document.getElementById('viewport');
        const relicsContainer = document.getElementById('relics-container');
        const contextMenu = document.getElementById('context-menu');
        const mediaScreen = document.getElementById('media-screen');
        const playerPlaceholder = document.getElementById('player-placeholder');
        const playerTitlebar = document.getElementById('player-titlebar');
        const searchInput = document.getElementById('search-input');
        
        const deviceImagePicker = document.getElementById('device-image-picker');
        const sideLeftBox = document.getElementById('side-left-box');
        const sideRightBox = document.getElementById('side-right-box');
        const sideLeftPicker = document.getElementById('side-left-picker');
        const sideRightPicker = document.getElementById('side-right-picker');

        window.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('gothic_archive_formation_save');
            if (stored) {
                state.relics = JSON.parse(stored);
            } else {
                state.relics = JSON.parse(JSON.stringify(defaultSetup));
            }

            const storedSides = localStorage.getItem('gothic_archive_side_images');
            if (storedSides) {
                state.sideImages = JSON.parse(storedSides);
            }

            const savedWidth = localStorage.getItem('gothic_archive_player_width');
            const savedHeight = localStorage.getItem('gothic_archive_player_height');
            if (savedWidth && savedHeight) {
                presentationRow.style.width = savedWidth + 'px';
                presentationRow.style.height = savedHeight + 'px';
            } else {
                const defaultWidth = Math.min(window.innerWidth * 0.95, 800);
                presentationRow.style.width = defaultWidth + 'px';
                presentationRow.style.height = Math.round((defaultWidth - 170) * (9 / 16)) + 'px';
            }
            
            adjustViewportSpacing();
            renderSideImages();
            renderArchive();
            setupInteractions();
            setupGlobalMenus();
            setupResizeEngine();

            // Set spatial focus point coordinate matrix on launch
            viewport.scrollLeft = 2000;
            viewport.scrollTop = 2000;
        });

        function adjustViewportSpacing() {
            const topHeight = fixedTopWrapper.offsetHeight;
            viewport.style.top = topHeight + 'px';
            viewport.style.height = `calc(100% - ${topHeight}px)`;
        }

        function getAutoThumbnail(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://img.youtube.com/vi/${match[2]}/hqdefault.jpg`;
            }
            return '';
        }

        function saveStateToStorage() {
            localStorage.setItem('gothic_archive_formation_save', JSON.stringify(state.relics));
        }

        function saveSidesToStorage() {
            localStorage.setItem('gothic_archive_side_images', JSON.stringify(state.sideImages));
        }

        function renderSideImages() {
            if (state.sideImages.left) {
                sideLeftBox.innerHTML = `<img src="${state.sideImages.left}">`;
            } else {
                sideLeftBox.innerHTML = `<div class="side-asset-placeholder">L Slot</div>`;
            }

            if (state.sideImages.right) {
                sideRightBox.innerHTML = `<img src="${state.sideImages.right}">`;
            } else {
                sideRightBox.innerHTML = `<div class="side-asset-placeholder">R Slot</div>`;
            }
        }

        // Infinite Absolute Canvas Rendering Core
        function renderArchive() {
            relicsContainer.innerHTML = '';
            const query = state.searchQuery.trim().toLowerCase();
            
            state.relics.forEach(relic => {
                const matchesTitle = relic.title.toLowerCase().includes(query);
                const matchesTags = relic.tags && relic.tags.some(t => t.toLowerCase().includes(query));
                
                if (query === "" || matchesTitle || matchesTags) {
                    relicsContainer.appendChild(createRelicElement(relic));
                }
            });
        }

        function createRelicElement(relic) {
            const node = document.createElement('div');
            node.className = 'relic';
            node.setAttribute('data-id', relic.id);
            
            // Assign Saved Spatial Coordinates and Absolute Proportions
            node.style.left = relic.x + 'px';
            node.style.top = relic.y + 'px';
            node.style.width = relic.w + 'px';
            node.style.height = relic.h + 'px';

            const header = document.createElement('div');
            header.className = 'relic-header';
            
            const title = document.createElement('div');
            title.className = 'relic-title';
            title.textContent = relic.title;
            
            header.appendChild(title);
            node.appendChild(header);

            const body = document.createElement('div');
            body.className = 'relic-body';

            const displayImg = relic.img || getAutoThumbnail(relic.url);

            if (displayImg) {
                const img = document.createElement('img');
                img.className = 'relic-img';
                img.src = displayImg;
                body.appendChild(img);
            } else {
                const fallback = document.createElement('div');
                fallback.className = 'relic-fallback-text';
                fallback.textContent = relic.title;
                body.appendChild(fallback);
            }

            node.appendChild(body);

            // Render Tags Element Row Lookups
            if (relic.tags && relic.tags.length > 0) {
                const tagsRow = document.createElement('div');
                tagsRow.className = 'relic-tags-row';
                relic.tags.forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'mini-tag';
                    tagSpan.textContent = tag;
                    tagsRow.appendChild(tagSpan);
                });
                node.appendChild(tagsRow);
            }

            // Finger scale anchor point injection
            const resizeAnchor = document.createElement('div');
            resizeAnchor.className = 'resize-finger-anchor';
            node.appendChild(resizeAnchor);

            return node;
        }

        function setupResizeEngine() {
            let startX, startY, startW, startH;

            const onPointerMove = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let newW = startW + (clientX - startX);
                let newH = startH + (clientY - startY);

                if (newW < 320) newW = 320;
                if (newW > window.innerWidth * 0.98) newW = window.innerWidth * 0.98;
                if (newH < 120) newH = 120;
                if (newH > window.innerHeight * 0.6) newH = window.innerHeight * 0.6;

                presentationRow.style.width = newW + 'px';
                presentationRow.style.height = newH + 'px';
                
                adjustViewportSpacing();
            };

            const onPointerUp = () => {
                document.removeEventListener('mousemove', onPointerMove);
                document.removeEventListener('mouseup', onPointerUp);
                document.removeEventListener('touchmove', onPointerMove);
                document.removeEventListener('touchend', onPointerUp);

                localStorage.setItem('gothic_archive_player_width', presentationRow.offsetWidth);
                localStorage.setItem('gothic_archive_player_height', presentationRow.offsetHeight);
            };

            const onPointerDown = (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                startW = presentationRow.offsetWidth;
                startH = presentationRow.offsetHeight;

                document.addEventListener('mousemove', onPointerMove);
                document.addEventListener('mouseup', onPointerUp);
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('touchend', onPointerUp);
            };

            resizeHandle.addEventListener('mousedown', onPointerDown);
            resizeHandle.addEventListener('touchstart', onPointerDown, { passive: false });
        }

        function setupInteractions() {
            let dragRelic = null;
            let resizeRelic = null;
            let dragStartX, dragStartY, initialX, initialY, initialW, initialH;

            searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                renderArchive();
            });

            // Universal Unified Spatial Drag and Drop / Resize Engine Engine Hook Setup
            relicsContainer.addEventListener('mousedown', handlePointerDown);
            relicsContainer.addEventListener('touchstart', handlePointerDown, { passive: false });

            function handlePointerDown(e) {
                const target = e.target;
                const relicEl = target.closest('.relic');
                if (!relicEl) return;

                state.activeTargetId = relicEl.getAttribute('data-id');
                const relic = state.relics.find(r => r.id === state.activeTargetId);
                if (!relic) return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                // Handle Sub-Finger Scale Module Hook Trigger Points
                if (target.classList.contains('resize-finger-anchor') && state.isEditMode) {
                    e.preventDefault();
                    e.stopPropagation();
                    resizeRelic = relic;
                    dragStartX = clientX;
                    dragStartY = clientY;
                    initialW = relic.w;
                    initialH = relic.h;

                    document.addEventListener('mousemove', handlePointerMove);
                    document.addEventListener('mouseup', handlePointerUp);
                    document.addEventListener('touchmove', handlePointerMove, { passive: false });
                    document.addEventListener('touchend', handlePointerUp);
                    return;
                }

                // Standard Double-Tap / Double-Click Core Router Logic Processing
                const currentTime = new Date().getTime();
                const tapLength = currentTime - state.lastTapTime;
                
                if (tapLength < 300 && tapLength > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (state.isEditMode) {
                        showContextMenu(clientX, clientY);
                    } else {
                        executeMenuAction('play-media');
                    }
                    state.lastTapTime = 0;
                    return;
                }
                state.lastTapTime = currentTime;

                // If in Edit Mode, trigger standard soft-snapping coordinate drag handling
                if (state.isEditMode) {
                    e.preventDefault();
                    dragRelic = relic;
                    dragStartX = clientX;
                    dragStartY = clientY;
                    initialX = relic.x;
                    initialY = relic.y;

                    document.addEventListener('mousemove', handlePointerMove);
                    document.addEventListener('mouseup', handlePointerUp);
                    document.addEventListener('touchmove', handlePointerMove, { passive: false });
                    document.addEventListener('touchend', handlePointerUp);
                } else {
                    // Quick-play track fallback loop trigger points
                    executeMenuAction('play-media');
                }
            }

            function handlePointerMove(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (dragRelic) {
                    let dx = clientX - dragStartX;
                    let dy = clientY - dragStartY;
                    
                    let targetX = initialX + dx;
                    let targetY = initialY + dy;

                    // Soft Grid Snapping (Aligning with grid size of 40px blocks)
                    targetX = Math.round(targetX / 40) * 40;
                    targetY = Math.round(targetY / 40) * 40;

                    // Boundaries protection loops
                    if (targetX < 0) targetX = 0;
                    if (targetY < 0) targetY = 0;
                    if (targetX > 4800) targetX = 4800;
                    if (targetY > 4800) targetY = 4800;

                    dragRelic.x = targetX;
                    dragRelic.y = targetY;

                    const el = document.querySelector(`.relic[data-id="${dragRelic.id}"]`);
                    if (el) {
                        el.style.left = targetX + 'px';
                        el.style.top = targetY + 'px';
                    }
                }

                if (resizeRelic) {
                    let dx = clientX - dragStartX;
                    let dy = clientY - dragStartY;

                    let targetW = initialW + dx;
                    let targetH = initialH + dy;

                    if (targetW < 100) targetW = 100;
                    if (targetH < 100) targetH = 100;
                    if (targetW > 800) targetW = 800;
                    if (targetH > 800) targetH = 800;

                    resizeRelic.w = targetW;
                    resizeRelic.h = targetH;

                    const el = document.querySelector(`.relic[data-id="${resizeRelic.id}"]`);
                    if (el) {
                        el.style.width = targetW + 'px';
                        el.style.height = targetH + 'px';
                    }
                }
            }

            function handlePointerUp() {
                if (dragRelic || resizeRelic) {
                    saveStateToStorage();
                }
                dragRelic = null;
                resizeRelic = null;
                document.removeEventListener('mousemove', handlePointerMove);
                document.removeEventListener('mouseup', handlePointerUp);
                document.removeEventListener('touchmove', handlePointerMove);
                document.removeEventListener('touchend', handlePointerUp);
            }

            // Independent side image processing setup configurations
            sideLeftBox.addEventListener('click', () => {
                if (state.isEditMode) sideLeftPicker.click();
            });

            sideRightBox.addEventListener('click', () => {
                if (state.isEditMode) sideRightPicker.click();
            });

            sideLeftPicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    state.sideImages.left = event.target.result;
                    saveSidesToStorage();
                    renderSideImages();
                };
                reader.readAsDataURL(file);
            });

            sideRightPicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    state.sideImages.right = event.target.result;
                    saveSidesToStorage();
                    renderSideImages();
                };
                reader.readAsDataURL(file);
            });

            deviceImagePicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const relic = state.relics.find(r => r.id === state.activeTargetId);
                    if (relic) {
                        relic.img = event.target.result;
                        saveStateToStorage();
                        renderArchive();
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function showContextMenu(mx, my) {
            contextMenu.style.left = `${mx}px`;
            contextMenu.style.top = `${my}px`;
            contextMenu.style.display = 'block';
        }

        function setupGlobalMenus() {
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu')) {
                    contextMenu.style.display = 'none';
                }
            });

            contextMenu.addEventListener('click', (e) => {
                const action = e.target.getAttribute('data-action');
                if (!action) return;
                contextMenu.style.display = 'none';
                executeMenuAction(action);
            });

            document.getElementById('btn-edit-mode').addEventListener('click', (e) => {
                if (!state.isEditMode) {
                    openPromptModal("Security Access Verification", "Enter secure pass code key alignment data:", (password) => {
                        if (password === "1981") {
                            state.isEditMode = true;
                            document.body.classList.add('edit-mode');
                            e.target.classList.add('active');
                            renderArchive();
                        } else if (password !== null) {
                            alert("Access Denied: Encryption signature validation mismatched.");
                        }
                    }, "");
                } else {
                    state.isEditMode = false;
                    document.body.classList.remove('edit-mode');
                    e.target.classList.remove('active');
                    renderArchive();
                }
            });

            document.getElementById('btn-recenter').addEventListener('click', () => {
                // Focus camera coordinate map right on baseline generation array coordinates
                viewport.scrollLeft = 2000;
                viewport.scrollTop = 2000;
            });

            // Singular Dynamic Track Initialization Input
            document.getElementById('btn-add-link').addEventListener('click', () => {
                openPromptModal("Upload Video Connection", "Enter descriptive track title configuration designation:", (title) => {
                    if(!title) return;
                    openPromptModal("Input Absolute Stream Path", "Provide valid embedded stream URL code destination index mapping:", (targetUrl) => {
                        if(!targetUrl) return;
                        openPromptModal("Assign Metadata Indexing Tags", "Provide unique tags separated by commas (Optional):", (rawTags) => {
                            const processedTags = rawTags ? rawTags.split(',').map(t => t.trim()).filter(t => t !== "") : [];
                            
                            // Generate position centered around baseline map point
                            const centerBaseX = viewport.scrollLeft + (viewport.offsetWidth / 2) - 90;
                            const centerBaseY = viewport.scrollTop + (viewport.offsetHeight / 2) - 90;
                            
                            const newId = String(Date.now());
                            state.relics.push({
                                id: newId, 
                                title: title, 
                                url: targetUrl, 
                                img: "", 
                                x: Math.round(centerBaseX / 40) * 40, 
                                y: Math.round(centerBaseY / 40) * 40, 
                                w: 180, 
                                h: 180,
                                tags: processedTags
                            });
                            saveStateToStorage();
                            renderArchive();
                        });
                    });
                });
            });

            // Bulk Input Form Parser Implementation Layer
            document.getElementById('btn-add-bulk').addEventListener('click', () => {
                openBulkModal("Inject Mass Media Arrays", "Paste your multi-link addresses below (one absolute stream mapping per line layout):", (textBlock) => {
                    if (!textBlock) return;
                    const lines = textBlock.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    let counter = 0;
                    
                    let spawnX = viewport.scrollLeft + 40;
                    let spawnY = viewport.scrollTop + 40;
                    
                    lines.forEach((line, idx) => {
                        const autoTitle = `Bulk Asset Track #${state.relics.length + 1}`;
                        const newId = String(Date.now() + idx);
                        
                        state.relics.push({
                            id: newId,
                            title: autoTitle,
                            url: line,
                            img: "",
                            x: Math.round(spawnX / 40) * 40,
                            y: Math.round(spawnY / 40) * 40,
                            w: 180,
                            h: 180,
                            tags: ["bulk"]
                        });
                        
                        // Cascade spatial layout positioning to prevent direct absolute overlay conflicts
                        spawnX += 60;
                        spawnY += 60;
                        if (spawnX > viewport.scrollLeft + 400) {
                            spawnX = viewport.scrollLeft + 40;
                        }
                        counter++;
                    });
                    
                    if(counter > 0) {
                        saveStateToStorage();
                        renderArchive();
                        alert(`Successfully imported [${counter}] stream tracking arrays inside network node registry.`);
                    }
                });
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                saveStateToStorage();
                saveSidesToStorage();
                alert("Archive structures safely saved.");
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const stored = localStorage.getItem('gothic_archive_formation_save');
                if (stored) {
                    state.relics = JSON.parse(stored);
                    renderArchive();
                }
                const storedSides = localStorage.getItem('gothic_archive_side_images');
                if (storedSides) {
                    state.sideImages = JSON.parse(storedSides);
                    renderSideImages();
                }
            });
        }

        function executeMenuAction(action) {
            const relic = state.relics.find(r => r.id === state.activeTargetId);
            if (!relic) return;

            switch(action) {
                case 'play-media':
                    playerPlaceholder.style.display = 'none';
                    mediaScreen.src = relic.url;
                    playerTitlebar.textContent = `System Player Now Streaming: ${relic.title}`;
                    break;
                case 'rename':
                    openPromptModal("Rename Element Index", `Modify name configuration mappings for [${relic.title}]:`, (newName) => {
                        if (newName) {
                            relic.title = newName;
                            saveStateToStorage();
                            renderArchive();
                        }
                    }, relic.title);
                    break;
                case 'edit-tags':
                    const existingTags = relic.tags ? relic.tags.join(', ') : "";
                    openPromptModal("Modify Segment Tag Arrays", `Assign metadata tags separated by commas for [${relic.title}]:`, (updatedTags) => {
                        if (updatedTags !== null) {
                            relic.tags = updatedTags.split(',').map(t => t.trim()).filter(t => t !== "");
                            saveStateToStorage();
                            renderArchive();
                        }
                    }, existingTags);
                    break;
                case 'change-image':
                    deviceImagePicker.value = '';
                    deviceImagePicker.click();
                    break;
                case 'snap-original':
                    relic.w = 180;
                    relic.h = 180;
                    saveStateToStorage();
                    renderArchive();
                    break;
                case 'delete':
                    openConfirmModal("Purge Confirmation Verification", `Permanently dismantle tracking data for element path [${relic.title}]?`, () => {
                        state.relics = state.relics.filter(r => r.id !== relic.id);
                        saveStateToStorage();
                        renderArchive();
                    });
                    break;
            }
        }

        function openPromptModal(title, text, callback, defaultVal = "") {
            const container = document.getElementById('modal-body-content');
            const isPasswordType = title === "Security Access Verification";
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <input type="${isPasswordType ? 'password' : 'text'}" class="modal-input" id="modal-custom-field" value="${defaultVal}">
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-custom-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openBulkModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <textarea class="modal-textarea" id="modal-bulk-field" placeholder="https://...\nhttps://..."></textarea>
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-bulk-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openConfirmModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `<p style="font-size:11px; line-height:1.4; color:var(--text-color);">${text}</p>`;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                cleanup();
                callback();
            };

            cancelBtn.onclick = () => {
                cleanup();
            };
        }
    </script>
</body>
</html>
