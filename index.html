<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive — Terminal Gate</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #545454;
            --border-color: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Safe area spacing pads for iOS layout wrappers */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, #000 100%);
            pointer-events: none;
            z-index: 1;
        }

        .gate-wrapper {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 92vw;
            max-width: 420px;
            padding: 35px 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            z-index: 10;
            text-align: center;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .gate-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(128, 0, 32, 0.25);
        }

        .github-header-frame {
            width: 100%;
            height: 120px;
            background: #080808;
            border: 1px dashed #222;
            border-radius: 6px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .github-header-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fallback-placeholder-text {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-align: center;
        }

        .password-field {
            width: 100%;
            background: #050505;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 14px 15px;
            font-family: inherit;
            font-size: 16px; /* Prevents auto-zooming context on iOS inputs */
            border-radius: 6px;
            letter-spacing: 1px;
            text-align: center;
            transition: all 0.25s ease;
            -webkit-user-select: text;
            user-select: text;
        }

        .password-field:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #090204;
            color: var(--accent-glow);
            box-shadow: inset 0 0 5px rgba(255, 0, 51, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: #141414;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 16px; /* Maximized tap hit box targets for fingers */
            font-family: inherit;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover, .submit-btn:active {
            background: var(--accent-color);
            border-color: var(--accent-glow);
            color: #fff;
        }

        .system-status {
            margin-top: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            min-height: 14px;
            transition: color 0.2s ease;
        }

        .system-status.error {
            color: var(--accent-glow);
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <div class="gate-wrapper">
        <div class="github-header-frame">
            <img id="header-img" src="" alt="" onerror="showPlaceholder()">
            <div id="placeholder-text" class="fallback-placeholder-text">[ PENDING GITHUB HEADER IMAGE ]</div>
        </div>

        <form id="gate-form" onsubmit="verifyAccess(event)">
            <div class="input-group">
                <label class="input-label" for="pass-key">Verify Identity Signature Access Code:</label>
                <input type="password" id="pass-key" class="password-field" placeholder="ENTER LOG-IN PASSKEY" autocomplete="current-password" required>
            </div>
            
            <button type="submit" class="submit-btn">Validate Signature</button>
        </form>

        <div id="status-readout" class="system-status">System Standby // Secured Gateway Active</div>
    </div>

    <script>
        const KEY_ADMIN = "1981";
        const KEY_GUEST = "Martin";
        const REDIRECT_URL = "archive.html";

        function showPlaceholder() {
            document.getElementById('header-img').style.display = 'none';
            document.getElementById('placeholder-text').style.display = 'block';
        }

        const imgNode = document.getElementById('header-img');
        if (!imgNode.getAttribute('src')) {
            showPlaceholder();
        } else {
            document.getElementById('placeholder-text').style.display = 'none';
        }

        function verifyAccess(e) {
            e.preventDefault();
            const inputField = document.getElementById('pass-key');
            const readout = document.getElementById('status-readout');
            const trimmedValue = inputField.value.trim();

            if (trimmedValue === KEY_ADMIN) {
                readout.classList.remove('error');
                readout.style.color = "#00ff66";
                readout.textContent = "Admin Granted // Syncing Systems Matrix...";
                
                sessionStorage.setItem('archive_clearance', 'admin');
                setTimeout(() => { window.location.href = REDIRECT_URL; }, 800);

            } else if (trimmedValue === KEY_GUEST) {
                readout.classList.remove('error');
                readout.style.color = "#00bfff";
                readout.textContent = "Guest Access Approved // Syncing Terminal Readout...";
                
                sessionStorage.setItem('archive_clearance', 'guest');
                setTimeout(() => { window.location.href = REDIRECT_URL; }, 800);

            } else {
                readout.textContent = "Access Denied: Invalid Access Token Signature.";
                readout.classList.add('error');
                inputField.value = '';
                inputField.focus();

                setTimeout(() => {
                    readout.classList.remove('error');
                    readout.textContent = "System Standby // Secured Gateway Active";
                }, 3000);
            }
        }
    </script>
</body>
</html>
