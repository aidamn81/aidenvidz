<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #connection-status { font-size: 0.65rem; padding: 8px; color: #444; letter-spacing: 2px; }

        /* --- THEATER PLAYER --- */
        #theater-section {
            width: 100%; background: #000; padding: 15px;
            border-bottom: 2px solid var(--gothic-red);
            display: flex; flex-direction: column; align-items: center;
        }

        .player-wrapper {
            width: 90%; max-width: 850px;
            box-shadow: 0 0 40px rgba(74,4,4,0.5);
            border-radius: 8px; overflow: hidden; background: #000;
            aspect-ratio: 16/9; position: relative;
        }

        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; background: #000;
        }

        .now-playing {
            width: 90%; max-width: 850px; padding: 12px; 
            background: #0a0a0a; border: 1px solid #1a1a1a; border-top: none;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 0 0 8px 8px;
        }

        /* --- UI --- */
        .toolbar { width: 95%; padding: 20px 0 10px; display: flex; gap: 10px; justify-content: center; }
        .search-input { background: #111; border: 1px solid var(--gothic-red); color: white; padding: 12px 25px; border-radius: 30px; flex-grow: 1; outline: none; }
        .btn { background: var(--gothic-red); color: white; border: none; padding: 10px 22px; cursor: pointer; text-transform: uppercase; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }

        #playlist-bar { width: 95%; display: flex; overflow-x: auto; padding: 10px 0 20px; gap: 12px; }
        .playlist-tab { border: 1px solid #222; background: #0d0d0d; color: #666; padding: 8px 18px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .playlist-tab.active { border-color: var(--gold); color: var(--gold); }

        #video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 95%; padding-bottom: 80px; }
        .video-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 4px; overflow: hidden; }
        .thumb-box { width: 100%; height: 115px; background: #000; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .card-label { padding: 10px; font-size: 0.8rem; }
        .card-actions { display: flex; gap: 14px; justify-content: flex-end; margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        .icon-btn { cursor: pointer; opacity: 0.6; }

        #summon-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #0d0d0d; padding: 30px; border: 1px solid var(--gothic-red); width: 90%; max-width: 450px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; }

        @media (max-width: 768px) { #video-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="connection-status">VAULT STATUS: DISCONNECTED</div>

    <div id="theater-section">
        <div class="player-wrapper" id="player-container">
            <iframe id="master-frame" src="about:blank" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>
    <div class="now-playing">
        <span id="playing-title" style="color:var(--gold)">Select a Vision</span>
        <button id="external-link" class="btn" style="background:#222; display:none;" onclick="openExternal()">Open Original ↗</button>
    </div>

    <div class="toolbar">
        <input type="text" id="search-bar" class="search-input" placeholder="Search archive..." oninput="refreshUI()">
        <button class="btn" onclick="openSummon()">Summon +</button>
    </div>

    <div id="playlist-bar"></div>
    <div id="video-grid"></div>

    <div id="summon-modal">
        <div class="modal-box">
            <h2 style="color:var(--gothic-red); margin-top:0;">NEW VISION</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="in-title" placeholder="Title">
            <input type="text" id="in-url" placeholder="pCloud Link">
            <select id="playlist-select">
                <option value="General">General Archive</option>
            </select>
            <button class="btn" style="width:100%" onclick="saveVideo()">Commit</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#111;" onclick="closeSummon()">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let archive = [];
        let currentUrl = "";

        db.ref(".info/connected").on("value", snap => {
            const s = document.getElementById('connection-status');
            s.innerText = snap.val() ? "VAULT STATUS: ONLINE" : "VAULT STATUS: OFFLINE";
            s.style.color = snap.val() ? "var(--gold)" : "var(--gothic-red)";
        });

        function play(url, title) {
            currentUrl = url;
            const container = document.getElementById('player-container');
            const display = document.getElementById('playing-title');
            const extBtn = document.getElementById('external-link');

            // 1. Force a "Hard Reset" of the iframe container to kill Safari's error state
            container.innerHTML = `<iframe id="master-frame" src="about:blank" allowfullscreen allow="autoplay"></iframe>`;
            
            // 2. Prepare the Link (Ensure it uses the Embed Mode)
            let embedUrl = url.includes('show?code=') ? url.split('&mode=')[0] + "&mode=video" : url;

            // 3. Re-inject the source
            setTimeout(() => {
                document.getElementById('master-frame').src = embedUrl;
                display.innerText = title;
                extBtn.style.display = "block";
            }, 50);

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openExternal() { if(currentUrl) window.open(currentUrl, '_blank'); }

        db.ref('vault').on('value', snap => {
            const data = snap.val(); archive = [];
            for(let id in data) archive.push({ id, ...data[id] });
            archive.sort((a,b) => b.timestamp - a.timestamp);
            refreshUI();
        });

        function refreshUI() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            archive.forEach(v => {
                const card = document.createElement('div');
                card.className = "video-card";
                card.innerHTML = `
                    <div class="thumb-box" onclick="play('${v.url}', '${v.title.replace(/'/g, "\\'")}')">
                        ${v.customThumb ? `<img src="${v.customThumb}">` : `👁️`}
                    </div>
                    <div class="card-label">
                        <div class="video-title">${v.title}</div>
                        <div class="card-actions">
                            <span class="icon-btn" onclick="deleteVideo('${v.id}')">🗑</span>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function openSummon() { document.getElementById('summon-modal').style.display = 'flex'; }
        function closeSummon() { document.getElementById('summon-modal').style.display = 'none'; }
        function saveVideo() {
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            db.ref('vault').push({ title, url, timestamp: Date.now() });
            closeSummon();
        }
        function deleteVideo(id) { if(confirm("Delete?")) db.ref('vault/'+id).remove(); }
    </script>
</body>
</html>
