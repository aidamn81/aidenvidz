<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- THEATER PLAYER --- */
        #theater-section {
            width: 100%; background: #000; padding: 15px;
            border-bottom: 2px solid var(--gothic-red);
            display: flex; justify-content: center;
        }

        .player-wrapper {
            width: 95%; max-width: 850px;
            box-shadow: 0 0 40px rgba(74,4,4,0.5);
            border-radius: 8px; overflow: hidden; background: #000;
            aspect-ratio: 16/9; position: relative;
        }

        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; background: #000;
        }

        .now-playing {
            width: 95%; max-width: 850px; padding: 12px; 
            background: #0a0a0a; border: 1px solid #1a1a1a;
            border-top: none; font-size: 0.9rem; border-radius: 0 0 8px 8px;
        }

        /* --- THE GRID --- */
        #video-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; width: 95%; padding: 30px 0 80px;
        }

        .video-card {
            background: #0d0d0d; border: 1px solid #1a1a1a;
            border-radius: 4px; overflow: hidden; transition: 0.3s;
        }

        .video-card:hover { border-color: var(--gold); }

        .thumb-box { 
            width: 100%; height: 115px; background: #000; cursor: pointer; 
            position: relative; display: flex; align-items: center; justify-content: center; 
        }

        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .play-overlay { position: absolute; font-size: 2rem; opacity: 0.4; color: white; }

        .card-label { padding: 10px; font-size: 0.8rem; text-align: center; }

        @media (max-width: 768px) { #video-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="theater-section">
        <div class="player-wrapper">
            <iframe id="master-frame" src="about:blank" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>
    <div class="now-playing">
        <span id="playing-title" style="color:var(--gold)">Select a Vision from the Archive...</span>
    </div>

    <div id="video-grid">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // THIS IS THE FIX: Pointing specifically to your "vault" path
        db.ref('vault').on('value', snap => {
            const data = snap.val();
            const grid = document.getElementById('video-grid');
            grid.innerHTML = "";
            
            if (data) {
                // Convert object to array and sort by latest
                const items = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                items.sort((a,b) => b.timestamp - a.timestamp);

                items.forEach(v => {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    
                    // Logic to use your uploaded customThumb or a placeholder
                    const thumbImg = v.customThumb ? `<img src="${v.customThumb}">` : `<div style="font-size:2rem; opacity:0.1;">👁️</div>`;
                    
                    card.innerHTML = `
                        <div class="thumb-box" onclick="play('${v.url}', '${v.title.replace(/'/g, "\\'")}')">
                            ${thumbImg}
                            <div class="play-overlay">▶</div>
                        </div>
                        <div class="card-label">${v.title}</div>`;
                    grid.appendChild(card);
                });
            }
        });

        function play(url, title) {
            const frame = document.getElementById('master-frame');
            const display = document.getElementById('playing-title');
            
            // iPad/pCloud Fix: Force Embed Mode
            let cleanUrl = url;
            if (cleanUrl.includes('show?code=')) {
                cleanUrl = cleanUrl.split('&mode=')[0] + "&mode=video";
            }
            
            frame.src = cleanUrl;
            display.innerText = title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
