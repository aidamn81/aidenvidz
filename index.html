<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
            --grid-color: rgba(197, 160, 89, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
            touch-action: none;
        }

        #auth-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 60px 40px;
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
        }

        .ritual-btn {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        #archive-ui { display: none; width: 100%; height: 100%; position: relative; }

        #viewport { width: 100vw; height: 100vh; overflow: auto; position: relative; }

        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .status-text { margin-top: 20px; font-size: 12px; letter-spacing: 2px; height: 20px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <h1 style="letter-spacing: 8px; font-weight: 300; margin-bottom: 40px;">THE GOTHIC ARCHIVE</h1>
            <button id="summon-btn" class="ritual-btn" onclick="summonArchive()">Summon Archive</button>
            <div id="status" class="status-text"></div>
        </div>
    </div>

    <div id="archive-ui">
        <div id="viewport">
            <div id="canvas">
                </div>
        </div>
        <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:20px; z-index:1000;">
            <button onclick="saveArchive()" style="background:rgba(0,0,0,0.8); border:1px solid var(--gothic-gold); color:var(--gothic-gold); padding:10px 20px; cursor:pointer;">SEAL</button>
            <button onclick="banishArchive()" style="background:rgba(0,0,0,0.8); border:1px solid var(--gothic-red); color:var(--gothic-red); padding:10px 20px; cursor:pointer;">BANISH</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();
        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        function setStatus(msg) { document.getElementById('status').innerText = msg; }

        async function summonArchive() {
            try {
                setStatus("Opening Gate...");
                // Force local storage persistence
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                // Use Redirect to bypass iPad Popup Blockers
                await auth.signInWithRedirect(provider);
            } catch (error) {
                setStatus("Error: " + error.message);
            }
        }

        // Handle the return from Redirect
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                localStorage.setItem('ritual_active', 'true');
            }
        }).catch(error => {
            if (error.code !== 'auth/no-auth-event') setStatus(error.message);
        });

        auth.onAuthStateChanged((user) => {
            const overlay = document.getElementById('auth-overlay');
            const ui = document.getElementById('archive-ui');

            if (user) {
                if (user.uid === MASTER_UID) {
                    setStatus("Master Verified.");
                    localStorage.removeItem('ritual_active');
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    loadArchive();
                } else {
                    setStatus("Access Denied.");
                    auth.signOut();
                }
            } else {
                // If we are waiting for a redirect, don't show the login button yet
                if (localStorage.getItem('ritual_active')) {
                    setStatus("Verifying Identity...");
                } else {
                    overlay.style.display = 'flex';
                    ui.style.display = 'none';
                }
            }
        });

        function banishArchive() {
            localStorage.removeItem('ritual_active');
            auth.signOut().then(() => window.location.reload());
        }

        function saveArchive() {
            const user = auth.currentUser;
            if (user && user.uid === MASTER_UID) {
                db.ref('archive/' + user.uid).set({ lastUpdated: Date.now() })
                .then(() => alert("Sealed."));
            }
        }

        function loadArchive() {
            // Recenter viewport
            const v = document.getElementById('viewport');
            v.scrollLeft = (5000 - window.innerWidth) / 2;
            v.scrollTop = (5000 - window.innerHeight) / 2;
        }
    </script>
</body>
</html>
