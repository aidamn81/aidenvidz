<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #8b0000;
            --grid-line: rgba(197, 160, 89, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        /* --- THE GATE --- */
        #gate-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 60px 40px;
            text-align: center;
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.1);
        }

        .ritual-btn {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            transition: all 0.5s ease;
        }

        .ritual-btn:hover { background: var(--gothic-gold); color: var(--gothic-black); }

        /* --- THE ARCHIVE --- */
        #archive-ui { display: none; width: 100%; height: 100%; position: relative; }
        #canvas {
            width: 5000px; height: 5000px;
            position: absolute;
            background-image: radial-gradient(var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #status { margin-top: 25px; font-size: 12px; letter-spacing: 2px; height: 30px; max-width: 300px; word-break: break-all; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="gate-overlay">
        <div class="auth-container">
            <h1 style="letter-spacing: 8px; font-weight: 300; margin-bottom: 40px;">THE GOTHIC ARCHIVE</h1>
            <button class="ritual-btn" onclick="summon()">Summon Archive</button>
            <div id="status">THE GATE IS LOCKED</div>
        </div>
    </div>

    <div id="archive-ui">
        <div id="canvas">
            <h1 style="padding: 50px;">WELCOME HOME, MASTER.</h1>
        </div>
        <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:20px; z-index:1000;">
            <button onclick="auth.signOut().then(() => window.location.reload())" style="background:none; border:1px solid var(--gothic-red); color:var(--gothic-red); padding:10px 20px; cursor:pointer;">BANISH SESSION</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // MASTER UID: Verify this matches the ID shown if you get an "Unauthorized" error.
        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        const status = document.getElementById('status');

        async function summon() {
            status.innerText = "INVOKING GOOGLE...";
            // Force the device to remember the login locally
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            auth.signInWithRedirect(provider);
        }

        // Handle the Return from Redirect
        auth.getRedirectResult().catch(err => {
            if (err.code !== 'auth/no-auth-event') status.innerText = "RITUAL FAILED: " + err.message;
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.uid === MASTER_UID) {
                    status.innerText = "MASTER VERIFIED.";
                    document.getElementById('gate-overlay').style.display = 'none';
                    document.getElementById('archive-ui').style.display = 'block';
                } else {
                    // This reveals your UID if the Master Key doesn't match
                    status.innerHTML = `<span style="color:var(--gothic-red)">UNAUTHORIZED SOUL.</span><br>YOUR UID: <b style="color:white">${user.uid}</b>`;
                }
            } else {
                status.innerText = "THE GATE IS LOCKED";
            }
        });
    </script>
</body>
</html>
