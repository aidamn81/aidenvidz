<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gothic Video Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --gothic-red: #4a0404;
            --deep-black: #050505;
            --gold: #c5a059;
            --soft-white: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-black);
            color: var(--soft-white);
            font-family: 'Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- THEATER PLAYER --- */
        #theater-section {
            width: 100%;
            background: #000;
            padding: 15px;
            border-bottom: 2px solid var(--gothic-red);
            display: flex;
            justify-content: center;
        }

        .player-wrapper {
            width: 75%;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(74,4,4,0.4);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
            background: #000;
        }

        .now-playing {
            padding: 10px;
            background: #0a0a0a;
            border-top: 1px solid #222;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        /* --- TOOLBAR --- */
        .toolbar {
            width: 95%;
            padding: 20px 0 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            flex-grow: 1;
            min-width: 250px;
            outline: none;
        }

        .btn {
            background: var(--gothic-red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            border-radius: 4px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        #playlist-bar {
            width: 95%;
            display: flex;
            overflow-x: auto;
            padding: 10px 0 20px;
            gap: 10px;
            scrollbar-width: none;
        }

        .playlist-tab {
            border: 1px solid #333;
            background: #0d0d0d;
            color: #777;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .playlist-tab.active {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* --- GRID --- */
        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            width: 95%;
            padding-bottom: 60px;
        }

        .video-card {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .thumb-box { width: 100%; height: 110px; background: #000; position: relative; cursor: pointer; }
        .thumb-box video, .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .card-label { padding: 8px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 5px; }
        .label-top { display: flex; justify-content: space-between; align-items: center; }
        .video-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; font-weight: bold; }
        .video-tags-display { font-size: 0.65rem; color: #555; font-style: italic; }
        
        .card-actions { display: flex; gap: 12px; justify-content: flex-end; padding-top: 5px; }
        .icon-btn { cursor: pointer; font-size: 1rem; opacity: 0.7; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        /* --- MODALS --- */
        #summon-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #111;
            padding: 25px;
            border: 1px solid var(--gothic-red);
            width: 90%;
            max-width: 420px;
            border-radius: 8px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }

        label { font-size: 0.7rem; color: var(--gold); display: block; margin-bottom: 4px; text-transform: uppercase; }

        @media (max-width: 768px) {
            #video-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="theater-section">
        <div class="player-wrapper">
            <video id="master-player" controls preload="metadata"><source id="master-source" src=""></video>
            <div class="now-playing">
                <span id="playing-title" style="color:var(--gold)">Awaiting Vision...</span>
                <span id="playing-list" style="color:#444;"></span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="search-bar" class="search-input" placeholder="Search archive by title or tags..." oninput="refreshUI()">
        <button class="btn" onclick="toggleSummon()">Summon +</button>
    </div>

    <div id="playlist-bar"></div>

    <div id="video-grid"></div>

    <input type="file" id="update-thumb-input" style="display:none;" accept="image/*" onchange="processUpdateThumb(this)">

    <div id="summon-modal">
        <div class="modal-box">
            <h2 style="margin-top:0; color:var(--gothic-red);">NEW VISION</h2>
            <label>Title</label>
            <input type="text" id="in-title">
            <label>Video URL</label>
            <input type="text" id="in-url">
            <label>Tags (comma separated)</label>
            <input type="text" id="in-tags" placeholder="e.g. ambient, ritual">
            <label>Thumbnail (Optional)</label>
            <input type="file" id="in-thumb" accept="image/*">
            <label>Playlist</label>
            <select id="playlist-select" onchange="checkNewPlaylist(this.value)">
                <option value="General">General Archive</option>
                <option value="NEW_PLAYLIST">+ Create New...</option>
            </select>
            <input type="text" id="in-new-playlist" placeholder="Playlist Name" style="display:none;">
            <button class="btn" style="width:100%" onclick="saveVideo()">Save</button>
            <button class="btn" style="width:100%; margin-top:10px; background:#222;" onclick="toggleSummon()">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:2497c49a00fcf29153593e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let archive = [];
        let currentPlaylist = 'All';
        let updatingId = null;

        function toggleSummon() {
            const m = document.getElementById('summon-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function checkNewPlaylist(val) {
            document.getElementById('in-new-playlist').style.display = (val === "NEW_PLAYLIST") ? "block" : "none";
        }

        function saveVideo() {
            const title = document.getElementById('in-title').value;
            const url = document.getElementById('in-url').value;
            const tags = document.getElementById('in-tags').value;
            const thumbFile = document.getElementById('in-thumb').files[0];
            let playlist = document.getElementById('playlist-select').value;
            
            if (playlist === "NEW_PLAYLIST") playlist = document.getElementById('in-new-playlist').value || "General";
            if (!title || !url) return alert("Required fields missing.");

            const pushData = (imgData) => {
                db.ref('vault').push({ 
                    title, 
                    url, 
                    tags, 
                    playlist, 
                    customThumb: imgData || "", 
                    timestamp: Date.now() 
                });
                toggleSummon();
                document.querySelectorAll('#summon-modal input').forEach(i => i.value = "");
            };

            if (thumbFile) {
                const r = new FileReader(); r.onload = (e) => pushData(e.target.result); r.readAsDataURL(thumbFile);
            } else pushData("");
        }

        db.ref('vault').on('value', snap => {
            const data = snap.val();
            archive = [];
            for(let id in data) archive.push({ id, ...data[id] });
            archive.sort((a,b) => b.timestamp - a.timestamp);
            renderPlaylists();
            refreshUI();
        });

        function renderPlaylists() {
            const bar = document.getElementById('playlist-bar');
            const select = document.getElementById('playlist-select');
            const lists = [...new Set(archive.map(v => v.playlist))].filter(l => l && l !== "General");
            bar.innerHTML = `<div class="playlist-tab ${currentPlaylist === 'All' ? 'active' : ''}" onclick="setPlaylist('All')">All</div>`;
            select.innerHTML = `<option value="General">General Archive</option>`;
            lists.forEach(l => {
                bar.innerHTML += `<div class="playlist-tab ${currentPlaylist === l ? 'active' : ''}" onclick="setPlaylist('${l}')">${l}</div>`;
                select.innerHTML += `<option value="${l}">${l}</option>`;
            });
            select.innerHTML += `<option value="NEW_PLAYLIST">+ Create New...</option>`;
        }

        function setPlaylist(name) { currentPlaylist = name; renderPlaylists(); refreshUI(); }

        function triggerUpdateThumb(id) {
            updatingId = id;
            document.getElementById('update-thumb-input').click();
        }

        function processUpdateThumb(input) {
            if (input.files && input.files[0] && updatingId) {
                const r = new FileReader();
                r.onload = (e) => {
                    db.ref(`vault/${updatingId}`).update({ customThumb: e.target.result });
                    updatingId = null;
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function refreshUI() {
            const grid = document.getElementById('video-grid');
            const term = document.getElementById('search-bar').value.toLowerCase();
            grid.innerHTML = "";
            archive.forEach(v => {
                const matchesSearch = v.title.toLowerCase().includes(term) || (v.tags && v.tags.toLowerCase().includes(term));
                if ((currentPlaylist === 'All' || v.playlist === currentPlaylist) && matchesSearch) {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    const thumb = v.customThumb ? `<img src="${v.customThumb}">` : `<video preload="metadata"><source src="${v.url}#t=1"></video>`;
                    card.innerHTML = `
                        <div class="thumb-box" onclick="play('${v.url}', '${v.title.replace(/'/g, "\\'")}', '${v.playlist}')">${thumb}</div>
                        <div class="card-label">
                            <div class="label-top"><span class="video-title">${v.title}</span></div>
                            <div class="video-tags-display">${v.tags ? v.tags : ''}</div>
                            <div class="card-actions">
                                <span class="icon-btn" onclick="triggerUpdateThumb('${v.id}')" title="Change Image">🖼️</span>
                                <span class="icon-btn" onclick="deleteVideo('${v.id}', '${v.title.replace(/'/g, "\\'")}')" style="color:var(--gothic-red)">🗑</span>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                }
            });
        }

        function play(url, title, list) {
            const p = document.getElementById('master-player');
            const s = document.getElementById('master-source');
            if (url.startsWith('//')) url = 'https:' + url;
            s.src = url; p.load(); p.play().catch(()=>{});
            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-list').innerText = "In: " + list;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteVideo(id, title) {
            if (confirm(`Banish "${title}"?`)) db.ref('vault/' + id).remove();
        }
    </script>
</body>
</html>
