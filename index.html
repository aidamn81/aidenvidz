<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    
    <!-- CORE FIREBASE V8 ENGINE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- SIGNATURE GOTHIC ARCHIVE DESIGN THEME --- */
        :root {
            --bg-dark: #070709;
            --panel-dark: #111115;
            --accent-blood: #800020;
            --accent-crimson: #9a1a32;
            --text-goth: #d4d4dc;
            --text-dim: #8a8a95;
            --grid-line: rgba(128, 0, 32, 0.12);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-goth);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Bound context window inside viewport */
            width: 100vw;
            height: 100vh;
        }

        /* Fixed Dashboard Control Deck */
        .controls-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--panel-dark);
            border-bottom: 2px solid var(--accent-blood);
            padding: 0 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }

        input[type="text"] {
            background: #181822;
            border: 1px solid #2d2d3a;
            color: var(--text-goth);
            padding: 10px 14px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            flex: 1;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-crimson);
        }

        button {
            background: #1c1c24;
            border: 1px solid var(--accent-blood);
            color: var(--text-goth);
            padding: 10px 18px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--accent-blood);
            border-color: var(--accent-crimson);
            box-shadow: 0 0 8px rgba(128, 0, 32, 0.6);
        }

        /* Main Workspace Canvas viewport container */
        #archive-viewport {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: auto; /* Infinite scroll engine container */
            background: #09090c;
        }

        #archive-container {
            position: relative;
            width: 3000px;  /* Huge boundary maps for extensive canvas scroll */
            height: 3000px;
            transform-origin: 0 0;
        }

        /* Subtle Guide Grid (Only displays when Edit Mode is active) */
        .edit-mode #archive-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }

        /* Relic Display Grid Items */
        .relic-item {
            position: absolute;
            background: #121217;
            border: 1px solid #23232f;
            border-radius: 6px;
            padding: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: grab;
            z-index: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .relic-item:active {
            cursor: grabbing;
        }

        .relic-item:hover {
            border-color: var(--accent-blood);
            box-shadow: 0 10px 30px rgba(128, 0, 32, 0.25);
        }

        .relic-thumb-wrapper {
            width: 100%;
            flex: 1;
            border-radius: 4px;
            overflow: hidden;
            background: #030305;
            position: relative;
        }

        .relic-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .relic-title {
            height: 32px;
            line-height: 32px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: bold;
            color: #b5b5bd;
            padding: 0 4px;
        }

        /* Scrollable Context Menu Structure */
        .goth-context-menu {
            position: fixed;
            background: #14141a;
            border: 1px solid var(--accent-blood);
            border-radius: 6px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.95);
            z-index: 10000;
            max-height: 260px;
            overflow-y: auto;
            width: 220px;
            padding: 4px 0;
        }

        .goth-context-menu div {
            padding: 11px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-goth);
            border-bottom: 1px solid #1e1e26;
            transition: background 0.15s, color 0.15s;
        }

        .goth-context-menu div:last-child {
            border-bottom: none;
        }

        .goth-context-menu div:hover {
            background: var(--accent-blood);
            color: #ffffff;
        }

        /* Interactive UI indicators */
        .edit-mode .relic-item {
            border-style: dashed;
            border-color: var(--accent-crimson);
        }
    </style>
</head>
<body>

    <!-- CONTROLS DECK PLATFORM -->
    <div class="controls-bar">
        <input type="text" id="relic-url" placeholder="Paste Video / Document Resource URL">
        <input type="text" id="relic-name" placeholder="Label Designation">
        <button id="btn-deposit">Deposit Link</button>
        <button id="btn-toggle-edit">Toggle Edit Mode</button>
        <button id="btn-recenter">Formation Recentering</button>
    </div>

    <!-- VIEWPORT & CANVAS STRUCTURE BOUNDARIES -->
    <div id="archive-viewport">
        <div id="archive-container"></div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION AND FIREBASE INIT
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.firebasestorage.app",
            messagingSenderId: "881025264027",
            appId: "1:881025264027:web:8b19123c72551f0753593e",
            measurementId: "G-V4XS69QD1Y"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        let editModeActive = false;
        const container = document.getElementById('archive-container');

        // ==========================================
        // REALTIME DATABASE INTEGRATION LOOP
        // ==========================================
        db.collection("notes").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
            container.innerHTML = ""; 
            
            snapshot.forEach((doc) => {
                createRelicElement(doc.id, doc.data());
            });
            
            if (editModeActive) makeRelicsInteractive();
        }, (error) => {
            console.error("Critical Firestore sync runtime alert: ", error);
        });

        // ==========================================
        // DEPOSIT LOGIC
        // ==========================================
        document.getElementById('btn-deposit').addEventListener('click', () => {
            const url = document.getElementById('relic-url').value.trim();
            const name = document.getElementById('relic-name').value.trim() || "Untitled Relic";

            if (!url) {
                alert("Please drop a valid resource link target first.");
                return;
            }

            const currentItemCount = container.children.length;
            const calculatedLeft = (currentItemCount * 60) % (window.innerWidth - 260) + 60;
            const calculatedTop = Math.floor((currentItemCount * 60) / (window.innerWidth - 260)) * 200 + 80;

            const newRelic = {
                title: name,
                linkUrl: url,
                imageUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400", 
                x: calculatedLeft,
                y: calculatedTop,
                width: 220,
                height: 160,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection("notes").add(newRelic)
                .then(() => {
                    document.getElementById('relic-url').value = "";
                    document.getElementById('relic-name').value = "";
                })
                .catch((err) => console.error("Write dropped by system profile security rules: ", err));
        });

        // ==========================================
        // COMPONENT ELEMENT DOM BUILDER
        // ==========================================
        function createRelicElement(id, data) {
            const relic = document.createElement('div');
            relic.className = 'relic-item';
            relic.id = id;
            relic.style.left = `${data.x}px`;
            relic.style.top = `${data.y}px`;
            relic.style.width = `${data.width}px`;
            relic.style.height = `${data.height}px`;

            relic.innerHTML = `
                <div class="relic-thumb-wrapper">
                    <img src="${data.imageUrl}" class="relic-thumb" alt="Archive Object">
                </div>
                <div class="relic-title">${data.title}</div>
            `;

            // Double Click Event to Open Link
            relic.addEventListener('dblclick', () => {
                window.open(data.linkUrl, '_blank');
            });

            // Long Press & Right Click Menu Triggers
            let touchTimer;
            relic.addEventListener('touchstart', (e) => {
                touchTimer = setTimeout(() => spawnContextMenu(e.touches[0], id, data), 600);
            }, { passive: true });

            relic.addEventListener('touchend', () => clearTimeout(touchTimer));
            relic.addEventListener('touchmove', () => clearTimeout(touchTimer));

            relic.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                spawnContextMenu(e, id, data);
            });

            container.appendChild(relic);
        }

        // ==========================================
        // CONTEXT MENU (SCROLLABLE & PRESERVED)
        // ==========================================
        function spawnContextMenu(e, id, data) {
            const oldMenu = document.querySelector('.goth-context-menu');
            if (oldMenu) oldMenu.remove();

            const menu = document.createElement('div');
            menu.className = 'goth-context-menu';
            menu.style.left = `${e.clientX}px`;
            menu.style.top = `${e.clientY}px`;

            menu.innerHTML = `
                <div onclick="window.open('${data.linkUrl}', '_blank')">Open in New Tab</div>
                <div onclick="renameRelic('${id}')">Rename</div>
                <div onclick="changeRelicImage('${id}')">Change Image</div>
                <div onclick="snapToOriginalShape('${id}')">Resize to Original</div>
                <div onclick="deleteRelicConfirmation('${id}')" style="color: #ff4d4d; font-weight: bold;">Delete Relic</div>
            `;

            document.body.appendChild(menu);

            setTimeout(() => {
                document.addEventListener('click', function closeMenu() {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                });
            }, 50);
        }

        // ==========================================
        // MUTATION DATABASE OPERATIONS
        // ==========================================
        window.renameRelic = function(id) {
            const currentTitle = document.getElementById(id).querySelector('.relic-title').innerText;
            const newName = prompt("Modify designation label metadata:", currentTitle);
            if (newName) {
                db.collection("notes").doc(id).update({ title: newName });
            }
        };

        window.changeRelicImage = function(id) {
            const newImg = prompt("Provide fresh image URL address location path:");
            if (newImg) {
                db.collection("notes").doc(id).update({ imageUrl: newImg });
            }
        };

        window.snapToOriginalShape = function(id) {
            db.collection("notes").doc(id).update({
                width: 220,
                height: 160
            });
        };

        window.deleteRelicConfirmation = function(id) {
            if (confirm("Confirm complete elimination of target element from primary storage archives?")) {
                db.collection("notes").doc(id).delete();
            }
        };

        // ==========================================
        // INTERACTIVE CANVAS LOGIC (DRAG & SNAP)
        // ==========================================
        function makeRelicsInteractive() {
            const items = document.querySelectorAll('.relic-item');
            items.forEach(item => {
                let isDragging = false;
                let startX, startY;

                // Mouse Drag Events
                item.addEventListener('mousedown', startDrag);
                
                // Touch Drag Support (Finger Adjustments)
                item.addEventListener('touchstart', (e) => {
                    if(editModeActive) startDrag(e.touches[0]);
                }, { passive: true });

                function startDrag(e) {
                    if (!editModeActive || (e.button !== undefined && e.button !== 0)) return;
                    isDragging = true;
                    startX = e.clientX - item.offsetLeft;
                    startY = e.clientY - item.offsetTop;
                    item.style.zIndex = 1000;

                    document.addEventListener('mousemove', moveDrag);
                    document.addEventListener('touchmove', moveTouchDrag, { passive: false });
                    document.addEventListener('mouseup', endDrag);
                    document.addEventListener('touchend', endDrag);
                }

                function moveTouchDrag(e) {
                    if (isDragging) e.preventDefault();
                    moveDrag(e.touches[0]);
                }

                function moveDrag(e) {
                    if (!isDragging) return;
                    let newX = e.clientX - startX;
                    let newY = e.clientY - startY;

                    // Absolute Boundaries Containment Check
                    if (newX < 0) newX = 0;
                    if (newY < 0) newY = 0;
                    if (newX > 3000 - item.offsetWidth) newX = 3000 - item.offsetWidth;
                    if (newY > 3000 - item.offsetHeight) newY = 3000 - item.offsetHeight;

                    // Soft Grid Snap (40px Alignment blocks)
                    newX = Math.round(newX / 40) * 40;
                    newY = Math.round(newY / 40) * 40;

                    item.style.left = `${newX}px`;
                    item.style.top = `${newY}px`;
                }

                function endDrag() {
                    if (!isDragging) return;
                    isDragging = false;
                    item.style.zIndex = 2;

                    document.removeEventListener('mousemove', moveDrag);
                    document.removeEventListener('touchmove', moveTouchDrag);
                    document.removeEventListener('mouseup', endDrag);
                    document.removeEventListener('touchend', endDrag);

                    db.collection("notes").doc(item.id).update({
                        x: parseInt(item.style.left),
                        y: parseInt(item.style.top)
                    });
                }
            });
        }

        // Mode Switching Systems
        document.getElementById('btn-toggle-edit').addEventListener('click', () => {
            editModeActive = !editModeActive;
            document.body.classList.toggle('edit-mode', editModeActive);
            document.getElementById('btn-toggle-edit').innerText = editModeActive ? "Exit Edit Mode" : "Toggle Edit Mode";
            if (editModeActive) {
                makeRelicsInteractive();
            } else {
                location.reload(); 
            }
        });

        // Formation Style Recentering System Engine
        document.getElementById('btn-recenter').addEventListener('click', () => {
            const items = document.querySelectorAll('.relic-item');
            items.forEach((item, index) => {
                const targetX = (index * 60) % (window.innerWidth - 260) + 60;
                const targetY = Math.floor((index * 60) / (window.innerWidth - 260)) * 180 + 100;
                
                db.collection("notes").doc(item.id).update({
                    x: targetX,
                    y: targetY
                });
            });
        });
    </script>
</body>
</html>
