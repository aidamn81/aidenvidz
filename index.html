<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gothic Video Archive</title>
    <!-- Firebase Modular SDKs (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { initializeFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ===================================================
        // PASTE YOUR COPIED FIREBASE CONFIG SNIPPET HERE:
        // ===================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Core Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Force Firestore to completely bypass local cache and use clean live fetch
        const db = initializeFirestore(app, {
            localCache: {
                kind: 'persistent',
                tabManager: { kind: 'fallback' }
            }
        }, { experimentalForceLongPolling: true });

        window.dbInstance = db;
        window.isDbAuthenticated = false;

        // Force UI activation when authentication resolves
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Session verified: " + user.uid);
                window.isDbAuthenticated = true;
                const depositBtn = document.getElementById('depositBtn');
                if (depositBtn) {
                    depositBtn.disabled = false;
                    depositBtn.style.opacity = "1";
                }
            }
        });

        // Initialize authorization background pipe
        signInAnonymously(auth).catch(err => {
            console.error("Auth Handshake Interrupted:", err);
            window.isDbAuthenticated = true;
            const depositBtn = document.getElementById('depositBtn');
            if (depositBtn) {
                depositBtn.disabled = false;
                depositBtn.style.opacity = "1";
            }
        });
    </script>

    <style>
        :root {
            --bg-black: #000000;
            --panel-dark: #0b0b0c;
            --border-goth: #1f1f22;
            --accent-glow: #7026c2;
            --accent-hover: #8b3be6;
            --text-main: #e2e2e5;
            --text-muted: #6c6c75;
            --danger: #e65a73;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .archive-container { width: 100%; max-width: 1080px; display: flex; flex-direction: column; gap: 24px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-goth);
            padding-bottom: 16px;
        }

        h1 { font-size: 1.3rem; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: #ffffff; }

        .btn {
            background: var(--panel-dark);
            color: var(--text-main);
            border: 1px solid var(--border-goth);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn:hover:not(:disabled) { border-color: var(--accent-glow); color: #ffffff; }
        .btn-primary { background: var(--accent-glow); border-color: var(--accent-glow); color: #ffffff; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-danger { background: rgba(230, 90, 115, 0.05); border-color: rgba(230, 90, 115, 0.2); color: var(--danger); }
        .btn-danger:hover:not(:disabled) { background: var(--danger); color: #ffffff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .player-stage {
            background: #040405;
            border: 1px solid var(--border-goth);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .now-playing-banner {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 40px 20px 15px 20px;
            pointer-events: none;
        }
        .now-playing-title { font-size: 1.05rem; font-weight: 400; color: #ffffff; }

        .relic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 10px;
        }

        .relic-card {
            background: var(--panel-dark);
            border: 1px solid var(--border-goth);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .relic-card:hover { border-color: var(--accent-glow); transform: translateY(-2px); }
        .relic-card.active { border-color: var(--accent-glow); box-shadow: 0 0 14px rgba(112,38,194,0.25); }

        .thumb-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #050506;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-goth);
            position: relative;
            overflow: hidden;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-fallback { color: var(--text-muted); font-size: 2rem; transition: color 0.2s ease; }
        .relic-card:hover .thumb-fallback { color: var(--accent-glow); }

        .relic-info { padding: 14px; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .relic-title { font-size: 0.95rem; font-weight: 400; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 4px; min-height: 18px; }
        .tag { background: #131316; border: 1px solid #222; color: var(--text-muted); font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }

        .relic-menu-trigger {
            position: absolute; right: 10px; top: 12px;
            background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px;
        }
        .relic-menu-trigger:hover { color: #ffffff; background: rgba(255,255,255,0.05); }

        .options-menu {
            position: absolute; background: #111112; border: 1px solid var(--border-goth);
            border-radius: 6px; width: 140px; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .options-menu.visible { display: block; }
        .menu-item {
            width: 100%; padding: 10px 14px; background: transparent; border: none;
            color: var(--text-main); text-align: left; font-size: 0.8rem; cursor: pointer;
        }
        .menu-item:hover { background: rgba(112, 38, 194, 0.15); color: #ffffff; }
        .menu-item.danger { color: var(--danger); }
        .menu-item.danger:hover { background: rgba(230, 90, 115, 0.1); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(3px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-window {
            background: #101012; border: 1px solid var(--border-goth);
            border-radius: 12px; width: 100%; max-width: 460px; padding: 24px;
            display: flex; flex-direction: column; gap: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .modal-title { font-size: 1.1rem; font-weight: 400; letter-spacing: 0.5px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input {
            background: #050506; border: 1px solid var(--border-goth);
            color: #ffffff; padding: 10px; border-radius: 6px; font-size: 0.9rem; outline: none; transition: border-color 0.2s ease;
        }
        .form-input:focus { border-color: var(--accent-glow); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; background: #121214;
            border-left: 3px solid var(--accent-glow); padding: 12px 20px;
            border-radius: 4px; font-size: 0.85rem; transform: translateY(100px);
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000;
        }
        .toast.visible { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="archive-container">
        <header>
            <h1>Gothic Archive</h1>
            <button id="depositBtn" class="btn btn-primary" onclick="openAddModal()" disabled style="opacity: 0.5;">+ Deposit Video</button>
        </header>

        <section class="player-stage">
            <video id="mainPlayer" controls autoplay preload="auto" playsinline></video>
            <div class="now-playing-banner">
                <div class="now-playing-title" id="nowPlayingTitle">Vault Empty</div>
            </div>
        </section>

        <main class="relic-grid" id="relicGrid"></main>
    </div>

    <div id="contextMenu" class="options-menu">
        <button class="menu-item danger" onclick="triggerDelete()">Delete Entry</button>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal-window" id="modalWindow"></div>
    </div>

    <div id="toast" class="toast">Action Logged</div>

    <script>
        let currentCollection = [];
        let activeTargetId = null;
        let base64ImageBuffer = "";

        const mainPlayer = document.getElementById('mainPlayer');
        const relicGrid = document.getElementById('relicGrid');
        const contextMenu = document.getElementById('contextMenu');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalWindow = document.getElementById('modalWindow');

        const checkFirebase = setInterval(() => {
            if (window.dbInstance) {
                clearInterval(checkFirebase);
                initializeRealtimeListener();
            }
        }, 100);

        function initializeRealtimeListener() {
            onSnapshot(collection(window.dbInstance, "videos"), (snapshot) => {
                currentCollection = [];
                snapshot.forEach((doc) => {
                    currentCollection.push({ id: doc.id, ...doc.data() });
                });
                
                currentCollection.sort((a,b) => (Number(a.timestamp) || 0) - (Number(b.timestamp) || 0));
                renderGrid();
                
                if(currentCollection.length > 0 && !mainPlayer.dataset.activeId) {
                    loadVideoIntoStage(currentCollection[0].id);
                }
            });
        }

        function formatVideoUrl(urlStr) {
            let target = urlStr.trim();
            try {
                let urlObj = new URL(target);
                if (urlObj.hostname.includes('pcloud.com') || urlObj.hostname.includes('pc.cd')) {
                    if(urlObj.pathname.includes('/publink/show')) {
                        let code = urlObj.searchParams.get('code');
                        if(code) return `https://api.pcloud.com/getpubthumb?code=${code}&size=video`;
                    }
                    if(urlObj.hostname === 'pc.cd') {
                        let pathCode = urlObj.pathname.replace('/', '');
                        if(pathCode) return `https://api.pcloud.com/getpublinkvideo?code=${pathCode}`;
                    }
                }
            } catch (e) {}
            return target;
        }

        function renderGrid() {
            relicGrid.innerHTML = '';
            if (currentCollection.length === 0) {
                relicGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:60px 0; font-size:0.85rem;">No media files indexed in database.</div>`;
                return;
            }

            currentCollection.forEach(item => {
                const card = document.createElement('div');
                card.className = `relic-card ${mainPlayer.dataset.activeId === item.id ? 'active' : ''}`;
                card.dataset.id = item.id;
                card.onclick = (e) => { if(!e.target.closest('.relic-menu-trigger')) loadVideoIntoStage(item.id); };

                let tagsHtml = (item.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
                let thumbnailHtml = item.thumbnail ? `<img src="${item.thumbnail}" alt="">` : `<div class="thumb-fallback">🎬</div>`;

                card.innerHTML = `
                    <div class="thumb-box">${thumbnailHtml}</div>
                    <div class="relic-info">
                        <div class="relic-title" title="${escapeHtml(item.title)}">${escapeHtml(item.title || "Untitled Relic")}</div>
                        <div class="tag-row">${tagsHtml}</div>
                        <button class="relic-menu-trigger" onclick="openContextMenu(event, '${item.id}')">⋮</button>
                    </div>
                `;
                relicGrid.appendChild(card);
            });
        }

        function loadVideoIntoStage(id) {
            const item = currentCollection.find(r => r.id === id);
            if (!item) return;

            mainPlayer.dataset.activeId = id;
            mainPlayer.src = formatVideoUrl(item.url);
            document.getElementById('nowPlayingTitle').textContent = item.title || "Untitled Relic";

            document.querySelectorAll('.relic-card').forEach(c => {
                c.classList.toggle('active', c.dataset.id === id);
            });
        }

        window.processImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    
                    // Severe compression to force absolute micro-sizing
                    const TARGET_WIDTH = 240;
                    const scaleFactor = TARGET_WIDTH / img.width;
                    const targetHeight = img.height * scaleFactor;
                    
                    canvas.width = TARGET_WIDTH;
                    canvas.height = targetHeight;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.drawImage(img, 0, 0, TARGET_WIDTH, targetHeight);
                    
                    base64ImageBuffer = canvas.toDataURL('image/jpeg', 0.4);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        function openAddModal() {
            base64ImageBuffer = ""; 
            modalWindow.innerHTML = `
                <h3 class="modal-title">Deposit Asset Records</h3>
                <div class="form-group">
                    <label>Video Address URL (pCloud Public Link)</label>
                    <input type="url" id="modalUrl" class="form-input" placeholder="https://pc.cd/..." required>
                </div>
                <div class="form-group">
                    <label>Title <span style="color:var(--text-muted)">(Optional)</span></label>
                    <input type="text" id="modalTitle" class="form-input" placeholder="Enter custom file alias...">
                </div>
                <div class="form-group">
                    <label>Tags <span style="color:var(--text-muted)">(Optional - Comma separated)</span></label>
                    <input type="text" id="modalTags" class="form-input" placeholder="live, cabaret, archive">
                </div>
                <div class="form-group">
                    <label>Custom Thumbnail Cover <span style="color:var(--text-muted)">(Optional)</span></label>
                    <input type="file" id="modalFile" accept="image/*" class="form-input" onchange="processImageUpload(event)">
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal()">Abort</button>
                    <button class="btn btn-primary" onclick="commitAddRelic()">Index Entry</button>
                </div>
            `;
            modalOverlay.classList.add('active');
            document.getElementById('modalUrl').focus();
        }

        window.commitAddRelic = async function() {
            const url = document.getElementById('modalUrl').value.trim();
            let title = document.getElementById('modalTitle').value.trim();
            const tagsRaw = document.getElementById('modalTags').value.trim();

            if (!url) { alert("Video target link pointer is required."); return; }
            if (!title) title = "Video Track " + (currentCollection.length + 1);

            const tagsArray = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];

            // Flat, plain string sanitation to avoid object type injection rejections
            const payload = {
                url: String(url),
                title: String(title),
                tags: tagsArray,
                thumbnail: String(base64ImageBuffer),
                timestamp: Number(Date.now())
            };

            try {
                await addDoc(collection(window.dbInstance, "videos"), payload);
                closeModal();
                showToast("Resource document committed.");
            } catch (err) {
                console.error("Database Write Error Details:", err);
                alert("Database insertion rejected. Cache flushed. Please try submitting again.");
            }
        };

        window.openContextMenu = function(e, id) {
            e.preventDefault(); e.stopPropagation();
            activeTargetId = id;
            const rect = e.target.getBoundingClientRect();
            contextMenu.style.top = `${rect.bottom + window.scrollY + 6}px`;
            contextMenu.style.left = `${rect.left + window.scrollX - 110}px`;
            contextMenu.classList.add('visible');
        };

        window.triggerDelete = function() {
            contextMenu.classList.remove('visible');
            modalWindow.innerHTML = `
                <h3 class="modal-title" style="color:var(--danger)">Confirm Deletion</h3>
                <p style="font-size:0.85rem; color:var(--text-muted)">Are you sure you want to permanently delete this video entry from Firestore? This action cannot be undone.</p>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-danger" onclick="commitDelete()">Purge Entry</button>
                </div>
            `;
            modalOverlay.classList.add('active');
        };

        window.commitDelete = async function() {
            try {
                await deleteDoc(doc(window.dbInstance, "videos", activeTargetId));
                let wasActive = mainPlayer.dataset.activeId === activeTargetId;
                closeModal();
                showToast("Record completely purged.");
                
                if(wasActive) {
                    mainPlayer.removeAttribute('src');
                    mainPlayer.load();
                    mainPlayer.dataset.activeId = "";
                    document.getElementById('nowPlayingTitle').textContent = "Vault Empty";
                }
            } catch (err) {
                alert("Purge transaction rejected.");
            }
        };

        window.closeModal = function() { modalOverlay.classList.remove('active'); };
        
        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg;
            t.classList.add('visible'); setTimeout(() => t.classList.remove('visible'), 2500);
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        
        document.addEventListener('click', (e) => { if(!e.target.closest('.relic-menu-trigger')) contextMenu.classList.remove('visible'); });
    </script>
</body>
</html>
