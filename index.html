<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --gothic-black: #0a0a0a;
            --gothic-gold: #c5a059;
            --gothic-red: #4a0404;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--gothic-black);
            color: var(--gothic-gold);
            font-family: 'Crimson Text', serif;
            overflow: hidden;
        }

        /* --- Login Overlay --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .auth-container {
            border: 1px solid var(--gothic-gold);
            padding: 50px;
            text-align: center;
            background: #111;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.1);
        }

        .btn-google {
            background: none;
            color: var(--gothic-gold);
            border: 1px solid var(--gothic-gold);
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: var(--gothic-gold);
            color: black;
        }

        /* --- Main UI --- */
        #archive-ui { display: none; width: 100%; height: 100%; }

        .menu-bar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px 25px;
            border: 1px solid var(--gothic-gold);
            z-index: 100;
        }

        .btn { color: var(--gothic-gold); cursor: pointer; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <h1 style="letter-spacing: 5px; margin-bottom: 30px;">THE GOTHIC ARCHIVE</h1>
            <button class="btn-google" onclick="loginWithGoogle()">Summon Archive</button>
            <p id="auth-error" style="color: var(--gothic-red); margin-top: 20px; font-size: 14px;"></p>
        </div>
    </div>

    <div id="archive-ui">
        <div id="canvas" style="width:5000px; height:5000px; position:absolute;"></div>

        <div class="menu-bar">
            <span class="btn" onclick="saveData()">Save</span>
            <span class="btn" onclick="loadData()">Load</span>
            <span class="btn" onclick="logout()">Seal</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB95B-M07ZWK0SW5JFCt3uawB3erjjhMCM",
            authDomain: "aidenvidz.firebaseapp.com",
            databaseURL: "https://aidenvidz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenvidz",
            storageBucket: "aidenvidz.appspot.com",
            messagingSenderId: "367375628588",
            appId: "1:367375628588:web:757041a99f116520300650"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        const MASTER_UID = "ca58db7b-32a7-4ebe-b918-754161bd1fe0";

        function loginWithGoogle() {
            auth.signInWithPopup(provider).catch(error => {
                document.getElementById('auth-error').innerText = "Ritual Failed: " + error.message;
            });
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged((user) => {
            if (user && user.uid === MASTER_UID) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('archive-ui').style.display = 'block';
                console.log("Welcome, Master.");
                // Insert your loadData() call here
            } else if (user) {
                document.getElementById('auth-error').innerText = "Access Denied: You are not the Master.";
                auth.signOut();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('archive-ui').style.display = 'none';
            }
        });

        // --- Save/Load Stubs (Connect your existing archive logic here) ---
        function saveData() {
            const user = auth.currentUser;
            if (user) {
                db.ref('users/' + user.uid + '/archive_state').set({
                    savedAt: Date.now()
                    // Add your grid objects/folder positions here
                }).then(() => alert("Archive progression sealed."));
            }
        }

        function loadData() {
            const user = auth.currentUser;
            if (user) {
                db.ref('users/' + user.uid + '/archive_state').once('value').then(snap => {
                    const data = snap.val();
                    if(data) console.log("State restored:", data);
                });
            }
        }
    </script>
</body>
</html>
