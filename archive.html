<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #8b0000;
            --grid-size: 20px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        #toolbar {
            background: var(--panel-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 2px solid var(--accent);
        }

        /* Tag Section */
        #tag-container {
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #111;
        }
        .tag {
            background: #333;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .tag:hover { background: var(--accent); }

        #archive-area {
            width: 100vw;
            height: calc(100vh - 120px);
            position: relative;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            overflow: auto;
        }

        /* Edit Mode Grid Guide */
        .edit-mode #archive-area { background-image: radial-gradient(#444 1px, transparent 1px); }

        .relic {
            position: absolute;
            width: 200px;
            background: var(--panel-color);
            border: 1px solid #444;
            cursor: grab;
            padding: 5px;
            transition: transform 0.1s;
        }

        .relic img {
            width: 100%;
            height: auto; /* Full image display */
            display: block;
            object-fit: contain;
        }

        .relic-menu {
            display: none;
            font-size: 12px;
            padding-top: 5px;
        }
        .edit-mode .relic-menu { display: block; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="toggleEditMode()">Edit Mode</button>
        <button>Load</button>
        <button>Save</button>
    </div>

    <div id="tag-container">
        <div class="tag">desi</div>
        <div class="tag">hairy</div>
        <div class="tag">solo</div>
        <div class="tag">sex</div>
        <div class="tag">indian</div>
        <div class="tag">arab</div>
        <div class="tag">white</div>
        <div class="tag">twink</div>
        <div class="tag">cute</div>
        <div class="tag">HD</div>
    </div>

    <div id="archive-area">
        </div>

    <script>
        function toggleEditMode() {
            document.body.classList.toggle('edit-mode');
        }

        // Snap-to-grid math
        const gridSize = 20;
        function snap(val) {
            return Math.round(val / gridSize) * gridSize;
        }

        // Basic Drag & Drop Logic
        let dragged = null;
        document.addEventListener('mousedown', (e) => {
            if(e.target.closest('.relic')) {
                dragged = e.target.closest('.relic');
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(dragged && document.body.classList.contains('edit-mode')) {
                dragged.style.left = snap(e.clientX - 100) + 'px';
                dragged.style.top = snap(e.clientY - 100) + 'px';
            }
        });

        document.addEventListener('mouseup', () => dragged = null);
    </script>
</body>
</html>
