<script>
        // ... (Keep existing state and helper functions like getAutoThumbnail, renderSideImages, saveStateToStorage) ...

        // NEW: Bulk Add Functionality
        function openBulkAddModal() {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim);">Enter links (Format: Title|URL per line):</p>
                <textarea class="modal-input" id="bulk-input" rows="5" style="width:100%; height:100px; resize:vertical;"></textarea>
            `;
            document.getElementById('modal-title-text').textContent = "Bulk Import Streams";
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            document.getElementById('modal-confirm').onclick = () => {
                const lines = document.getElementById('bulk-input').value.split('\n');
                lines.forEach(line => {
                    const [title, url] = line.split('|');
                    if (title && url) {
                        state.relics.push({
                            id: String(Date.now() + Math.random()),
                            title: title.trim(),
                            url: url.trim(),
                            img: ""
                        });
                    }
                });
                saveStateToStorage();
                renderArchive();
                modal.classList.remove('active');
            };
        }

        // Update the Add Video Link button logic in setupGlobalMenus:
        document.getElementById('btn-add-link').addEventListener('click', () => {
            // Updated to provide a choice between Single or Bulk
            if(confirm("Add in bulk? (Cancel for single)")) {
                openBulkAddModal();
            } else {
                // ... (existing single link logic)
            }
        });

        // Ensure executeMenuAction('change-image') is linked to the state
        // It already calls: deviceImagePicker.click();
        // The existing deviceImagePicker listener will handle the persistence.
    </script>
</body>
</html>
