<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg-color: #0d0d0d; --text-color: #d9d9d9; --accent-color: #800020; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding-top: 10px; }
        .relic { border: 1px solid #333; padding: 5px; cursor: pointer; background: #141414; }
        .relic video, .relic img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; }
        .relic div { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
    </style>
</head>
<body>

    <div id="gallery-grid">Loading Archive...</div>

    <script>
        async function initArchive() {
            try {
                // Fetch the JSON file from your server
                const response = await fetch('data.json');
                const data = await response.json();
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = '';

                data.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'relic';
                    
                    // Simple placeholder for video files
                    d.innerHTML = `
                        <div style="display:flex; align-items:center; justify-content:center; height:80px; background:#222; font-size:20px;">▶</div>
                        <div>${r.title}</div>
                    `;
                    
                    d.onclick = () => window.open(r.url, '_blank');
                    grid.appendChild(d);
                });
            } catch (err) {
                document.getElementById('gallery-grid').innerHTML = "Unable to load data. Make sure data.json is in the same folder.";
                console.error(err);
            }
        }

        initArchive();
    </script>
</body>
</html>
