<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gothic Archive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: #d4af37; font-family: serif; }
        #archive-container { position: relative; width: 100vw; height: 100vh; }
        
        /* Drag-to-Resize Player Styles */
        .player-wrapper { 
            position: absolute; width: 300px; height: 200px; background: #1a1a1a; 
            border: 1px solid #333; touch-action: none; cursor: move;
        }
        .drag-handle { 
            width: 20px; height: 20px; background: #d4af37; position: absolute; 
            bottom: 0; right: 0; cursor: se-resize; 
        }
        
        /* Edit Mode Grid */
        .edit-mode .item { outline: 1px dashed #d4af37; }
        .grid-guide { display: none; position: absolute; top:0; left:0; width:100%; height:100%; 
                      background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px);
                      background-size: 10px 10px; pointer-events: none; }
        .edit-mode .grid-guide { display: block; }
    </style>
</head>
<body>
    <div id="archive-container">
        <div class="grid-guide"></div>
        
        <!-- Player Object -->
        <div id="player" class="player-wrapper">
            <div id="media-content">Video/Media Content</div>
            <div id="resizer" class="drag-handle"></div>
        </div>
    </div>

    <script>
        // Drag-to-Resize Logic
        const player = document.getElementById('player');
        const resizer = document.getElementById('resizer');

        resizer.addEventListener('mousedown', initResize);
        function initResize(e) {
            window.addEventListener('mousemove', resize);
            window.addEventListener('mouseup', stopResize);
        }

        function resize(e) {
            player.style.width = (e.clientX - player.offsetLeft) + 'px';
            player.style.height = (e.clientY - player.offsetTop) + 'px';
        }

        function stopResize() {
            window.removeEventListener('mousemove', resize);
        }

        // Snap-to-Grid Logic (10px)
        function snap(val) { return Math.round(val / 10) * 10; }
        
        // Load/Save and additional functions maintained here...
    </script>
</body>
</html>
