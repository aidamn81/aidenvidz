<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 220px; }
        
        #player-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 200px; 
            background: #000; z-index: 1000; border-bottom: 8px solid var(--accent); touch-action: none;
        }
        #drag-handle { 
            width: 100%; height: 20px; background: var(--accent); 
            position: absolute; bottom: -20px; cursor: ns-resize; 
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        #media-player { width: 100%; height: 100%; background: #000; }
        
        #header-controls { padding: 10px; display: flex; gap: 10px; position: fixed; top: 220px; width: 100%; background: var(--bg); z-index: 999; flex-wrap: wrap; }
        
        /* Tag Bar */
        #tag-nav { padding: 5px 15px; display: flex; gap: 10px; flex-wrap: wrap; background: #1a1a1a; border-bottom: 1px solid var(--border); }
        .tag-btn { cursor: pointer; color: #888; font-size: 10px; text-transform: uppercase; }
        .tag-btn:hover { color: var(--accent); }

        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; position: relative; background: #141414; }
        .thumb { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: auto; object-fit: contain; } /* Full Image */
        
        .edit-ui { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; }
        body.edit-mode .edit-ui { display: flex; flex-wrap: wrap; gap: 5px; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <video id="media-player" controls playsinline></video>
        <div id="drag-handle">|| DRAG TO RESIZE ||</div>
    </div>
    
    <div id="header-controls">
        <button id="admin-btn" class="btn" onclick="checkAdmin()">Admin Login</button>
        <button id="edit-toggle" class="btn" style="display:none;" onclick="toggleEdit()">Toggle Edit Mode</button>
        <button id="save-btn" class="btn" style="display:none;" onclick="saveJson()">Save & Export Data</button>
        <button id="logout-btn" class="btn" style="display:none;" onclick="logout()">Logout</button>
    </div>

    <div id="tag-nav">
        <span>Tags:</span>
        <div class="tag-btn">desi</div><div class="tag-btn">hairy</div><div class="tag-btn">solo</div>
        <div class="tag-btn">sex</div><div class="tag-btn">indian</div><div class="tag-btn">arab</div>
        <div class="tag-btn">white</div><div class="tag-btn">twink</div><div class="tag-btn">cute</div>
        <div class="tag-btn">HD</div>
    </div>
    
    <div id="gallery-grid">Loading...</div>

    <script>
        let state = [];
        let isEditMode = false;
        
        // --- Core Mechanics Preserved ---
        const wrapper = document.getElementById('player-wrapper');
        const handle = document.getElementById('drag-handle');
        handle.addEventListener('touchmove', (e) => { e.preventDefault(); wrapper.style.height = e.touches[0].clientY + 'px'; }, {passive: false});

        async function init() {
            try {
                const res = await fetch('data.json');
                state = await res.json();
                render();
            } catch (e) { document.getElementById('gallery-grid').innerHTML = "Error loading data."; }
        }

        function toggleEdit() { isEditMode = !isEditMode; document.body.classList.toggle('edit-mode'); }
        
        function render() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'relic';
                d.onclick = () => { if(!isEditMode) handleViewer(r.url); };
                d.innerHTML = `
                    <div class="thumb">${r.img ? `<img src="${r.img}">` : '▶'}</div>
                    <div style="font-size:10px; margin-top:5px;">${r.title || 'Untitled'}</div>
                    <div style="font-size:9px; color:#666;">Tags: ${r.tags || 'none'}</div>
                    <div class="edit-ui">
                        <button onclick="event.stopPropagation(); edit(${i}, 'title')">Rename</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'img')">Cover</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'tags')">Tags</button>
                        <button onclick="event.stopPropagation(); del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function edit(i, key) {
            const val = prompt(`Change ${key}:`, state[i][key] || '');
            if (val !== null) { state[i][key] = val; render(); }
        }

        // --- Standard Admin & Player Functions ---
        function checkAdmin() { const pass = prompt("Enter Admin Password:"); if (pass === "1981") { document.getElementById('edit-toggle').style.display = 'block'; document.getElementById('save-btn').style.display = 'block'; document.getElementById('logout-btn').style.display = 'block'; document.getElementById('admin-btn').style.display = 'none'; } else { alert("Access Denied"); } }
        function saveJson() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2)); const dlAnchorElem = document.createElement('a'); dlAnchorElem.setAttribute("href", dataStr); dlAnchorElem.setAttribute("download", "data.json"); dlAnchorElem.click(); }
        function logout() { location.reload(); }
        function handleViewer(url) { if (confirm("Play in top player?")) { const player = document.getElementById('media-player'); player.src = url; player.load(); player.play(); } else { window.open(url, '_blank'); } }
        function del(i) { if (confirm("Delete this item?")) { state.splice(i, 1); render(); } }

        init();
    </script>
</body>
</html>
