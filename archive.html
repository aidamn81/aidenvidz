<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 200px; }
        
        #player-wrapper { position: fixed; top: 0; width: 100%; height: 180px; background: #000; z-index: 1000; resize: vertical; overflow: auto; min-height: 100px; max-height: 80vh; border-bottom: 2px solid var(--accent); }
        #media-player { width: 100%; height: 100%; border: none; }
        
        #controls { padding: 10px; display: flex; gap: 10px; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; position: relative; }
        .relic img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
        .edit-ui { display: none; margin-top: 5px; }
        body.edit-mode .edit-ui { display: block; }
    </style>
</head>
<body>

    <div id="player-wrapper"><iframe id="media-player" src=""></iframe></div>
    <div id="controls"><button class="btn" onclick="toggleEdit()">Toggle Edit Mode</button></div>
    <div id="gallery-grid">Loading...</div>

    <script>
        let state = [];
        let isEditMode = false;

        async function init() {
            const res = await fetch('data.json');
            state = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'relic';
                d.innerHTML = `
                    <img src="${r.img || ''}" onclick="handleTap('${r.url}')">
                    <div>${r.title}</div>
                    <div class="edit-ui">
                        <button onclick="edit(${i}, 'title')">Rename</button>
                        <button onclick="edit(${i}, 'img')">Cover</button>
                        <button onclick="edit(${i}, 'tags')">Tags</button>
                        <button onclick="del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function handleTap(url) {
            if (isEditMode) return;
            if (confirm("Play in top player? (Cancel to open in new tab)")) {
                document.getElementById('media-player').src = url;
            } else {
                window.open(url, '_blank');
            }
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode');
        }

        function edit(i, key) {
            const val = prompt(`Change ${key}:`, state[i][key] || '');
            if (val !== null) { state[i][key] = val; render(); }
        }

        function del(i) {
            if (confirm("Confirm delete?")) { state.splice(i, 1); render(); }
        }

        init();
    </script>
</body>
</html>
