<div id="viewport">
        <div id="grid-canvas"></div>
        <div id="master-tag-dock"></div> 
        <div id="relics-container"></div>
    </div>

<script>
        // Ensure this property exists in your state object
        const state = {
            isEditMode: false,
            activeTargetId: null,
            lastTapTime: 0,
            searchQuery: "",
            selectedFilterTag: "ALL", // <--- REQUIRED
            relics: [],
            sideImages: { left: "", right: "" }
        };

        // ... (Keep your other existing functions) ...

        // INTEGRATED RENDER FUNCTIONS
        function renderTagDock() {
            const dock = document.getElementById('master-tag-dock');
            dock.innerHTML = '';
            
            const tagSet = new Set();
            state.relics.forEach(relic => {
                if (relic.tags) {
                    relic.tags.forEach(t => {
                        if (t.trim() !== "") tagSet.add(t.trim().toUpperCase());
                    });
                }
            });

            const uniqueTags = Array.from(tagSet).sort();
            uniqueTags.unshift("ALL");

            uniqueTags.forEach(tag => {
                const tagBtn = document.createElement('div');
                tagBtn.className = 'dock-tag-item';
                tagBtn.textContent = tag;

                if (tag === state.selectedFilterTag) {
                    tagBtn.classList.add('active-filter');
                }

                tagBtn.addEventListener('click', () => {
                    state.selectedFilterTag = tag;
                    renderArchive();
                });

                dock.appendChild(tagBtn);
            });
        }

        function renderArchive() {
            renderTagDock(); // Refresh tags
            relicsContainer.innerHTML = '';
            
            const query = state.searchQuery.trim().toLowerCase();
            
            state.relics.forEach(relic => {
                const matchesTitle = relic.title.toLowerCase().includes(query);
                const matchesSearchTags = relic.tags && relic.tags.some(t => t.toLowerCase().includes(query));
                const matchesSearch = query === "" || matchesTitle || matchesSearchTags;

                let matchesDockTag = false;
                if (state.selectedFilterTag === "ALL") {
                    matchesDockTag = true;
                } else if (relic.tags && relic.tags.some(t => t.toUpperCase() === state.selectedFilterTag)) {
                    matchesDockTag = true;
                }

                if (matchesSearch && matchesDockTag) {
                    relicsContainer.appendChild(createRelicElement(relic));
                }
            });
        }
        
        // ... (Ensure the rest of your existing script remains) ...
    </script>
