<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive (Gallery Edition)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-line: rgba(128, 0, 32, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: 'Courier New', Courier, monospace; color: var(--text-color); }

        #fixed-top-wrapper { position: fixed; top: 0; left: 0; width: 100%; background: #0d0d0d; z-index: 1500; padding-top: env(safe-area-inset-top, 0px); border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; }
        #control-bar { background: rgba(20, 20, 20, 0.9); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 6px; display: flex; gap: 12px; align-items: center; width: 95vw; max-width: 900px; margin: 10px 0; overflow-x: auto; white-space: nowrap; }
        
        #master-tag-dock { width: 95vw; max-width: 900px; margin-bottom: 10px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .dock-tag-item { background: #141414; border: 1px solid var(--border-color); color: var(--text-dim); padding: 6px 12px; font-size: 10px; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .dock-tag-item.active-filter { background: var(--accent-color); color: #fff; border-color: var(--accent-glow); }

        #presentation-row { display: flex; align-items: stretch; gap: 12px; width: 95vw; max-width: 850px; height: 230px; margin-bottom: 12px; position: relative; }
        .side-asset-box { width: 65px; background: #0a0a0a; border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; flex-shrink: 0; }
        #player-container { flex: 1; background: #000; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        #media-screen { flex: 1; width: 100%; height: 100%; border: none; }
        #resize-handle { position: absolute; bottom: -6px; right: -6px; width: 28px; height: 28px; background: #1a1a1a; border: 1px solid var(--border-color); border-radius: 6px; cursor: se-resize; z-index: 1600; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        #viewport { position: absolute; top: 380px; left: 0; width: 100%; height: calc(100% - 380px); overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
        #relics-container { width: 100%; max-width: 960px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; align-content: start; }
        
        .relic { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; cursor: pointer; aspect-ratio: 16/9; display: flex; flex-direction: column; gap: 8px; }
        .relic-img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .relic-title { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            <input type="text" id="search-input" placeholder="SEARCH...">
            <button class="btn" id="btn-edit-mode">Edit</button>
            <button class="btn" id="btn-save">Save</button>
        </div>
        <div id="master-tag-dock"></div>
        <div id="presentation-row">
            <div class="side-asset-box" id="side-left-box"></div>
            <div id="player-container">
                <iframe id="media-screen" src=""></iframe>
            </div>
            <div class="side-asset-box" id="side-right-box"></div>
            <div id="resize-handle">⇲</div>
        </div>
    </div>

    <div id="viewport">
        <div id="relics-container"></div>
    </div>

    <script>
        const state = {
            relics: JSON.parse(localStorage.getItem('gothic_archive_formation_save')) || [],
            selectedFilterTag: "ALL",
            searchQuery: ""
        };

        function renderTagDock() {
            const dock = document.getElementById('master-tag-dock');
            dock.innerHTML = '';
            const tagSet = new Set(['ALL']);
            state.relics.forEach(r => r.tags?.forEach(t => tagSet.add(t.toUpperCase())));
            
            Array.from(tagSet).sort().forEach(tag => {
                const btn = document.createElement('div');
                btn.className = 'dock-tag-item' + (state.selectedFilterTag === tag ? ' active-filter' : '');
                btn.textContent = tag;
                btn.onclick = () => { state.selectedFilterTag = tag; renderArchive(); };
                dock.appendChild(btn);
            });
        }

        function renderArchive() {
            renderTagDock();
            const container = document.getElementById('relics-container');
            container.innerHTML = '';
            
            state.relics.forEach(relic => {
                const matches = state.selectedFilterTag === "ALL" || relic.tags?.map(t => t.toUpperCase()).includes(state.selectedFilterTag);
                if (matches) {
                    const div = document.createElement('div');
                    div.className = 'relic';
                    div.innerHTML = `
                        <div class="relic-title">${relic.title}</div>
                        <div style="flex:1; overflow:hidden">
                            <img class="relic-img" src="${relic.img || getAutoThumbnail(relic.url)}" onerror="this.style.display='none'">
                        </div>
                    `;
                    div.onclick = () => { document.getElementById('media-screen').src = relic.url; };
                    container.appendChild(div);
                }
            });
        }

        function getAutoThumbnail(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/);
            return match ? `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg` : '';
        }

        renderArchive();
    </script>
</body>
</html>
