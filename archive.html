<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gothic Archive</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        /* Preserve all existing styling */
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; }
        #viewer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
        }
        .video-container { 
            position: relative; width: 100%; height: 80vh; background: black; 
            display: flex; justify-content: center; align-items: center; 
        }
        .close { 
            position: absolute; top: 20px; right: 20px; font-size: 30px; 
            cursor: pointer; color: white; 
        }
    </style>
</head>
<body>

<div id="viewer"></div>

<script>
    // Updated handleViewer function to support both direct links and embeds
    function handleViewer(url) {
        const viewer = document.getElementById('viewer');
        viewer.style.display = 'block';
        
        // Detects if the link is an embed (common video host iframe/embed patterns)
        // or a direct file (ends in .mp4, .mov, .webm)
        if (url.includes('iframe') || url.includes('embed') || url.includes('player')) {
            viewer.innerHTML = `
                <div class="close" onclick="this.parentElement.style.display='none'">×</div>
                <div class="video-container">
                    <iframe src="${url}" frameborder="0" allowfullscreen style="width:100%; height:90%;"></iframe>
                </div>
            `;
        } else {
            // Standard Direct MP4/MOV Player
            viewer.innerHTML = `
                <div class="close" onclick="this.parentElement.style.display='none'">×</div>
                <div class="video-container">
                    <video controls autoplay muted playsinline style="width: 100%; max-height: 100%;">
                        <source src="${url}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            `;
        }
    }
</script>

</body>
</html>
