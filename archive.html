<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive (Adaptive iPhone & iPad Matrix)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-line: rgba(128, 0, 32, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        /* Fixed Upper Control Area Configuration Layout */
        #fixed-top-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0d0d0d;
            z-index: 1500;
            padding-top: env(safe-area-inset-top, 0px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #control-bar {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            display: flex;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 95vw;
            max-width: 900px;
            margin-top: 10px;
            margin-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        /* Clean scrollbars for the horizontal control rail tracking */
        #control-bar::-webkit-scrollbar {
            display: none;
        }

        #search-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 16px; /* Lock zoom interactions scale on iOS triggers */
            border-radius: 4px;
            width: 160px;
            text-transform: uppercase;
            -webkit-user-select: text;
            user-select: text;
        }

        #search-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* Universal Presentation Layout Node Wrapper Container */
        #presentation-row {
            display: flex;
            align-items: stretch;
            gap: 12px;
            width: 95vw;
            max-width: 850px;
            height: 230px; 
            margin-bottom: 12px;
            position: relative;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Adaptive scaling behaviors for compact phone landscape view modes */
        @media (max-height: 450px) and (orientation: landscape) {
            #presentation-row { height: 140px; }
            .side-asset-box { display: none !important; }
        }

        /* Mobile PiP Terminal Layout Alignment Modification Rules */
        #presentation-row.pip-active {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            right: calc(20px + env(safe-area-inset-right, 0px));
            width: 42vw !important;
            max-width: 280px !important;
            min-width: 160px !important;
            height: 24vw !important;
            max-height: 158px !important;
            min-height: 90px !important;
            z-index: 2500;
            box-shadow: 0 15px 40px rgba(0,0,0,0.95);
            margin: 0;
            pointer-events: auto;
        }

        #presentation-row.pip-active .side-asset-box,
        #presentation-row.pip-active #resize-handle {
            display: none !important; 
        }

        #resize-handle {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 28px; /* Expanded interaction node for reliable touch targets */
            height: 28px;
            cursor: se-resize;
            z-index: 1600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-color);
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .side-asset-box {
            width: 65px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        body.edit-mode .side-asset-box {
            cursor: pointer;
            border-color: rgba(128, 0, 32, 0.6);
        }

        .side-asset-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .side-asset-placeholder {
            font-size: 9px;
            color: #333;
            text-transform: uppercase;
            text-align: center;
            padding: 2px;
        }

        body.edit-mode .side-asset-placeholder { color: var(--text-dim); }

        #player-container {
            flex: 1;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body.edit-mode #player-container { border-color: var(--accent-color); }

        #media-screen {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        #player-placeholder {
            position: absolute;
            top: 28px;
            left: 0;
            width: 100%;
            height: calc(100% - 28px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        #player-titlebar {
            background: #111;
            border-bottom: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 10px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .btn {
            background: #1a1a1a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 16px; /* Upgraded mobile size metrics */
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .btn:active, .btn.active {
            background: var(--accent-color);
            border-color: var(--accent-glow);
            color: #fff;
        }

        /* Resilient Flow Layout Scroll Shell Container Frame */
        #viewport {
            position: absolute;
            top: 350px; 
            left: 0;
            width: 100%;
            height: calc(100% - 350px);
            overflow-y: auto;
            background-color: #0d0d0d;
            padding: 20px;
            padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
            display: flex;
            justify-content: center;
            -webkit-overflow-scrolling: touch; /* Native inertial track acceleration controls */
        }

        #grid-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: none;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        body.edit-mode #grid-canvas { display: block; }

        /* Highly fluid multi-column alignment grid schema mapping for multi-screen sizes */
        #relics-container {
            position: relative;
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            @media (min-width: 768px) { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            gap: 15px;
            align-content: start;
            z-index: 2;
        }

        .edit-only { display: none !important; }
        body.edit-mode .edit-only { display: inline-block !important; }

        .relic {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1;
            width: 100%;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }

        body.edit-mode .relic { border-color: rgba(128, 0, 32, 0.4); }

        .relic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            pointer-events: none;
        }

        .relic-title {
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .relic-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            border-radius: 4px;
            pointer-events: none;
        }

        .relic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .relic-fallback-text {
            font-size: 10px;
            text-align: center;
            padding: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .relic-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 18px;
            overflow: hidden;
            pointer-events: none;
        }

        .mini-tag {
            background: #1f1f1f;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .resize-finger-anchor {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px; /* Enhanced touch anchor zone for heavy thumb pads */
            height: 32px;
            background: rgba(128, 0, 32, 0.7);
            border-top-left-radius: 8px;
            cursor: se-resize;
            display: none;
            z-index: 10;
        }
        /* Visual diagonal signifier for resizability */
        .resize-finger-anchor::after {
            content: '⇲';
            position: absolute;
            bottom: 4px; right: 4px;
            font-size: 10px; color: #fff;
        }

        body.edit-mode .resize-finger-anchor { display: block; }

        /* Universal Native Overlay Context Menu Configuration */
        #context-menu {
            position: fixed;
            background: #141414;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            border-radius: 8px;
            width: 220px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .menu-item {
            padding: 14px 16px; /* Enhanced selection touch spacing height metrics */
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: var(--text-color);
            border-bottom: 1px solid rgba(38, 38, 38, 0.6);
        }

        .menu-item:active { background: var(--accent-color); color: #fff; }

        /* Modals Structure Layout Shell */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.9);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 15px;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: #141414;
            border: 1px solid var(--border-color);
            padding: 22px;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-title {
            font-size: 13px;
            text-transform: uppercase;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .modal-input {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            font-family: inherit;
            font-size: 16px; /* Strictly enforces exclusion of auto-zooming scaling hooks on iOS */
            border-radius: 4px;
            width: 100%;
            -webkit-user-select: text;
            user-select: text;
        }

        .modal-textarea {
            background: #0d0d0d;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            width: 100%;
            height: 110px;
            resize: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>
<body>

    <input type="file" id="device-image-picker" accept="image/*" style="display: none;">
    <input type="file" id="side-left-picker" accept="image/*" style="display: none;">
    <input type="file" id="side-right-picker" accept="image/*" style="display: none;">

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            <input type="text" id="search-input" placeholder="SEARCH ARCHIVE...">
            <button class="btn" id="btn-edit-mode">Edit Mode</button>
            <button class="btn edit-only" id="btn-add-link">Add Video Link</button>
            <button class="btn edit-only" id="btn-add-bulk">Add Bulk Links</button>
            <button class="btn edit-only" id="btn-save">Save Archive</button>
            <button class="btn edit-only" id="btn-load">Load Archive</button>
        </div>

        <div id="presentation-row">
            <div class="side-asset-box" id="side-left-box">
                <div class="side-asset-placeholder">L Slot</div>
            </div>

            <div id="player-container">
                <div id="player-titlebar">System Player: Idle</div>
                <div style="position: relative; flex: 1; width: 100%; height: 100%;">
                    <div id="player-placeholder">
                        <span>☠ No Stream Tracks Loaded ☠</span>
                    </div>
                    <iframe id="media-screen" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>

            <div class="side-asset-box" id="side-right-box">
                <div class="side-asset-placeholder">R Slot</div>
            </div>

            <div id="resize-handle">⇲</div>
        </div>
    </div>

    <div id="viewport">
        <div id="grid-canvas"></div>
        <div id="relics-container"></div>
    </div>

    <div id="context-menu">
        <div class="menu-item" data-action="play-media">Play Video</div>
        <div class="menu-item edit-only" data-action="rename">Rename</div>
        <div class="menu-item edit-only" data-action="edit-tags">Edit Tags</div>
        <div class="menu-item edit-only" data-action="change-image">Change Thumbnail</div>
        <div class="menu-item edit-only" data-action="snap-original">Snap to Original Shape</div>
        <div class="menu-item edit-only" data-action="delete">Delete</div>
    </div>

    <div class="modal-overlay" id="archive-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-title-text">Prompt</div>
            <div id="modal-body-content"></div>
            <div class="modal-actions">
                <button class="btn" id="modal-cancel">Cancel</button>
                <button class="btn" id="modal-confirm" style="background: var(--accent-color);">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const clearance = sessionStorage.getItem('archive_clearance');
        if (clearance !== 'admin' && clearance !== 'guest') {
            window.location.href = "index.html";
        }

        const state = {
            isEditMode: false,
            activeTargetId: null,
            lastTapTime: 0,
            searchQuery: "",
            relics: [],
            sideImages: { left: "", right: "" }
        };

        const defaultSetup = [
            { id: "1", title: "The Crow", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg", tags: ["gothic", "classic"] },
            { id: "2", title: "Gothic Tech Sound", url: "https://www.youtube.com/embed/dQw4w9WgXcQ", img: "", tags: ["industrial"] }
        ];

        const fixedTopWrapper = document.getElementById('fixed-top-wrapper');
        const presentationRow = document.getElementById('presentation-row');
        const resizeHandle = document.getElementById('resize-handle');
        const viewport = document.getElementById('viewport');
        const relicsContainer = document.getElementById('relics-container');
        const contextMenu = document.getElementById('context-menu');
        const mediaScreen = document.getElementById('media-screen');
        const playerPlaceholder = document.getElementById('player-placeholder');
        const playerTitlebar = document.getElementById('player-titlebar');
        const searchInput = document.getElementById('search-input');
        const btnEditMode = document.getElementById('btn-edit-mode');
        
        const deviceImagePicker = document.getElementById('device-image-picker');
        const sideLeftBox = document.getElementById('side-left-box');
        const sideRightBox = document.getElementById('side-right-box');
        const sideLeftPicker = document.getElementById('side-left-picker');
        const sideRightPicker = document.getElementById('side-right-picker');

        window.addEventListener('DOMContentLoaded', () => {
            if (clearance === 'guest') {
                if (btnEditMode) btnEditMode.remove();
            }

            const stored = localStorage.getItem('gothic_archive_formation_save');
            if (stored) {
                state.relics = JSON.parse(stored);
            } else {
                state.relics = JSON.parse(JSON.stringify(defaultSetup));
            }

            const storedSides = localStorage.getItem('gothic_archive_side_images');
            if (storedSides) {
                state.sideImages = JSON.parse(storedSides);
            }

            const savedWidth = localStorage.getItem('gothic_archive_player_width');
            const savedHeight = localStorage.getItem('gothic_archive_player_height');
            if (savedWidth && savedHeight) {
                presentationRow.style.width = savedWidth + 'px';
                presentationRow.style.height = savedHeight + 'px';
            } else {
                const defaultWidth = Math.min(window.innerWidth * 0.95, 800);
                presentationRow.style.width = defaultWidth + 'px';
                presentationRow.style.height = Math.round((defaultWidth - 150) * (9 / 16)) + 'px';
            }
            
            // Adjust to handle orientation state variants gracefully
            window.addEventListener('resize', () => {
                setTimeout(adjustViewportSpacing, 150);
            });
            
            adjustViewportSpacing();
            renderSideImages();
            renderArchive();
            setupInteractions();
            setupGlobalMenus();
            setupResizeEngine();
            setupPiPMonitor();
        });

        function adjustViewportSpacing() {
            const topHeight = fixedTopWrapper.offsetHeight;
            viewport.style.top = topHeight + 'px';
            viewport.style.height = `calc(100% - ${topHeight}px)`;
        }

        function setupPiPMonitor() {
            viewport.addEventListener('scroll', () => {
                if (viewport.scrollTop > 80) {
                    if (!presentationRow.classList.contains('pip-active')) {
                        presentationRow.classList.add('pip-active');
                    }
                } else {
                    if (presentationRow.classList.contains('pip-active')) {
                        presentationRow.classList.remove('pip-active');
                        const savedWidth = localStorage.getItem('gothic_archive_player_width');
                        const savedHeight = localStorage.getItem('gothic_archive_player_height');
                        if (savedWidth && savedHeight) {
                            presentationRow.style.width = savedWidth + 'px';
                            presentationRow.style.height = savedHeight + 'px';
                        }
                    }
                }
            }, { passive: true });
        }

        function getAutoThumbnail(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://img.youtube.com/vi/${match[2]}/hqdefault.jpg`;
            }
            return '';
        }

        function saveStateToStorage() {
            if (clearance !== 'admin') return;
            localStorage.setItem('gothic_archive_formation_save', JSON.stringify(state.relics));
        }

        function saveSidesToStorage() {
            if (clearance !== 'admin') return;
            localStorage.setItem('gothic_archive_side_images', JSON.stringify(state.sideImages));
        }

        function renderSideImages() {
            if (state.sideImages.left) {
                sideLeftBox.innerHTML = `<img src="${state.sideImages.left}">`;
            } else {
                sideLeftBox.innerHTML = `<div class="side-asset-placeholder">L Slot</div>`;
            }

            if (state.sideImages.right) {
                sideRightBox.innerHTML = `<img src="${state.sideImages.right}">`;
            } else {
                sideRightBox.innerHTML = `<div class="side-asset-placeholder">R Slot</div>`;
            }
        }

        function renderArchive() {
            relicsContainer.innerHTML = '';
            const query = state.searchQuery.trim().toLowerCase();
            
            state.relics.forEach(relic => {
                const matchesTitle = relic.title.toLowerCase().includes(query);
                const matchesTags = relic.tags && relic.tags.some(t => t.toLowerCase().includes(query));
                
                if (query === "" || matchesTitle || matchesTags) {
                    relicsContainer.appendChild(createRelicElement(relic));
                }
            });
        }

        function createRelicElement(relic) {
            const node = document.createElement('div');
            node.className = 'relic';
            node.setAttribute('data-id', relic.id);

            if (relic.w) {
                node.style.width = relic.w + 'px';
                node.style.aspectRatio = 'auto';
            }
            if (relic.h) {
                node.style.height = relic.h + 'px';
                node.style.aspectRatio = 'auto';
            }

            const header = document.createElement('div');
            header.className = 'relic-header';
            
            const title = document.createElement('div');
            title.className = 'relic-title';
            title.textContent = relic.title;
            
            header.appendChild(title);
            node.appendChild(header);

            const body = document.createElement('div');
            body.className = 'relic-body';

            const displayImg = relic.img || getAutoThumbnail(relic.url);

            if (displayImg) {
                const img = document.createElement('img');
                img.className = 'relic-img';
                img.src = displayImg;
                body.appendChild(img);
            } else {
                const fallback = document.createElement('div');
                fallback.className = 'relic-fallback-text';
                fallback.textContent = relic.title;
                body.appendChild(fallback);
            }

            node.appendChild(body);

            if (relic.tags && relic.tags.length > 0) {
                const tagsRow = document.createElement('div');
                tagsRow.className = 'relic-tags-row';
                relic.tags.forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'mini-tag';
                    tagSpan.textContent = tag;
                    tagsRow.appendChild(tagSpan);
                });
                node.appendChild(tagsRow);
            }

            const resizeAnchor = document.createElement('div');
            resizeAnchor.className = 'resize-finger-anchor';
            node.appendChild(resizeAnchor);

            return node;
        }

        function setupResizeEngine() {
            let startX, startY, startW, startH;

            const onPointerMove = (e) => {
                if (presentationRow.classList.contains('pip-active')) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let newW = startW + (clientX - startX);
                let newH = startH + (clientY - startY);

                if (newW < 280) newW = 280;
                if (newW > window.innerWidth * 0.96) newW = window.innerWidth * 0.96;
                if (newH < 110) newH = 110;
                if (newH > window.innerHeight * 0.55) newH = window.innerHeight * 0.55;

                presentationRow.style.width = newW + 'px';
                presentationRow.style.height = newH + 'px';
                
                adjustViewportSpacing();
            };

            const onPointerUp = () => {
                document.removeEventListener('mousemove', onPointerMove);
                document.removeEventListener('mouseup', onPointerUp);
                document.removeEventListener('touchmove', onPointerMove);
                document.removeEventListener('touchend', onPointerUp);

                if (!presentationRow.classList.contains('pip-active')) {
                    localStorage.setItem('gothic_archive_player_width', presentationRow.offsetWidth);
                    localStorage.setItem('gothic_archive_player_height', presentationRow.offsetHeight);
                }
            };

            const onPointerDown = (e) => {
                if (presentationRow.classList.contains('pip-active')) return;
                // Avoid breaking native scroll flows on touches
                if (e.cancelable) e.preventDefault();
                e.stopPropagation();
                
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                startW = presentationRow.offsetWidth;
                startH = presentationRow.offsetHeight;

                document.addEventListener('mousemove', onPointerMove);
                document.addEventListener('mouseup', onPointerUp);
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('touchend', onPointerUp);
            };

            resizeHandle.addEventListener('mousedown', onPointerDown);
            resizeHandle.addEventListener('touchstart', onPointerDown, { passive: false });
        }

        function setupInteractions() {
            let dragRelic = null;
            let resizeRelic = null;
            let dragStartX, dragStartY, initialW, initialH;

            searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                renderArchive();
            });

            relicsContainer.addEventListener('mousedown', handlePointerDown);
            relicsContainer.addEventListener('touchstart', handlePointerDown, { passive: false });

            function handlePointerDown(e) {
                const target = e.target;
                const relicEl = target.closest('.relic');
                if (!relicEl) return;

                state.activeTargetId = relicEl.getAttribute('data-id');
                const relic = state.relics.find(r => r.id === state.activeTargetId);
                if (!relic) return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (target.classList.contains('resize-finger-anchor') && state.isEditMode && clearance === 'admin') {
                    if (e.cancelable) e.preventDefault();
                    e.stopPropagation();
                    resizeRelic = relic;
                    dragStartX = clientX;
                    dragStartY = clientY;
                    initialW = relic.w || relicEl.offsetWidth;
                    initialH = relic.h || relicEl.offsetHeight;

                    document.addEventListener('mousemove', handlePointerMove);
                    document.addEventListener('mouseup', handlePointerUp);
                    document.addEventListener('touchmove', handlePointerMove, { passive: false });
                    document.addEventListener('touchend', handlePointerUp);
                    return;
                }

                const currentTime = new Date().getTime();
                const tapLength = currentTime - state.lastTapTime;
                
                if (tapLength < 350 && tapLength > 0) {
                    if (e.cancelable) e.preventDefault();
                    e.stopPropagation();
                    showContextMenu(clientX, clientY);
                    state.lastTapTime = 0;
                    return;
                }
                state.lastTapTime = currentTime;

                if (state.isEditMode && clearance === 'admin') {
                    if (e.cancelable) e.preventDefault();
                    dragRelic = relic;
                    dragStartX = clientX;
                    dragStartY = clientY;

                    document.addEventListener('mousemove', handlePointerMove);
                    document.addEventListener('mouseup', handlePointerUp);
                    document.addEventListener('touchmove', handlePointerMove, { passive: false });
                    document.addEventListener('touchend', handlePointerUp);
                } else {
                    executeMenuAction('play-media');
                }
            }

            function handlePointerMove(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (dragRelic && clearance === 'admin') {
                    let dx = clientX - dragStartX;
                    if (Math.abs(dx) > 50) {
                        const currentIndex = state.relics.findIndex(r => r.id === dragRelic.id);
                        let targetIndex = currentIndex + (dx > 0 ? 1 : -1);
                        if (targetIndex >= 0 && targetIndex < state.relics.length) {
                            state.relics.splice(currentIndex, 1);
                            state.relics.splice(targetIndex, 0, dragRelic);
                            dragStartX = clientX;
                            renderArchive();
                        }
                    }
                }

                if (resizeRelic && clearance === 'admin') {
                    let dx = clientX - dragStartX;
                    let dy = clientY - dragStartY;

                    let targetW = Math.round((initialW + dx) / 40) * 40;
                    let targetH = Math.round((initialH + dy) / 40) * 40;

                    if (targetW < 120) targetW = 120;
                    if (targetH < 120) targetH = 120;
                    if (targetW > 500) targetW = 500;
                    if (targetH > 500) targetH = 500;

                    resizeRelic.w = targetW;
                    resizeRelic.h = targetH;

                    const el = document.querySelector(`.relic[data-id="${resizeRelic.id}"]`);
                    if (el) {
                        el.style.width = targetW + 'px';
                        el.style.height = targetH + 'px';
                        el.style.aspectRatio = 'auto';
                    }
                }
            }

            function handlePointerUp() {
                if ((dragRelic || resizeRelic) && clearance === 'admin') {
                    saveStateToStorage();
                }
                dragRelic = null;
                resizeRelic = null;
                document.removeEventListener('mousemove', handlePointerMove);
                document.removeEventListener('mouseup', handlePointerUp);
                document.removeEventListener('touchmove', handlePointerMove);
                document.removeEventListener('touchend', handlePointerUp);
            }

            sideLeftBox.addEventListener('click', () => {
                if (state.isEditMode && clearance === 'admin') sideLeftPicker.click();
            });

            sideRightBox.addEventListener('click', () => {
                if (state.isEditMode && clearance === 'admin') sideRightPicker.click();
            });

            sideLeftPicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    state.sideImages.left = event.target.result;
                    saveSidesToStorage();
                    renderSideImages();
                };
                reader.readAsDataURL(file);
            });

            sideRightPicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    state.sideImages.right = event.target.result;
                    saveSidesToStorage();
                    renderSideImages();
                };
                reader.readAsDataURL(file);
            });

            deviceImagePicker.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const relic = state.relics.find(r => r.id === state.activeTargetId);
                    if (relic && clearance === 'admin') {
                        relic.img = event.target.result;
                        saveStateToStorage();
                        renderArchive();
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function showContextMenu(mx, my) {
            if (clearance === 'guest') {
                const contextItems = contextMenu.querySelectorAll('.edit-only');
                contextItems.forEach(item => item.style.display = 'none');
            }
            
            // Reposition viewport window checks if double taps are next to right screen bounds
            let adjustedX = mx;
            if (mx + 220 > window.innerWidth) {
                adjustedX = window.innerWidth - 230;
            }

            contextMenu.style.left = `${adjustedX}px`;
            contextMenu.style.top = `${my}px`;
            contextMenu.style.display = 'block';
        }

        function setupGlobalMenus() {
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu')) {
                    contextMenu.style.display = 'none';
                }
            });

            contextMenu.addEventListener('click', (e) => {
                const action = e.target.getAttribute('data-action');
                if (!action) return;
                contextMenu.style.display = 'none';
                executeMenuAction(action);
            });

            if (btnEditMode) {
                btnEditMode.addEventListener('click', (e) => {
                    if (clearance !== 'admin') return;
                    if (!state.isEditMode) {
                        state.isEditMode = true;
                        document.body.classList.add('edit-mode');
                        e.target.classList.add('active');
                        renderArchive();
                    } else {
                        state.isEditMode = false;
                        document.body.classList.remove('edit-mode');
                        e.target.classList.remove('active');
                        renderArchive();
                    }
                });
            }

            const addLinkBtn = document.getElementById('btn-add-link');
            if (addLinkBtn) {
                addLinkBtn.addEventListener('click', () => {
                    if (clearance !== 'admin') return;
                    openPromptModal("Upload Video Connection", "Enter descriptive track title configuration designation:", (title) => {
                        if(!title) return;
                        openPromptModal("Input Absolute Stream Path", "Provide valid embedded stream URL code destination index mapping:", (targetUrl) => {
                            if(!targetUrl) return;
                            openPromptModal("Assign Metadata Indexing Tags", "Provide unique tags separated by commas (Optional):", (rawTags) => {
                                const processedTags = rawTags ? rawTags.split(',').map(t => t.trim()).filter(t => t !== "") : [];
                                const newId = String(Date.now());
                                
                                state.relics.push({
                                    id: newId, 
                                    title: title, 
                                    url: targetUrl, 
                                    img: "", 
                                    tags: processedTags
                                });
                                saveStateToStorage();
                                renderArchive();
                            });
                        });
                    });
                });
            }

            const addBulkBtn = document.getElementById('btn-add-bulk');
            if (addBulkBtn) {
                addBulkBtn.addEventListener('click', () => {
                    if (clearance !== 'admin') return;
                    openBulkModal("Inject Mass Media Arrays", "Paste your multi-link addresses below (one absolute stream mapping per line layout):", (textBlock) => {
                        if (!textBlock) return;
                        const lines = textBlock.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                        let counter = 0;
                        
                        lines.forEach((line, idx) => {
                            const autoTitle = `Bulk Asset Track #${state.relics.length + 1}`;
                            const newId = String(Date.now() + idx);
                            
                            state.relics.push({
                                id: newId,
                                title: autoTitle,
                                url: line,
                                img: "",
                                tags: ["bulk"]
                            });
                            counter++;
                        });
                        
                        if(counter > 0) {
                            saveStateToStorage();
                            renderArchive();
                        }
                    });
                });
            }

            const saveBtn = document.getElementById('btn-save');
            if (saveBtn) {
                saveBtn.addEventListener('click', () => {
                    if (clearance !== 'admin') return;
                    saveStateToStorage();
                    saveSidesToStorage();
                });
            }

            const loadBtn = document.getElementById('btn-load');
            if (loadBtn) {
                loadBtn.addEventListener('click', () => {
                    const stored = localStorage.getItem('gothic_archive_formation_save');
                    if (stored) {
                        state.relics = JSON.parse(stored);
                        renderArchive();
                    }
                    const storedSides = localStorage.getItem('gothic_archive_side_images');
                    if (storedSides) {
                        state.sideImages = JSON.parse(storedSides);
                        renderSideImages();
                    }
                });
            }
        }

        function executeMenuAction(action) {
            const relic = state.relics.find(r => r.id === state.activeTargetId);
            if (!relic) return;

            switch(action) {
                case 'play-media':
                    playerPlaceholder.style.display = 'none';
                    mediaScreen.src = relic.url;
                    playerTitlebar.textContent = `System Player Now Streaming: ${relic.title}`;
                    break;
                case 'rename':
                    if (clearance !== 'admin') return;
                    openPromptModal("Rename Element Index", `Modify name configuration mappings for [${relic.title}]:`, (newName) => {
                        if (newName) {
                            relic.title = newName;
                            saveStateToStorage();
                            renderArchive();
                        }
                    }, relic.title);
                    break;
                case 'edit-tags':
                    if (clearance !== 'admin') return;
                    const existingTags = relic.tags ? relic.tags.join(', ') : "";
                    openPromptModal("Modify Segment Tag Arrays", `Assign metadata tags separated by commas for [${relic.title}]:`, (updatedTags) => {
                        if (updatedTags !== null) {
                            relic.tags = updatedTags.split(',').map(t => t.trim()).filter(t => t !== "");
                            saveStateToStorage();
                            renderArchive();
                        }
                    }, existingTags);
                    break;
                case 'change-image':
                    if (clearance !== 'admin') return;
                    deviceImagePicker.value = '';
                    deviceImagePicker.click();
                    break;
                case 'snap-original':
                    if (clearance !== 'admin') return;
                    delete relic.w;
                    delete relic.h;
                    saveStateToStorage();
                    renderArchive();
                    break;
                case 'delete':
                    if (clearance !== 'admin') return;
                    openConfirmModal("Purge Confirmation Verification", `Permanently dismantle tracking data for element path [${relic.title}]?`, () => {
                        state.relics = state.relics.filter(r => r.id !== relic.id);
                        saveStateToStorage();
                        renderArchive();
                    });
                    break;
            }
        }

        function openPromptModal(title, text, callback, defaultVal = "") {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <input type="text" class="modal-input" id="modal-custom-field" value="${defaultVal}">
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-custom-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openBulkModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `
                <p style="font-size:11px; margin-bottom:10px; color:var(--text-dim); line-height:1.4;">${text}</p>
                <textarea class="modal-textarea" id="modal-bulk-field" placeholder="https://...\nhttps://..."></textarea>
            `;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                const val = document.getElementById('modal-bulk-field').value;
                cleanup();
                callback(val);
            };

            cancelBtn.onclick = () => {
                cleanup();
                callback(null);
            };
        }

        function openConfirmModal(title, text, callback) {
            const container = document.getElementById('modal-body-content');
            container.innerHTML = `<p style="font-size:11px; line-height:1.4; color:var(--text-color);">${text}</p>`;
            document.getElementById('modal-title-text').textContent = title;
            
            const modal = document.getElementById('archive-modal');
            modal.classList.add('active');

            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            const cleanup = () => {
                modal.classList.remove('active');
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                cleanup();
                callback();
            };

            cancelBtn.onclick = () => {
                cleanup();
            };
        }
    </script>
</body>
</html>
