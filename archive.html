<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg-color: #0d0d0d; --panel-bg: #141414; --accent-color: #800020; --text-color: #d9d9d9; --border-color: #262626; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: 'Courier New', Courier, monospace; color: var(--text-color); position: fixed; }

        #fixed-top-wrapper { position: absolute; top: 0; left: 0; width: 100%; z-index: 1500; padding: 10px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; background: #0d0d0d; }
        #control-bar { display: flex; gap: 10px; width: 100%; max-width: 800px; overflow-x: auto; padding-bottom: 10px; }
        
        #viewport { position: absolute; top: 250px; left: 0; width: 100%; height: calc(100% - 250px); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 850px; margin: 0 auto; }
        
        .relic { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 8px; aspect-ratio: 1/1; cursor: pointer; display: flex; flex-direction: column; }
        .relic-img { width: 100%; height: 75%; object-fit: cover; background: #000; }
        .relic-title { font-size: 10px; margin-top: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border-color); padding: 8px 12px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; display:none; align-items:center; justify-content:center; }
        .modal-box { background:#141414; padding:20px; width:90%; max-width:400px; border:1px solid var(--border-color); }
        .input-field { width:100%; padding:8px; margin:5px 0; background:#000; color:#fff; border:1px solid var(--border-color); }
    </style>
</head>
<body>

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            <button class="btn" id="btn-add">Add Link</button>
            <button class="btn" id="btn-save">Export Data</button>
            <button class="btn" id="btn-load">Import Data</button>
        </div>
    </div>

    <div id="viewport">
        <div id="gallery-grid"></div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-box">
            <input type="text" id="in-title" class="input-field" placeholder="Optional Name">
            <input type="text" id="in-url" class="input-field" placeholder="URL">
            <input type="text" id="in-tags" class="input-field" placeholder="Tags (comma separated)">
            <input type="file" id="in-img" accept="image/*" class="input-field">
            <button class="btn" id="save-item" style="width:100%; margin-top:10px;">Save to Archive</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('gothic_data')) || [];

        function render() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'relic';
                div.innerHTML = `<img class="relic-img" src="${item.img || ''}"><div class="relic-title">${item.title || 'Untitled'}</div>`;
                div.onclick = () => { if(confirm('Delete this item?')) { state.splice(index, 1); save(); render(); } };
                grid.appendChild(div);
            });
        }

        function save() { localStorage.setItem('gothic_data', JSON.stringify(state)); }

        document.getElementById('btn-add').onclick = () => document.getElementById('add-modal').style.display = 'flex';

        document.getElementById('save-item').onclick = () => {
            const file = document.getElementById('in-img').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                state.push({
                    title: document.getElementById('in-title').value,
                    url: document.getElementById('in-url').value,
                    tags: document.getElementById('in-tags').value,
                    img: e.target.result
                });
                save(); render();
                document.getElementById('add-modal').style.display = 'none';
            };
            file ? reader.readAsDataURL(file) : (function(){ /* Handle no image */ })();
        };

        // Export/Import for Cross-Device Sync
        document.getElementById('btn-save').onclick = () => {
            const data = localStorage.getItem('gothic_data');
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'archive.json';
            a.click();
        };

        document.getElementById('btn-load').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state = JSON.parse(e.target.result);
                    save(); render();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };

        render();
    </script>
</body>
</html>
