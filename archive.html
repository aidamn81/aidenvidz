<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --text-color: #d9d9d9;
            --text-dim: #545454;
            --border-color: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { background: var(--bg-color); color: var(--text-color); font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        #fixed-top-wrapper { position: fixed; top: 0; left: 0; width: 100%; background: #0d0d0d; z-index: 1000; padding: 10px; border-bottom: 1px solid var(--border-color); }
        #master-tag-dock { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; white-space: nowrap; }
        #master-tag-dock::-webkit-scrollbar { display: none; }
        .dock-tag-item { background: #1a1a1a; border: 1px solid var(--border-color); color: var(--text-dim); padding: 6px 12px; font-size: 10px; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .dock-tag-item.active-filter { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        #viewport { position: absolute; top: 120px; left: 0; width: 100%; height: calc(100% - 120px); overflow-y: auto; padding: 20px; }
        #relics-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .relic { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; cursor: pointer; aspect-ratio: 16/9; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>

    <div id="fixed-top-wrapper">
        <div id="master-tag-dock"></div>
    </div>

    <div id="viewport">
        <div id="relics-container"></div>
    </div>

    <script>
        const state = {
            relics: JSON.parse(localStorage.getItem('gothic_archive_formation_save')) || [
                { id: "1", title: "Test Video", url: "#", img: "", tags: ["gothic"] }
            ],
            selectedFilterTag: "ALL"
        };

        const relicsContainer = document.getElementById('relics-container');
        const masterTagDock = document.getElementById('master-tag-dock');

        function renderTagDock() {
            masterTagDock.innerHTML = '';
            const tagSet = new Set(['ALL']);
            state.relics.forEach(r => r.tags?.forEach(t => tagSet.add(t.toUpperCase())));
            
            Array.from(tagSet).sort().forEach(tag => {
                const btn = document.createElement('div');
                btn.className = 'dock-tag-item' + (state.selectedFilterTag === tag ? ' active-filter' : '');
                btn.textContent = tag;
                btn.onclick = () => {
                    state.selectedFilterTag = tag;
                    renderArchive();
                };
                masterTagDock.appendChild(btn);
            });
        }

        function renderArchive() {
            renderTagDock();
            relicsContainer.innerHTML = '';
            
            state.relics.forEach(relic => {
                const matches = state.selectedFilterTag === "ALL" || 
                                relic.tags?.map(t => t.toUpperCase()).includes(state.selectedFilterTag);
                
                if (matches) {
                    const div = document.createElement('div');
                    div.className = 'relic';
                    div.innerHTML = `<div style="font-size:10px">${relic.title}</div>`;
                    relicsContainer.appendChild(div);
                }
            });
        }

        renderArchive();
    </script>
</body>
</html>
