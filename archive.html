<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive (Gallery Edition)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #800020;
            --accent-glow: #ff0033;
            --text-color: #d9d9d9;
            --text-dim: #737373;
            --border-color: #262626;
            --grid-line: rgba(128, 0, 32, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
        }

        /* Fixed Navigation Framework */
        #fixed-top-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0d0d0d;
            z-index: 1500;
            padding-top: env(safe-area-inset-top, 0px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #control-bar {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            display: flex;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 95vw;
            max-width: 900px;
            margin-top: 10px;
            margin-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        /* Tag Filtering Dock */
        #master-tag-dock {
            width: 95vw;
            max-width: 900px;
            margin-bottom: 15px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .dock-tag-item {
            background: #141414;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .dock-tag-item.active-filter {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-glow);
        }

        /* Player Controls */
        #presentation-row {
            display: flex;
            align-items: stretch;
            gap: 12px;
            width: 95vw;
            max-width: 850px;
            height: 230px; 
            margin-bottom: 12px;
            position: relative;
        }

        .side-asset-box {
            width: 65px;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        #player-container {
            flex: 1;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Main Content Viewport */
        #viewport {
            position: absolute;
            top: 380px; 
            left: 0;
            width: 100%;
            height: calc(100% - 380px);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #relics-container {
            width: 100%;
            max-width: 960px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .relic {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            aspect-ratio: 16 / 9;
            cursor: pointer;
        }

        .relic-img { width: 100%; height: 100%; object-fit: cover; }
        .relic-title { font-size: 11px; font-weight: bold; }

        /* Modal & Context Menus kept as per original structure */
    </style>
</head>
<body>

    <div id="fixed-top-wrapper">
        <div id="control-bar">
            </div>
        <div id="master-tag-dock"></div>
        <div id="presentation-row">
            </div>
    </div>

    <div id="viewport">
        <div id="relics-container"></div>
    </div>

    <script>
        // State and Rendering
        const state = {
            relics: [...],
            selectedFilterTag: "ALL"
        };

        function renderTagDock() {
            masterTagDock.innerHTML = '';
            const tagSet = new Set(['ALL']);
            state.relics.forEach(r => r.tags.forEach(t => tagSet.add(t.toUpperCase())));
            
            Array.from(tagSet).forEach(tag => {
                const btn = document.createElement('div');
                btn.className = 'dock-tag-item' + (state.selectedFilterTag === tag ? ' active-filter' : '');
                btn.textContent = tag;
                btn.onclick = () => {
                    state.selectedFilterTag = tag;
                    renderArchive();
                };
                masterTagDock.appendChild(btn);
            });
        }

        function renderArchive() {
            renderTagDock();
            relicsContainer.innerHTML = '';
            state.relics.forEach(relic => {
                const matches = state.selectedFilterTag === "ALL" || relic.tags.map(t => t.toUpperCase()).includes(state.selectedFilterTag);
                if (matches) {
                    relicsContainer.appendChild(createRelicElement(relic));
                }
            });
        }
        
        // ... (remaining logic)
    </script>
</body>
</html>
