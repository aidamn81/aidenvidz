<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 220px; }
        
        #player-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 200px; 
            background: #000; z-index: 1000; min-height: 100px; max-height: 80vh;
            border-bottom: 8px solid var(--accent); touch-action: none;
        }
        
        #drag-handle { 
            width: 100%; height: 20px; background: var(--accent); 
            position: absolute; bottom: -20px; cursor: ns-resize; 
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        
        #media-player { width: 100%; height: 100%; background: #000; }
        
        #header-controls { padding: 10px; display: flex; gap: 10px; position: fixed; top: 220px; width: 100%; background: var(--bg); z-index: 999; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; position: relative; background: #141414; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .relic div { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        
        .edit-ui { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; }
        body.edit-mode .edit-ui { display: flex; flex-wrap: wrap; gap: 5px; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <video id="media-player" controls playsinline></video>
        <div id="drag-handle">|| DRAG TO RESIZE ||</div>
    </div>
    
    <div id="header-controls">
        <button id="admin-btn" class="btn" onclick="checkAdmin()">Admin Login</button>
        <button id="edit-toggle" class="btn" style="display:none;" onclick="toggleEdit()">Toggle Edit Mode</button>
        <button id="logout-btn" class="btn" style="display:none;" onclick="logout()">Logout</button>
    </div>
    
    <div id="gallery-grid">Loading...</div>

    <script>
        let state = [];
        let isEditMode = false;
        const wrapper = document.getElementById('player-wrapper');
        const handle = document.getElementById('drag-handle');

        handle.addEventListener('touchstart', (e) => { e.preventDefault(); }, {passive: false});
        handle.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            wrapper.style.height = e.touches[0].clientY + 'px'; 
        }, {passive: false});

        async function init() {
            // Priority: LocalStorage -> data.json
            const savedData = localStorage.getItem('archiveData');
            if (savedData) {
                console.log("Loading from saved cache...");
                state = JSON.parse(savedData);
                render();
            } else {
                console.log("Fetching fresh data.json...");
                try {
                    const res = await fetch('data.json');
                    state = await res.json();
                    localStorage.setItem('archiveData', JSON.stringify(state)); // Save to cache immediately
                    render();
                } catch (e) { document.getElementById('gallery-grid').innerHTML = "Error loading data."; }
            }
        }

        function saveData() {
            localStorage.setItem('archiveData', JSON.stringify(state));
            console.log("Changes saved to device.");
            render();
        }

        function checkAdmin() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "1981") {
                document.getElementById('edit-toggle').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('admin-btn').style.display = 'none';
            } else {
                alert("Access Denied");
            }
        }

        function logout() { location.reload(); }
        function toggleEdit() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode');
        }

        function render() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'relic';
                d.onclick = () => { if(!isEditMode) handleViewer(r.url); };
                d.innerHTML = `
                    <div class="thumb">${r.img ? `<img src="${r.img}">` : '▶'}</div>
                    <div>${r.title}</div>
                    <div class="edit-ui">
                        <button onclick="event.stopPropagation(); edit(${i}, 'title')">Rename</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'img')">Cover</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'tags')">Tags</button>
                        <button onclick="event.stopPropagation(); del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function handleViewer(url) {
            if (confirm("Play in top player? (Cancel to open in new tab)")) {
                const player = document.getElementById('media-player');
                player.src = url;
                player.load();
                player.play();
            } else {
                window.open(url, '_blank');
            }
        }

        function edit(i, key) {
            const val = prompt(`Change ${key}:`, state[i][key] || '');
            if (val !== null) { state[i][key] = val; saveData(); }
        }

        function del(i) {
            if (confirm("Delete this item?")) { state.splice(i, 1); saveData(); }
        }

        init();
    </script>
</body>
</html>
