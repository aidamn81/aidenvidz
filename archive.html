<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 200px; }
        
        #player-wrapper { position: fixed; top: 0; width: 100%; height: 180px; background: #000; z-index: 1000; resize: vertical; overflow: auto; min-height: 100px; max-height: 80vh; border-bottom: 2px solid var(--accent); }
        #media-player { width: 100%; height: 100%; background: #000; }
        
        /* Edit trigger is invisible but clickable in the top-right corner */
        #edit-trigger { position: fixed; top: 0; right: 0; width: 30px; height: 30px; z-index: 2000; cursor: pointer; }
        #controls { padding: 10px; display: none; gap: 10px; position: fixed; top: 180px; width: 100%; background: var(--bg); z-index: 999; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; position: relative; background: #141414; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .relic div { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        
        .edit-ui { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; }
        body.edit-mode .edit-ui { display: flex; flex-wrap: wrap; gap: 5px; }
        body.edit-mode #controls { display: flex; }
    </style>
</head>
<body>

    <div id="edit-trigger" onclick="checkPassword()"></div>
    <div id="player-wrapper">
        <video id="media-player" controls playsinline></video>
    </div>
    
    <div id="controls"><button class="btn" onclick="toggleEdit()">Toggle Edit Mode</button></div>
    
    <div id="gallery-grid">Loading Archive...</div>

    <script>
        let state = [];
        let isEditMode = false;
        let isAuthorized = false;

        async function init() {
            try {
                const res = await fetch('data.json');
                state = await res.json();
                render();
            } catch (e) { document.getElementById('gallery-grid').innerHTML = "Error loading data."; }
        }

        function checkPassword() {
            if (isAuthorized) { toggleEdit(); return; }
            const pass = prompt("Enter Edit Password:");
            if (pass === "1981") {
                isAuthorized = true;
                toggleEdit();
            } else {
                alert("Access Denied");
            }
        }

        function render() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'relic';
                d.onclick = () => { if(!isEditMode) handleViewer(r.url); };
                
                d.innerHTML = `
                    <div class="thumb">${r.img ? `<img src="${r.img}">` : '▶'}</div>
                    <div>${r.title}</div>
                    <div class="edit-ui">
                        <button onclick="event.stopPropagation(); edit(${i}, 'title')">Rename</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'img')">Cover</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'tags')">Tags</button>
                        <button onclick="event.stopPropagation(); del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function handleViewer(url) {
            const choice = confirm("Play in top player? (Cancel to open in new tab)");
            if (choice) {
                const player = document.getElementById('media-player');
                player.src = url;
                player.load();
                player.play();
            } else {
                window.open(url, '_blank');
            }
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            document.body.classList.toggle('edit-mode');
        }

        function edit(i, key) {
            const val = prompt(`Change ${key}:`, state[i][key] || '');
            if (val !== null) { state[i][key] = val; render(); }
        }

        function del(i) {
            if (confirm("Delete this item?")) { state.splice(i, 1); render(); }
        }

        init();
    </script>
</body>
</html>
