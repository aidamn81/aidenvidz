<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 220px; }
        
        #player-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 200px; 
            background: #000; z-index: 1000; border-bottom: 8px solid var(--accent); touch-action: none;
        }
        #drag-handle { 
            width: 100%; height: 20px; background: var(--accent); 
            position: absolute; bottom: -20px; cursor: ns-resize; 
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff;
        }
        
        #media-container { width: 100%; height: 100%; background: #000; display: block; }
        #header-controls { padding: 10px; display: flex; gap: 10px; position: fixed; top: 200px; width: 100%; background: var(--bg); z-index: 999; flex-wrap: wrap; }
        
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; 
        }
        .modal-content { background: #1a1a1a; padding: 20px; border: 1px solid var(--accent); width: 80%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 5px; right: 10px; cursor: pointer; font-size: 20px; }
        
        .btn { background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .btn.active { border-color: var(--accent); color: var(--accent); background: #1a1a1a; }

        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; background: #141414; }
        
        .thumb { width: 100%; aspect-ratio: 1/1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .edit-ui { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; flex-wrap: wrap; }
        body.edit-mode .edit-ui { display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <div id="media-container"><video id="media-player" controls playsinline style="width:100%; height:100%;"></video></div>
        <div id="drag-handle">|| DRAG TO RESIZE ||</div>
    </div>
    
    <div id="header-controls">
        <button id="admin-btn" class="btn" onclick="checkAdmin()">Admin Login</button>
        <button id="add-toggle" class="btn" style="display:none;" onclick="toggleModal('add-modal')">Add Link</button>
        <button id="tag-toggle" class="btn" onclick="toggleModal('tag-modal')">Filter Tags</button>
        <button id="token-btn" class="btn" style="display:none;" onclick="setGitHubToken()">Set GH Token</button>
        <span id="save-status" style="font-size:10px; align-self:center; color:var(--accent);"></span>
    </div>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('add-modal')">&times;</span>
            <h3>Add Media</h3>
            <input type="text" id="new-title" placeholder="Title" style="width:90%; margin-bottom:5px;">
            <input type="text" id="new-url" placeholder="Direct or Embed URL" style="width:90%; margin-bottom:5px;">
            <input type="text" id="new-img" placeholder="Cover Image URL" style="width:90%; margin-bottom:5px;">
            <input type="text" id="new-tags" placeholder="Tags (comma separated)" style="width:90%; margin-bottom:10px;">
            <button class="btn" onclick="addItem()">Save Link Direct To GitHub</button>
        </div>
    </div>

    <div id="tag-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal('tag-modal')">&times;</span>
            <h3>Filter Tags</h3>
            <div id="tag-list"></div>
        </div>
    </div>
    
    <div id="gallery-grid">Loading from data.json...</div>

    <script>
        const REPO_OWNER = "aidamn81";
        const REPO_NAME = "aidenvidz";
        const FILE_PATH = "data.json";

        let state = [];
        let fileSha = "";
        let isEditMode = false;
        let selectedTags = new Set();
        let ghToken = localStorage.getItem('gh_token') || "";

        const wrapper = document.getElementById('player-wrapper');
        const handle = document.getElementById('drag-handle');
        const controls = document.getElementById('header-controls');
        const mediaContainer = document.getElementById('media-container');
        let isResizing = false;

        async function init() {
            try { 
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?t=` + Date.now());
                const fileData = await res.json();
                
                fileSha = fileData.sha;
                const rawJson = decodeURIComponent(escape(atob(fileData.content)));
                const rawData = JSON.parse(rawJson);
                
                state = rawData.map(item => ({
                    title: item.title || item.name || 'Untitled',
                    url: item.url || item.link || item.src || '',
                    img: item.img || item.thumbnail || item.customThumb || item.image || '',
                    tags: item.tags || item.playlist || ''
                }));

                render(); 
            } catch (e) { 
                console.error(e);
                document.getElementById('gallery-grid').innerHTML = "Failed to load data.json via GitHub API."; 
            }
        }

        handle.addEventListener('pointerdown', (e) => {
            isResizing = true;
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        window.addEventListener('pointermove', (e) => {
            if (!isResizing) return;
            let newHeight = Math.max(50, e.clientY);
            wrapper.style.height = newHeight + 'px';
            document.body.style.paddingTop = newHeight + 'px';
            controls.style.top = newHeight + 'px';
        });

        window.addEventListener('pointerup', () => { isResizing = false; document.body.style.userSelect = ''; });

        function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        
        function checkAdmin() { 
            if (prompt("Password:") === "1981") { 
                isEditMode = true; 
                document.body.classList.add('edit-mode'); 
                document.getElementById('add-toggle').style.display = 'block'; 
                document.getElementById('token-btn').style.display = 'block';
                document.getElementById('admin-btn').style.display = 'none'; 
                if (!ghToken) setGitHubToken();
            } 
        }

        function setGitHubToken() {
            const token = prompt("Enter GitHub Personal Access Token (for direct cloud saves):", ghToken);
            if (token !== null) {
                ghToken = token.trim();
                localStorage.setItem('gh_token', ghToken);
            }
        }

        // Pushes the updated JSON directly into GitHub repository without downloads
        async function commitToGitHub() {
            if (!ghToken) {
                alert("GitHub Token required to save directly! Click 'Set GH Token'.");
                setGitHubToken();
                if (!ghToken) return;
            }

            const status = document.getElementById('save-status');
            status.innerText = "SAVING TO GITHUB...";

            try {
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
                const payload = {
                    message: "Auto-update data.json via Gothic Archive interface",
                    content: updatedContent,
                    sha: fileSha
                };

                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${ghToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const resData = await res.json();
                if (res.ok) {
                    fileSha = resData.content.sha;
                    status.innerText = "SAVED TO CLOUD!";
                    setTimeout(() => { status.innerText = ""; }, 3000);
                } else {
                    alert("GitHub Save Failed: " + (resData.message || "Invalid Token"));
                    status.innerText = "SAVE FAILED";
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting to GitHub API.");
                status.innerText = "ERROR";
            }
        }

        function handleViewer(url) {
            if (!url) {
                alert("No URL available for this item.");
                return;
            }

            mediaContainer.innerHTML = '';
            const isVideoFile = url.match(/\.(mp4|webm|ogg|mov)$/i);
            
            if (isVideoFile) {
                const vid = document.createElement('video');
                vid.controls = true; vid.autoplay = true; vid.playsInline = true;
                vid.style.width = '100%'; vid.style.height = '100%';
                const source = document.createElement('source');
                source.src = url; source.type = 'video/mp4'; 
                vid.appendChild(source);
                mediaContainer.appendChild(vid);
            } else {
                const frame = document.createElement('iframe');
                frame.src = url; frame.style.width = '100%'; frame.style.height = '100%';
                frame.frameBorder = '0'; frame.allowFullscreen = true;
                frame.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                mediaContainer.appendChild(frame);
            }
        }

        async function addItem() {
            state.push({
                title: document.getElementById('new-title').value,
                url: document.getElementById('new-url').value,
                img: document.getElementById('new-img').value,
                tags: document.getElementById('new-tags').value
            });
            
            document.getElementById('new-title').value = '';
            document.getElementById('new-url').value = '';
            document.getElementById('new-img').value = '';
            document.getElementById('new-tags').value = '';
            
            render(); 
            toggleModal('add-modal');
            await commitToGitHub();
        }

        function render() {
            const allTags = [...new Set(state.flatMap(r => r.tags ? r.tags.split(',') : []))].map(t => t.trim()).filter(Boolean).sort();
            const tagList = document.getElementById('tag-list');
            tagList.innerHTML = '';
            allTags.forEach(t => {
                const btn = document.createElement('button');
                btn.className = `btn ${selectedTags.has(t) ? 'active' : ''}`;
                btn.innerText = t;
                btn.onclick = () => { selectedTags.has(t) ? selectedTags.delete(t) : selectedTags.add(t); render(); };
                tagList.appendChild(btn);
            });

            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            if (state.length === 0) {
                grid.innerHTML = 'No items found in data.json.';
                return;
            }

            state.forEach((r, i) => {
                if (selectedTags.size > 0 && ![...selectedTags].every(t => r.tags?.includes(t.trim()))) return;
                const d = document.createElement('div');
                d.className = 'relic';
                d.onclick = () => handleViewer(r.url);
                d.innerHTML = `
                    <div class="thumb">${r.img ? `<img src="${r.img}">` : '▶'}</div>
                    <div style="font-size:10px; margin-top:5px; word-break: break-word;">${r.title}</div>
                    <div class="edit-ui">
                        <button onclick="event.stopPropagation(); edit(${i}, 'title')">Rename</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'url')">Link</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'img')">Thumbnail</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'tags')">Tags</button>
                        <button onclick="event.stopPropagation(); del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        async function edit(i, key) { 
            const val = prompt(`Change ${key}:`, state[i][key]); 
            if(val !== null) { 
                state[i][key] = val; 
                render(); 
                await commitToGitHub();
            } 
        }

        async function del(i) { 
            if(confirm("Are you sure you want to delete this item?")) { 
                state.splice(i, 1); 
                render(); 
                await commitToGitHub();
            } 
        }

        init();
    </script>
</body>
</html>
