<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #800020; --border: #333; }
        body { background: var(--bg); color: #d9d9d9; font-family: monospace; margin: 0; padding-top: 280px; }
        
        #player-wrapper { 
            position: fixed; top: 0; left: 0; width: 100%; height: 200px; 
            background: #000; z-index: 1000; min-height: 100px; max-height: 80vh;
            border-bottom: 8px solid var(--accent); touch-action: none;
        }
        
        #drag-handle { 
            width: 100%; height: 20px; background: var(--accent); 
            position: absolute; bottom: -20px; cursor: ns-resize; 
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        
        #media-player { width: 100%; height: 100%; background: #000; }
        
        #header-controls { padding: 10px; display: flex; gap: 10px; position: fixed; top: 200px; width: 100%; background: var(--bg); z-index: 999; flex-wrap: wrap; }
        
        #tag-container { 
            padding: 10px 15px; position: fixed; top: 235px; width: 100%; 
            background: var(--bg); z-index: 998; display: flex; flex-wrap: wrap; gap: 8px; 
            border-bottom: 1px solid var(--border);
        }
        .tag-pill { border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; border-radius: 4px; }
        .tag-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Edit Mode Add Panel */
        #add-panel { display: none; padding: 10px; border-bottom: 1px solid var(--border); background: #1a1a1a; margin-top: 60px; }
        body.edit-mode #add-panel { display: block; }
        .input-group { margin-bottom: 10px; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 5px; box-sizing: border-box; }
        
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .relic { border: 1px solid var(--border); padding: 5px; cursor: pointer; position: relative; background: #141414; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .relic div { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }
        
        .edit-ui { display: none; margin-top: 5px; border-top: 1px solid var(--border); padding-top: 5px; }
        body.edit-mode .edit-ui { display: flex; flex-wrap: wrap; gap: 5px; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <video id="media-player" controls playsinline></video>
        <div id="drag-handle">|| DRAG TO RESIZE ||</div>
    </div>
    
    <div id="header-controls">
        <button id="admin-btn" class="btn" onclick="checkAdmin()">Admin Login</button>
        <button id="edit-toggle" class="btn" style="display:none;" onclick="toggleEdit()">Toggle Edit Mode</button>
        <button id="save-btn" class="btn" style="display:none;" onclick="saveJson()">Save & Export Data</button>
        <button id="logout-btn" class="btn" style="display:none;" onclick="logout()">Logout</button>
    </div>

    <div id="tag-container"></div>

    <div id="add-panel">
        <div class="input-group">
            <input type="text" id="new-title" placeholder="Title (Optional)">
            <input type="text" id="new-url" placeholder="Video URL">
            <input type="text" id="new-img" placeholder="Cover Image Direct Link (Optional)">
            <input type="text" id="new-tags" placeholder="Tags (comma separated)">
            <button class="btn" onclick="addItem()">Add Single Link</button>
        </div>
        <div class="input-group">
            <textarea id="bulk-urls" placeholder="Bulk Add: Paste one URL per line"></textarea>
            <button class="btn" onclick="addBulk()">Add Bulk Links</button>
        </div>
    </div>
    
    <div id="gallery-grid">Loading...</div>

    <script>
        let state = [];
        let isEditMode = false;
        let selectedTags = new Set();
        const wrapper = document.getElementById('player-wrapper');
        const handle = document.getElementById('drag-handle');

        handle.addEventListener('touchstart', (e) => { }, {passive: true});
        handle.addEventListener('touchmove', (e) => { 
            wrapper.style.height = e.touches[0].clientY + 'px'; 
            document.body.style.paddingTop = (e.touches[0].clientY + 120) + 'px';
        }, {passive: true});

        async function init() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                state = await res.json();
                render();
            } catch (e) { document.getElementById('gallery-grid').innerHTML = "Error loading data."; }
        }

        function checkAdmin() {
            if (prompt("Enter Admin Password:") === "1981") {
                document.getElementById('edit-toggle').style.display = 'block';
                document.getElementById('save-btn').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('admin-btn').style.display = 'none';
            } else { alert("Access Denied"); }
        }

        function addItem() {
            state.push({
                title: document.getElementById('new-title').value || "New Item",
                url: document.getElementById('new-url').value,
                img: document.getElementById('new-img').value,
                tags: document.getElementById('new-tags').value
            });
            document.getElementById('new-title').value = '';
            document.getElementById('new-url').value = '';
            document.getElementById('new-img').value = '';
            document.getElementById('new-tags').value = '';
            render();
        }

        function addBulk() {
            const urls = document.getElementById('bulk-urls').value.split('\n');
            urls.forEach(u => { if(u.trim()) state.push({ title: "New Item", url: u.trim(), img: "", tags: "" }); });
            document.getElementById('bulk-urls').value = '';
            render();
        }

        function toggleTag(tag) {
            if (selectedTags.has(tag)) selectedTags.delete(tag);
            else selectedTags.add(tag);
            render();
        }

        function render() {
            const allTags = [...new Set(state.flatMap(r => r.tags ? r.tags.split(',') : []))].sort();
            const tagContainer = document.getElementById('tag-container');
            tagContainer.innerHTML = '';
            allTags.forEach(t => {
                const span = document.createElement('span');
                span.className = `tag-pill ${selectedTags.has(t) ? 'active' : ''}`;
                span.innerText = t;
                span.onclick = () => toggleTag(t);
                tagContainer.appendChild(span);
            });

            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            state.forEach((r, i) => {
                const rTags = r.tags ? r.tags.split(',') : [];
                const isVisible = selectedTags.size === 0 || [...selectedTags].every(t => rTags.includes(t.trim()));
                if (!isVisible) return;

                const d = document.createElement('div');
                d.className = 'relic';
                d.onclick = () => { if(!isEditMode) handleViewer(r.url); };
                d.innerHTML = `
                    <div class="thumb">${r.img ? `<img src="${r.img}">` : '▶'}</div>
                    <div>${r.title}</div>
                    <div class="edit-ui">
                        <button onclick="event.stopPropagation(); edit(${i}, 'title')">Rename</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'img')">Cover</button>
                        <button onclick="event.stopPropagation(); edit(${i}, 'tags')">Tags</button>
                        <button onclick="event.stopPropagation(); del(${i})">Delete</button>
                    </div>
                `;
                grid.appendChild(d);
            });
        }

        function saveJson() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "data.json");
            dl.click();
        }

        function logout() { location.reload(); }
        function toggleEdit() { isEditMode = !isEditMode; document.body.classList.toggle('edit-mode'); }
        function handleViewer(url) {
            const p = document.getElementById('media-player');
            p.src = url; p.load(); p.play();
        }
        function edit(i, key) {
            const val = prompt(`Change ${key}:`, state[i][key] || '');
            if (val !== null) { state[i][key] = val; render(); }
        }
        function del(i) {
            if (confirm("Delete this relic?")) { state.splice(i, 1); render(); }
        }

        init();
    </script>
</body>
</html>
