<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent: #8b0000;
            --grid-size: 20px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #toolbar {
            background: var(--panel-color);
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
        }

        #tag-container {
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .tag {
            background: #333;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .tag:hover { background: var(--accent); }

        #archive-area {
            flex-grow: 1;
            position: relative;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            overflow: auto;
            transform-origin: 0 0;
        }

        .edit-mode #archive-area { background-image: radial-gradient(#444 1px, transparent 1px); }

        .relic {
            position: absolute;
            width: 250px;
            background: var(--panel-color);
            border: 1px solid #444;
            cursor: grab;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .relic img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .tag-display { font-size: 10px; color: #888; margin: 5px 0; font-style: italic; }
        .tag-input { display: none; width: 100%; margin-top: 5px; background: #222; color: #fff; border: 1px solid #444; }

        .relic-menu {
            display: none;
            font-size: 11px;
            padding-top: 5px;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .edit-mode .relic-menu, .edit-mode .tag-input { display: grid; }

        button { cursor: pointer; background: #333; color: white; border: none; padding: 5px 10px; }
        button:hover { background: var(--accent); }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="toggleEditMode()">Edit Mode</button>
        <button>Load</button>
        <button>Save</button>
        <button>Zoom In</button>
        <button>Zoom Out</button>
        <button>Resize to Original</button>
    </div>

    <div id="tag-container">
        <div class="tag">desi</div>
        <div class="tag">hairy</div>
        <div class="tag">solo</div>
        <div class="tag">sex</div>
        <div class="tag">indian</div>
        <div class="tag">arab</div>
        <div class="tag">white</div>
        <div class="tag">twink</div>
        <div class="tag">cute</div>
        <div class="tag">HD</div>
    </div>

    <div id="archive-area">
        <div class="relic" style="left: 50px; top: 50px;">
            <img src="placeholder.jpg" alt="Relic">
            <input type="text" class="tag-input" placeholder="Add tags (comma separated)..." onchange="updateTags(this)">
            <div class="tag-display"></div>
            <div class="relic-menu">
                <button>Resize</button>
                <button>Snap</button>
                <button>Replace</button>
                <button>Rename</button>
                <button>Move</button>
                <button onclick="deleteRelic(this)">Delete</button>
            </div>
        </div>
    </div>

    <script>
        function toggleEditMode() {
            document.body.classList.toggle('edit-mode');
        }

        function updateTags(input) {
            input.nextElementSibling.innerText = "Tags: " + input.value;
        }

        function deleteRelic(btn) {
            if(confirm('Are you sure you want to delete this?')) {
                btn.closest('.relic').remove();
            }
        }

        const gridSize = 20;
        function snap(val) { return Math.round(val / gridSize) * gridSize; }

        let dragged = null;
        document.addEventListener('mousedown', (e) => {
            if(document.body.classList.contains('edit-mode') && e.target.closest('.relic')) {
                dragged = e.target.closest('.relic');
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(dragged) {
                dragged.style.left = snap(e.clientX - 100) + 'px';
                dragged.style.top = snap(e.clientY - 120) + 'px';
            }
        });

        document.addEventListener('mouseup', () => dragged = null);
    </script>
</body>
</html>
